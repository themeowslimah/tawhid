// ══════════════════════════════════════════════
// LESSON 12 — The Prophet's ﷺ Protection of Tawhid
// ══════════════════════════════════════════════
function L12P1(){return `
<div class="sec"><div class="sec-ar">نَهْيُهُ ﷺ عَنِ اتِّخَاذِ قَبْرِهِ عِيدًا</div><div class="sec-translit">Nahyuhu ﷺ ʿan-ittikhādhi qabrihi ʿīdā</div><div class="sec-en">His ﷺ Forbidding the Taking of His Grave as a Festival Site</div></div>

<p style="margin-bottom:10px">The Prophet ﷺ forbade the taking of his grave as a festival (<em>ʿīd</em>) — so that it would not become a means and a pathway leading to worship of him besides Allah:</p>

<div class="hadith"><div class="hadith-label">Ḥadīth — Abū Hurayrah</div><div class="h-ar">«لَا تَجْعَلُوا بُيُوتَكُمْ قُبُورًا، وَلَا تَجْعَلُوا قَبْرِي عِيدًا، وَصَلُّوا عَلَيَّ فَإِنَّ صَلَاتَكُمْ تَبْلُغُنِي حَيْثُ كُنْتُمْ»</div><div class="h-translit">Lā tajʿalū buyūtakum qubūran, wa lā tajʿalū qabrī ʿīdan, wa ṣallū ʿalayya fa-inna ṣalātakum tablughunī ḥaythu kuntum.</div><div class="h-en">"Do not make your homes graves [by neglecting prayer in them], and do not make my grave a festival site. Send ṣalāh upon me — for your ṣalāh reaches me wherever you are."</div><div class="h-source">Narrated by Aḥmad no. 8804</div></div>

<div class="study-note root-tip"><span class="study-note-label">🌱 Word of the day</span><div class="study-note-title">عِيد · ʿīd</div><div class="study-note-body">From root ع-و-د (ʿ-w-d) meaning "to return." An <em>ʿīd</em> is something that "keeps returning" — a recurring festival or appointed gathering place. The Prophet ﷺ forbade his grave from becoming a site that people habitually return to in a worshipful way. This is why you see he forbade a <em>behavior pattern</em>, not just a single act.</div></div>

<p style="margin:12px 0 10px"><strong>This ḥadīth indicates several rulings:</strong></p>
<ul class="num-list">
<li data-n="أ"><div class="li-en"><strong>Forbidding taking the Prophet's ﷺ grave as a festival site</strong> — meaning customizing visits to it in a specific way, with habitual gatherings, as if it were a holiday. Such as taking his grave as a place of prayer, supplication, and other means of shirk — just as the mushrikīn take places and times as festivals.</div></li>
<li data-n="ب"><div class="li-en"><strong>If this is forbidden for the Prophet's ﷺ grave</strong> — and his grave is the best grave on the face of the earth — <strong>then it is even more forbidden for all other graves.</strong></div></li>
<li data-n="ج"><div class="li-en"><strong>His statement "send ṣalāh upon me — your ṣalāh reaches me wherever you are"</strong> means: whatever comes to me of ṣalāh and salām happens whether you are near or far from my grave. There is no need to take it as a festival site to which you travel specifically for this.</div></li>
</ul>
`;}

function L12P2(){return `
<div class="sec"><div class="sec-ar">دُعَاؤُهُ ﷺ أَنْ لَا يَجْعَلَ اللَّهُ قَبْرَهُ وَثَنًا</div><div class="sec-translit">Duʿāʾuhu ﷺ an lā yajʿala-llāhu qabrahu wathanā</div><div class="sec-en">His ﷺ Supplication That His Grave Not Be Made an Idol</div></div>

<p style="margin-bottom:10px">The Prophet ﷺ supplicated to his Lord — Mighty and Majestic — that his grave not be taken as an idol to be worshipped besides Allah:</p>

<div class="hadith"><div class="hadith-label">Ḥadīth — Abū Hurayrah</div><div class="h-ar">«اللَّهُمَّ لَا تَجْعَلْ قَبْرِي وَثَنًا، لَعَنَ اللَّهُ قَوْمًا اتَّخَذُوا قُبُورَ أَنْبِيَائِهِمْ مَسَاجِدَ»</div><div class="h-translit">Allāhumma lā tajʿal qabrī wathanā, laʿana-llāhu qawman ittakhadhū qubūra anbiyāʾihim masājid.</div><div class="h-en">"O Allah, do not make my grave an idol. Allah has cursed a people who took the graves of their prophets as places of worship."</div><div class="h-source">Narrated by Aḥmad no. 7358, Abū Yaʿlā al-Mawṣilī no. 6681, al-Ḥumaydī no. 1055</div></div>

<div class="study-note root-tip"><span class="study-note-label">🌱 Word of the day</span><div class="study-note-title">وَثَن · wathan</div><div class="study-note-body">An idol — specifically, anything worshipped besides Allah, whether it's a statue, a grave, a tree, or a person. The Prophet ﷺ specifically prayed that his own grave <em>not</em> become a wathan. Subḥān Allah — even the best of creation feared that people would exaggerate in his praise to the point of shirk.</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Powerful lesson</span><div class="study-note-body">The Prophet ﷺ <em>cursed</em> communities that took their prophets' graves as places of worship. Think about this carefully: a curse from the Prophet ﷺ is extremely serious. This shows how strict Islam is about <strong>blocking the paths that lead to shirk</strong>, even seemingly "innocent" practices of devotion at graves.</div></div>

<div class="callout teal"><div class="callout-label">Practical principle</div><div class="callout-en">This is a major principle in Islamic law called <em>sadd adh-dharāʾiʿ</em> — <strong>blocking the means</strong> to harm. Even if an action is not itself shirk, if it <em>leads to</em> shirk, it is forbidden. The Prophet ﷺ did not wait until people actually worshipped at graves — he forbade the very <em>means</em> that could lead to that.</div></div>
`;}

function L12P3(){return `
<div class="sec"><div class="sec-ar">نَهْيُهُ ﷺ عَنْ إِطْرَائِهِ وَرَفْعِهِ فَوْقَ مَنْزِلَتِهِ الَّتِي أَنْزَلَهُ اللَّهُ تَعَالَى</div><div class="sec-translit">Nahyuhu ﷺ ʿan iṭrāʾihi wa rafʿihi fawqa manzilatihi</div><div class="sec-en">His ﷺ Forbidding Exaggeration and Raising Him Above His God-Given Station</div></div>

<p style="margin-bottom:10px">The Prophet ﷺ used to forbid being raised above the station that Allah placed him in — which is the station of <em>Messengership</em> (<em>risālah</em>) and <em>servitude to Allah</em> (<em>ʿubūdiyyah li-llāh</em>):</p>

<div class="hadith"><div class="hadith-label">Ḥadīth — Anas ibn Mālik</div><div class="h-ar">أَنَّ رَجُلاً قَالَ: يَا سَيِّدَنَا وَابْنَ سَيِّدِنَا، وَخَيْرَنَا وَابْنَ خَيْرِنَا، فَقَالَ رَسُولُ اللَّهِ ﷺ: «يَا أَيُّهَا النَّاسُ قُولُوا بِقَوْلِكُمْ، وَلَا تَسْتَجْرِيَنَّكُمُ الشَّيَاطِينُ، أَنَا مُحَمَّدُ بْنُ عَبْدِ اللَّهِ وَرَسُولُ اللَّهِ، وَمَا أُحِبُّ أَنْ تَرْفَعُونِي فَوْقَ مَنْزِلَتِي الَّتِي أَنْزَلَنِيهَا اللَّهُ»</div><div class="h-translit">Anna rajulan qāla: yā sayyidanā wa-bna sayyidinā, wa khayranā wa-bna khayrinā. Fa-qāla rasūlu-llāhi ﷺ: Yā ayyuhā n-nāsu qūlū bi-qawlikum, wa lā tastajriyannakumu sh-shayāṭīnu, anā Muḥammadu bnu ʿAbdi-llāhi wa rasūlu-llāh, wa mā uḥibbu an tarfaʿūnī fawqa manzilatī llatī anzalanīhā-llāh.</div><div class="h-en">A man said: "O our master, and son of our master! Our best, and son of our best!" So the Messenger of Allah ﷺ said: <strong>"O people, say what you normally say, and do not let the devils carry you away. I am Muḥammad, son of ʿAbdullāh, the servant of Allah and His Messenger. I do not love that you raise me above the station Allah has placed me in."</strong></div><div class="h-source">Narrated by an-Nasāʾī in as-Sunan al-Kubrā no. 10006</div></div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ Absolutely critical concept</span><div class="study-note-body">Read this ḥadīth carefully. A man praised the Prophet ﷺ with genuine love — and the Prophet ﷺ <em>rebuked him</em>. Why? Because excessive praise (<em>iṭrāʾ</em>) of a created being is the first step toward treating them like a deity. The Prophet ﷺ protected his own Ummah from falling into what previous nations fell into. The lesson: <strong>love the Prophet ﷺ deeply, but don't elevate him beyond what Allah elevated him to.</strong></div></div>

<div class="study-note root-tip"><span class="study-note-label">🌱 Word tip</span><div class="study-note-title">إِطْرَاء · iṭrāʾ</div><div class="study-note-body">From root ط-ر-ي (ṭ-r-y) meaning "to be fresh, moist." But in this religious context, it means "excessive praise that exaggerates beyond truth." The Prophet ﷺ said in another ḥadīth: <em>"Do not extol me (lā tuṭrūnī) as the Christians extolled the son of Maryam."</em> (Bukhārī) — in other words, don't turn me into a god like Christians did with Jesus.</div></div>

<div class="callout"><div class="callout-label">The Prophet's ﷺ self-description</div><div class="callout-en">Notice how he described himself: <strong>"Muḥammad, son of ʿAbdullāh, the <em>servant</em> of Allah and His <em>Messenger</em>."</strong> These are the two highest titles — and both are titles of dependence on Allah, not independence from Him. His first identity is <em>ʿAbd</em> (servant), then <em>Rasūl</em> (messenger). Neither is "equal to Allah" or "share in divinity."</div></div>
`;}

function vocabPage(lessonNum, words){
  const rows = words.map(w=>`<tr><td class="vtd-ar">${w[0]}</td><td class="vtd-translit">${w[1]}</td><td>${w[2]}</td><td><span class="vtd-type ${w[3]||'noun'}">${w[3]||'noun'}</span></td><td style="font-size:.86rem;color:var(--ink-mid)">${w[4]}</td></tr>`).join('');
  const cards = words.map((w,i)=>`<div class="vcard" id="vc${lessonNum}_${i}" onclick="flipCard(this)"><div class="vc-front"><div class="vc-ar">${w[0]}</div><div class="vc-translit">${w[1]}</div></div><div class="vc-back"><div class="vc-meaning">${w[4]}</div><div class="vc-type"><span class="vtd-type ${w[3]||'noun'}">${w[3]||'noun'}</span></div>${w[5]?`<div class="vc-root">Root: ${w[5]}</div>`:''}</div><span class="vc-hint">tap to flip</span></div>`).join('');
  return `
<div class="vocab-page-label">Lesson ${lessonNum} Vocabulary</div>
<div class="vocab-section-title">Quick Reference Table</div>
<table class="vocab-table">
  <thead><tr><th>Arabic</th><th>Transliteration</th><th>English</th><th>Type</th><th>Explanation</th></tr></thead>
  <tbody>${rows}</tbody>
</table>
<div class="vocab-section-title">Flashcards — tap each card to reveal meaning</div>
<div class="vocab-controls">
  <button class="vocab-ctrl-btn" onclick="flipAllCards(${lessonNum}, true)">Reveal All</button>
  <button class="vocab-ctrl-btn" onclick="flipAllCards(${lessonNum}, false)">Hide All</button>
  <span class="vocab-count">${words.length} terms</span>
</div>
<div class="vocab-grid">${cards}</div>`;
}
function flipCard(el){el.classList.toggle('flipped');el.querySelector('.vc-hint').textContent=el.classList.contains('flipped')?'tap to hide':'tap to flip';}
function flipAllCards(n, open){document.querySelectorAll(`[id^="vc${n}_"]`).forEach(c=>{open?c.classList.add('flipped'):c.classList.remove('flipped');c.querySelector('.vc-hint').textContent=open?'tap to hide':'tap to flip';});}
