<div class="virtue" style="margin-top:20px"><div class="virtue-head"><div class="virtue-n">3</div><div class="virtue-head-text"><div class="vh-label">الْفَضِيلَةُ الثَّالِثَةُ · The Third Virtue</div><div class="vh-ar">أَنَّ اللَّهَ تَعَالَى أَوْجَبَ عَلَى نَفْسِهِ أَنْ لَا يُعَذِّبَ مَنْ لَا يُشْرِكُ بِهِ شَيْئًا</div><div class="vh-translit">Anna-llāha taʿālā awjaba ʿalā nafsih an lā yuʿadhdhiba man lā yushriku bihi shayʾā</div><div class="vh-en">Allah has obligated upon Himself not to punish whoever does not associate anything with Him</div></div></div></div>

<div class="body-text"><div class="bt-ar">فَلَقَدْ تَفَضَّلَ اللَّهُ تَعَالَى عَلَى عِبَادِهِ الْمُوَحِّدِينَ: بِأَنَّ مَنْ وَحَّدَ اللَّهَ وَلَمْ يُشْرِكْ بِهِ شَيْئًا وَاجْتَنَبَ الْكَبَائِرَ أَدْخَلَهُ اللَّهُ الْجَنَّةَ وَلَمْ يُعَذِّبْهُ.</div><div class="bt-translit">Fa-laqad tafaḍḍala-llāhu taʿālā ʿalā ʿibādihi l-muwaḥḥidīn: bi-anna man waḥḥada-llāha wa lam yushrik bihi shayʾan wa jtanaba l-kabāʾir adkhalahu-llāhu l-jannah wa lam yuʿadhdhibh.</div><div class="bt-en">Allah — Exalted — has <strong>bestowed grace upon His monotheist servants</strong>: whoever makes tawhid of Allah, <strong>does not associate anything with Him, and avoids the major sins</strong> — Allah will <strong>admit him into Paradise and not punish him</strong>.</div></div>

<div class="hadith"><div class="hadith-label">وَالدَّلِيلُ عَلَى هَذَا · Ḥadīth — Muʿādh ibn Jabal & another narration</div><div class="h-ar">«وَحَقُّ الْعِبَادِ عَلَى اللَّهِ عَزَّ وَجَلَّ أَنْ لَا يُعَذِّبَ مَنْ لَا يُشْرِكُ بِهِ شَيْئًا»<br><br>وَقَوْلُهُ ﷺ: «فَإِنَّ اللَّهَ قَدْ حَرَّمَ عَلَى النَّارِ مَنْ قَالَ: لَا إِلَهَ إِلَّا اللَّهُ، يَبْتَغِي بِذَلِكَ وَجْهَ اللَّهِ»</div><div class="h-translit">Wa ḥaqqu l-ʿibādi ʿalā-llāhi ʿazza wa jalla an lā yuʿadhdhiba man lā yushriku bihi shayʾā.<br><br>Wa qawluhu ﷺ: "Fa-inna-llāha qad ḥarrama ʿalā n-nāri man qāla: lā ilāha illā-llāh, yabtaghī bi-dhālika wajha-llāh."</div><div class="h-en">"The right of the servants upon Allah — Mighty and Majestic — is that He does not punish anyone who does not associate anything with Him." (Bukhārī 2701, Muslim 30)<br><br>And his saying ﷺ: <strong>"Allah has forbidden the Fire for whoever says: 'Lā ilāha illā-llāh,' seeking by it the Face of Allah."</strong> (Bukhārī 5401)</div></div>

<div class="virtue" style="margin-top:12px"><div class="virtue-head"><div class="virtue-n">4</div><div class="virtue-head-text"><div class="vh-label">الْفَضِيلَةُ الرَّابِعَةُ · The Fourth Virtue</div><div class="vh-ar">تَكْفِيرُ الذُّنُوبِ</div><div class="vh-translit">Takfīru dh-dhunūb</div><div class="vh-en">Expiation of Sins</div></div></div></div>

<div class="body-text"><div class="bt-ar">فَمَنْ وَحَّدَ اللَّهَ تَعَالَى وَلَمْ يُشْرِكْ بِهِ شَيْئًا، وَمَاتَ عَلَى ذَلِكَ فَإِنَّ اللَّهَ تَعَالَى -إِذَا شَاءَ- غَفَرَ لَهُ ذُنُوبَهُ جَمِيعًا.</div><div class="bt-translit">Fa-man waḥḥada-llāha taʿālā wa lam yushrik bihi shayʾan, wa māta ʿalā dhālik fa-inna-llāha taʿālā — idhā shāʾa — ghafara lahu dhunūbahu jamīʿan.</div><div class="bt-en">Whoever makes tawhid of Allah, associates <strong>nothing</strong> with Him, and <strong>dies upon that</strong> — Allah, <strong>if He wills</strong>, will <strong>forgive all his sins</strong>.</div></div>

<div class="hadith"><div class="hadith-label">وَالدَّلِيلُ عَلَى هَذَا · Ḥadīth Qudsī — Abū Dharr</div><div class="h-ar">قَالَ رَسُولُ اللَّهِ ﷺ: «يَقُولُ اللَّهُ عَزَّ وَجَلَّ: … وَمَنْ لَقِيَنِي بِقُرَابِ الْأَرْضِ خَطِيئَةً لَا يُشْرِكُ بِي شَيْئًا لَقِيتُهُ بِمِثْلِهَا مَغْفِرَةً»</div><div class="h-translit">Qāla rasūlu-llāhi ﷺ: "Yaqūlu-llāhu ʿazza wa jall: … wa man laqiyanī bi-qurābi l-arḍi khaṭīʾatan lā yushriku bī shayʾan laqītuhu bi-mithlihā maghfirah."</div><div class="h-en">The Messenger of Allah ﷺ said: <strong>"Allah — Mighty and Majestic — says: … Whoever meets Me with an earth-full of sins — without having associated anything with Me — I will meet him with the like of it in forgiveness."</strong> (<em>qurāb al-arḍ</em> = "a filling of the earth" / close to it)</div><div class="h-source">Narrated by Muslim no. 2687</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 What this means in simple words</span><div class="study-note-body">Picture an imaginary scale: on one side, all your sins from life — let\u2019s say enough to fill the whole Earth! On the other side, your tawhid. If your tawhid was real and sincere, Allah says He\u2019ll give you <em>an Earth-full of forgiveness</em> to match. That\u2019s how powerful sincere tawhid is. <em>But</em> — this promise is only for someone who did <strong>not</strong> commit shirk.</div></div>

<div class="virtue" style="margin-top:12px"><div class="virtue-head"><div class="virtue-n">5</div><div class="virtue-head-text"><div class="vh-label">الْفَضِيلَةُ الْخَامِسَةُ · The Fifth Virtue</div><div class="vh-ar">أَنَّ التَّوْحِيدَ أَثْقَلُ شَيْءٍ فِي مِيزَانِ الْعَبْدِ يَوْمَ الْقِيَامَةِ</div><div class="vh-translit">Anna t-tawḥīda athqalu shayʾin fī mīzāni l-ʿabdi yawma l-qiyāmah</div><div class="vh-en">Tawhid is the Heaviest Thing on the Servant\u2019s Scale on the Day of Judgement</div></div></div></div>

<div class="hadith"><div class="hadith-label">وَالدَّلِيلُ عَلَى هَذَا · Ḥadīth — ʿAbdullāh ibn ʿAmr · Nūḥ\u2019s Final Counsel</div><div class="h-ar">أَنَّ النَّبِيَّ ﷺ قَالَ: «إِنَّ نَبِيَّ اللَّهِ نُوحًا ﷺ لَمَّا حَضَرَتْهُ الْوَفَاةُ قَالَ لِابْنِهِ: إِنِّي قَاصٌّ عَلَيْكَ الْوَصِيَّةَ: آمُرُكَ بِاثْنَتَيْنِ، وَأَنْهَاكَ عَنِ اثْنَتَيْنِ، آمُرُكَ بِلَا إِلَهَ إِلَّا اللَّهُ، فَإِنَّ السَّمَاوَاتِ السَّبْعَ، وَالْأَرَضِينَ السَّبْعَ، لَوْ وُضِعَتْ فِي كِفَّةٍ، وَوُضِعَتْ لَا إِلَهَ إِلَّا اللَّهُ فِي كِفَّةٍ، رَجَحَتْ بِهِنَّ لَا إِلَهَ إِلَّا اللَّهُ…»</div><div class="h-translit">Anna n-nabiyya ﷺ qāla: "Inna nabiyya-llāhi Nūḥan ﷺ lammā ḥaḍarathu l-wafātu qāla li-bnih: innī qāṣṣun ʿalayka l-waṣiyyah: āmuruka bi-thnatayn, wa anhāka ʿani thnatayn, āmuruka bi-lā ilāha illā-llāh, fa-inna s-samāwāti s-sabʿ, wa l-araḍīna s-sabʿ, law wuḍiʿat fī kiffah, wa wuḍiʿat lā ilāha illā-llāh fī kiffah, rajaḥat bi-hinna lā ilāha illā-llāh…"</div><div class="h-en">The Prophet ﷺ said: <strong>"When death approached the Prophet Nūḥ ﷺ, he said to his son: 'I am conveying to you the counsel: I command you with two things, and forbid you from two things. I command you with Lā ilāha illā-llāh — for if the seven heavens and the seven earths were placed on one pan of a scale, and Lā ilāha illā-llāh on the other pan, Lā ilāha illā-llāh would outweigh them…'"</strong></div><div class="h-source">Narrated by Aḥmad 11/150 (6583)</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Think about this</span><div class="study-note-body">Imagine the seven heavens (everything up in space) and the seven earths together on one side of a giant scale. On the other side: just the <em>words</em> "lā ilāha illā-llāh" (there is no god but Allah) — if said with real belief and sincerity. Prophet Nūḥ (Noah) ﷺ told his son: <em>these words would be heavier</em>. That\u2019s how valuable real tawhid is — it outweighs <em>everything</em> Allah created!</div></div>`;}

function L3P3(){return `
<div class="virtue"><div class="virtue-head"><div class="virtue-n">6</div><div class="virtue-head-text"><div class="vh-label">الْفَضِيلَةُ السَّادِسَةُ · The Sixth Virtue</div><div class="vh-ar">دُخُولُ الْجَنَّةِ</div><div class="vh-translit">Dukhūlu l-jannah</div><div class="vh-en">Entry into Paradise</div></div></div></div>

<div class="body-text"><div class="bt-ar">فَمَنْ شَهِدَ بِالتَّوْحِيدِ وَعَمِلَ بِمُقْتَضَاهُ بِفِعْلِ الطَّاعَاتِ وَاجْتِنَابِ الْكَبَائِرِ وَالْمُوبِقَاتِ دَخَلَ الْجَنَّةَ، وَمَنْ شَهِدَ بِالتَّوْحِيدِ وَوَقَعَ مِنْهُ تَقْصِيرٌ فِي الْعَمَلِ فَهُوَ تَحْتَ فَتْحِ الْمَشِيئَةِ، إِنْ شَاءَ اللَّهُ عَذَّبَهُ وَإِنْ شَاءَ غَفَرَ لَهُ، وَلَكِنْ مَآلُهُ إِلَى الْجَنَّةِ، مِنْ أَجْلِ حَسَنَةِ التَّوْحِيدِ، وَهَذَا يَدُلُّ عَلَى عَظِيمِ فَضْلِ التَّوْحِيدِ.</div><div class="bt-translit">Fa-man shahida bi-t-tawḥīd wa ʿamila bi-muqtaḍāhu bi-fiʿli ṭ-ṭāʿāti wa jtinābi l-kabāʾiri wa l-mūbiqāti dakhala l-jannah, wa man shahida bi-t-tawḥīdi wa waqaʿa minhu taqṣīrun fī l-ʿamali fa-huwa taḥta fatḥi l-mashīʾah, in shāʾa-llāhu ʿadhdhabahu wa in shāʾa ghafara lah, wa lākin maʾāluhu ilā l-jannah, min ajli ḥasanati t-tawḥīd, wa hādhā yadullu ʿalā ʿaẓīmi faḍli t-tawḥīd.</div><div class="bt-en">Whoever <strong>bears witness to tawhid</strong> and <strong>acts by its requirement</strong> — performing the obligations and avoiding major sins and destructive deeds — enters Paradise. Whoever bears witness to tawhid <strong>but falls short in deeds</strong> — he is <strong>under the will of Allah</strong>: if He wills He will punish him, and if He wills He will forgive him. <strong>But his ultimate destination is Paradise</strong>, because of the good deed of tawhid. <strong>This indicates the tremendous virtue of tawhid.</strong></div></div>

<div class="hadith"><div class="hadith-label">وَالدَّلِيلُ عَلَى هَذَا · Ḥadīth — ʿUbādah ibn aṣ-Ṣāmit</div><div class="h-ar">أَنَّ النَّبِيَّ ﷺ قَالَ: «مَنْ شَهِدَ أَنْ لَا إِلَٰهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، وَأَنَّ مُحَمَّدًا عَبْدُهُ وَرَسُولُهُ، وَأَنَّ عِيسَى عَبْدُ اللَّهِ وَرَسُولُهُ، وَكَلِمَتُهُ أَلْقَاهَا إِلَى مَرْيَمَ وَرُوحٌ مِنْهُ، وَالْجَنَّةُ حَقٌّ، وَالنَّارُ حَقٌّ، أَدْخَلَهُ اللَّهُ الْجَنَّةَ عَلَى مَا كَانَ مِنَ الْعَمَلِ»</div><div class="h-translit">Anna n-nabiyya ﷺ qāla: "Man shahida an lā ilāha illā-llāh waḥdahu lā sharīka lah, wa anna Muḥammadan ʿabduhu wa rasūluh, wa anna ʿĪsā ʿabdu-llāhi wa rasūluh, wa kalimatuhu alqāhā ilā Maryama wa rūḥun minh, wa l-jannatu ḥaqqun wa-n-nāru ḥaqq — adkhalahu-llāhu l-jannata ʿalā mā kāna mina l-ʿamal."</div><div class="h-en">The Prophet ﷺ said: <strong>"Whoever bears witness that there is no deity but Allah alone, without any partner, and that Muḥammad is His servant and messenger, and that ʿĪsā (Jesus) is Allah\u2019s servant and messenger — His word that He cast upon Maryam and a spirit from Him — and that Paradise is true and the Fire is true: Allah will admit him into Paradise, <em>whatever his deeds may have been</em>."</strong></div><div class="h-source">Narrated by al-Bukhārī no. 3435 and Muslim no. 28</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Why does this hadith mention ʿĪsā (Jesus)?</span><div class="study-note-body">This hadith specifically mentions that you must also testify: <strong>ʿĪsā (Jesus) is a servant of Allah and His messenger</strong> — not the son of God, not God Himself. The extra description — "His <em>word</em> cast upon Maryam" — refers to Allah creating him by the word "Be!" sent via Jibrīl, not through a normal father. And "a spirit <em>from</em> Him" means an honored soul that Allah created. Christians make mistakes about Jesus. Islam respects ʿĪsā as one of the greatest prophets — but he was a <em>man</em> and a messenger, not divine. Getting this right is part of tawhid.</div></div>`;}

function L3P4(){return `
<div class="sec"><div class="sec-ar">تَحْقِيقُ التَّوْحِيدِ</div><div class="sec-translit">Taḥqīqu t-tawḥīd</div><div class="sec-en">The Realization of Tawhid</div></div>

<div class="body-text"><div class="bt-label">📖 Definition</div><div class="bt-ar">الْمُرَادُ بِتَحْقِيقِ التَّوْحِيدِ هُوَ: إِخْلَاصُ الْعَمَلِ لِلَّهِ تَعَالَى، وَتَخْلِيصُهُ مِنْ شَوَائِبِ الشِّرْكِ وَالْبِدَعِ وَالْمَعَاصِي، وَتَكْمِيلُهُ بِفِعْلِ السُّنَنِ وَتَرْكِ الْمَكْرُوهَاتِ.</div><div class="bt-translit">Al-murādu bi-taḥqīqi t-tawḥīdi huwa: ikhlāṣu l-ʿamali li-llāhi taʿālā, wa takhlīṣuhu min shawāʾibi sh-shirki wa l-bidaʿi wa l-maʿāṣī, wa takmīluhu bi-fiʿli s-sunani wa tarki l-makrūhāt.</div><div class="bt-en">The <strong>realization of tawhid</strong> means: <strong>sincere deeds for Allah alone</strong>, <strong>purifying them from the blemishes of shirk, innovations (bidʿah), and sins</strong>, and <strong>perfecting them by performing the sunnahs and abandoning what is disliked (makrūhāt)</strong>.</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Think of tawhid like a clean white shirt</span><div class="study-note-body">Imagine tawhid as a clean white shirt. <em>Shirk</em> is like mud — it ruins the shirt completely. <em>Bidʿah</em> (invented religious practices) and <em>sins</em> are like smaller stains — they don\u2019t destroy the shirt, but they dirty it. <em>Taḥqīq</em> means: (1) keep the shirt clean from mud and stains, and (2) make it even brighter by doing extra good acts like Sunnah prayers. That\u2019s "realizing" or "perfecting" your tawhid.</div></div>

<div class="pillar-grid">
  <div class="pillar"><div class="pillar-n">1</div><div class="pillar-title">Sincere deeds for Allah alone</div><div class="pillar-ar">إِخْلَاصُ الْعَمَلِ لِلَّهِ</div><div class="pillar-translit">Ikhlāṣu l-ʿamali li-llāh</div></div>
  <div class="pillar"><div class="pillar-n">2</div><div class="pillar-title">Free from shirk, bidʿah & sins</div><div class="pillar-ar">تَخْلِيصُهُ مِنَ الشِّرْكِ وَالْبِدَعِ وَالْمَعَاصِي</div><div class="pillar-translit">Takhlīṣuhu min ash-shirki wa-l-bidaʿi wa-l-maʿāṣī</div></div>
  <div class="pillar"><div class="pillar-n">3</div><div class="pillar-title">Perfected by performing the sunan</div><div class="pillar-ar">تَكْمِيلُهُ بِفِعْلِ السُّنَنِ</div><div class="pillar-translit">Takmīluhu bi-fiʿli s-sunan</div></div>
  <div class="pillar"><div class="pillar-n">4</div><div class="pillar-title">Abandoning the makrūhāt</div><div class="pillar-ar">تَرْكُ الْمَكْرُوهَاتِ</div><div class="pillar-translit">Tarku l-makrūhāt</div></div>
</div>

<div class="assessment" id="as3p4"><div class="section-badge">التَّقْوِيم · Assessment</div><p class="assessment-intro" style="margin-top:8px">Attempt before revealing.</p><div class="activity-controls"><button class="btn-reveal-all" onclick="revealAll(document.getElementById('as3p4'))">Reveal All</button><button class="btn-hide-all" onclick="hideAll(document.getElementById('as3p4'))">Hide All</button></div>
<div class="q-item"><span class="q-num">1</span><div class="q-en">List three virtues of tawhid with evidence for each.</div><div class="q-ar">أُعَدِّدُ ثَلَاثًا مِنْ فَضَائِلِ التَّوْحِيدِ مَعَ الدَّلِيلِ.</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box">Any three from: (1) Security & guidance — Anʿām 6:82. (2) Allah will not punish monotheists — Bukhārī 2701. (3) Expiation of sins — Muslim 2687. (4) Heaviest on scale — Aḥmad 6583. (5) Entry into Paradise — Bukhārī 3435.</div></div>
<div class="q-item"><span class="q-num">2</span><div class="q-en">What is the meaning of ẓulm in: ﴿وَلَمْ يَلْبِسُوا إِيمَانَهُم بِظُلْمٍ﴾?</div><div class="q-ar">مَا تَفْسِيرُ الظُّلْمِ فِي الآيَةِ؟</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box">Shirk — the Prophet ﷺ clarified this (Bukhārī 32) citing Luqmān 31:13: "Indeed, shirk is a grave injustice." So the verse promises security for those whose faith is free from shirk.</div></div></div>`;}

function L4P1(){return `
<div class="body-text"><div class="bt-label">📖 Textbook Opening</div><div class="bt-ar">مِنْ أَهَمِّ الْمُعْتَقَدَاتِ الَّتِي تُضَادُّ التَّوْحِيدَ مَا يَأْتِي:</div><div class="bt-translit">Min ahammi l-muʿtaqadāti llatī tuḍāddu t-tawḥīda mā yaʾtī:</div><div class="bt-en">Among the <strong>most important beliefs that contradict tawhid</strong> are the following:</div></div>

<div class="point"><div class="point-num">١</div><div class="point-body"><div class="point-ar">أَوَّلًا: عَدَمُ الْبَرَاءَةِ مِنْ كُلِّ مَا يُعْبَدُ مِنْ دُونِ اللَّهِ</div><div class="point-translit">Awwalan: ʿAdamu l-barāʾati min kulli mā yuʿbadu min dūni-llāh</div><div class="point-en">First: Failing to Disavow Everything Worshipped Besides Allah</div></div></div>

<div class="body-text"><div class="bt-label">📖 Textbook Passage</div><div class="bt-ar">التَّوْحِيدُ الْخَالِصُ الَّذِي لَا يَقْبَلُ اللَّهُ تَعَالَى غَيْرَهُ لَا يَكُونُ إِلَّا بِإِخْلَاصِ الْعِبَادَةِ لِلَّهِ، وَالْبَرَاءَةِ مِنْ جَمِيعِ الْآلِهَةِ الْبَاطِلَةِ، فَلَا يَكْفِي فِي التَّوْحِيدِ مُجَرَّدُ التَّلَفُّظِ بِكَلِمَةِ (لَا إِلَهَ إِلَّا اللَّهُ)، بَلْ لَا بُدَّ أَنْ يُضَافَ إِلَيْهِ الْكُفْرُ بِمَا يُعْبَدُ مِنْ دُونِ اللَّهِ، وَالدَّلِيلُ عَلَى هَذَا:</div><div class="bt-translit">At-tawḥīdu l-khāliṣu lladhī lā yaqbalu-llāhu taʿālā ghayrahu lā yakūnu illā bi-ikhlāṣi l-ʿibādati li-llāh, wa l-barāʾati min jamīʿi l-ālihati l-bāṭilah, fa-lā yakfī fī t-tawḥīdi mujarradu t-talaffuẓi bi-kalimati (lā ilāha illā-llāh), bal lā budda an yuḍāfa ilayhi l-kufru bi-mā yuʿbadu min dūni-llāh, wa d-dalīlu ʿalā hādhā:</div><div class="bt-en">The <strong>pure tawhid — which Allah will accept nothing else in its place</strong> — cannot exist except through <strong>sincerity of worship to Allah</strong> AND <strong>disavowal of every false deity</strong>. It is <strong>not sufficient for tawhid to merely pronounce the words "Lā ilāha illā-llāh"</strong>; rather, <strong>disbelief in whatever is worshipped besides Allah</strong> must be added to it. The evidence for this:</div></div>

<div class="verse"><div class="v-ar">﴿وَإِذْ قَالَ إِبْرَاهِيمُ لِأَبِيهِ وَقَوْمِهِ إِنَّنِي بَرَاءٌ مِّمَّا تَعْبُدُونَ ۝ إِلَّا الَّذِي فَطَرَنِي فَإِنَّهُ سَيَهْدِينِ ۝ وَجَعَلَهَا كَلِمَةً بَاقِيَةً فِي عَقِبِهِ لَعَلَّهُمْ يَرْجِعُونَ﴾</div><div class="v-translit">Wa idh qāla Ibrāhīmu li-abīhi wa qawmih: innanī barāʾun mimmā taʿbudūn. Illā lladhī faṭaranī fa-innahu sa-yahdīn. Wa jaʿalahā kalimatan bāqiyatan fī ʿaqibihi laʿallahum yarjiʿūn.</div><div class="v-en">"When Ibrāhīm said to his father and his people: <strong>'Indeed, I am disassociated from what you worship — except for He who created me; for indeed, He will guide me.'</strong> And he made it a word <strong>remaining among his descendants</strong> that they might return."</div><div class="v-ref">Sūrat az-Zukhruf 43:26–28</div></div>

<div class="body-text"><div class="bt-label">📖 Word-by-Word from the Textbook</div><div class="bt-ar"><strong>الْمُرَادُ بِكَلِمَةِ التَّوْحِيدِ</strong> (لَا إِلَهَ إِلَّا اللَّهُ)<br><strong>بَرَاءٌ</strong>: تَارِكٌ وَمُبْتَعِدٌ<br><strong>فَطَرَنِي</strong>: خَلَقَنِي<br><strong>كَلِمَةً بَاقِيَةً فِي عَقِبِهِ</strong>: لَا يَزَالُ فِي ذُرِّيَّتِهِ مَنْ يَقُولُهَا</div><div class="bt-translit"><strong>Al-murādu bi-kalimati t-tawḥīd:</strong> (lā ilāha illā-llāh)<br><strong>Barāʾ:</strong> tārikun wa mubtaʿid (one who leaves and distances himself).<br><strong>Faṭaranī:</strong> khalaqanī (He created me).<br><strong>Kalimatan bāqiyatan fī ʿaqibih:</strong> lā yazālu fī dhurriyyatihi man yaqūluhā (there will always remain in his descendants those who say it).</div><div class="bt-en"><strong>What is meant by the "word of tawhid":</strong> "Lā ilāha illā-llāh" (there is no god but Allah).<br><strong>"Barāʾ" (disassociated):</strong> one who has left and distanced himself.<br><strong>"Faṭaranī":</strong> created me.<br><strong>"A word remaining among his descendants":</strong> there will always remain among his descendants those who say it.</div></div>

<div class="body-text"><div class="bt-label">📖 Textbook Explanation</div><div class="bt-ar">فَقَدْ تَبَرَّأَ إِبْرَاهِيمُ عَلَيْهِ الصَّلَاةُ وَالسَّلَامُ وَهُوَ إِمَامُ الْحُنَفَاءِ وَالْمُوَحِّدِينَ مِنْ جَمِيعِ الْآلِهَةِ الَّتِي تُعْبَدُ مِنْ دُونِ اللَّهِ تَعَالَى، ثُمَّ اسْتَثْنَى إِلَهًا وَاحِدًا فَقَطْ هُوَ اللَّهُ جَلَّ وَعَلَا، الَّذِي خَلَقَهُ وَأَوْجَدَهُ مِنَ الْعَدَمِ. فَفِي هَذِهِ الْآيَةِ الْكَرِيمَةِ تَفْسِيرُ التَّوْحِيدِ: حَيْثُ دَلَّتْ عَلَى أَنَّ حَقِيقَةَ التَّوْحِيدِ مُرَكَّبَةٌ مِنْ أَمْرَيْنِ:<br>الْأَوَّلُ: الْبَرَاءَةُ مِنْ كُلِّ الْآلِهَةِ الْبَاطِلَةِ الَّتِي يَعْبُدُهَا الْمُشْرِكُونَ مِنْ دُونِ اللَّهِ تَعَالَى.<br>الثَّانِي: إِثْبَاتُ الْعِبَادَةِ لِلَّهِ وَحْدَهُ لَا شَرِيكَ لَهُ.</div><div class="bt-translit">Fa-qad tabarraʾa Ibrāhīmu ʿalayhi ṣ-ṣalātu wa s-salāmu — wa huwa imāmu l-ḥunafāʾi wa l-muwaḥḥidīn — min jamīʿi l-ālihati llatī tuʿbadu min dūni-llāhi taʿālā, thumma-stathnā ilāhan wāḥidan faqaṭ huwa-llāhu jalla wa ʿalā, lladhī khalaqahu wa awjadahu mina l-ʿadam. Fa-fī hādhihi l-āyati l-karīmati tafsīru t-tawḥīd: ḥaythu dallat ʿalā anna ḥaqīqata t-tawḥīdi murakkabatun min amrayn:<br>Al-awwal: al-barāʾatu min kulli l-ālihati l-bāṭilati llatī yaʿbuduhā l-mushrikūna min dūni-llāhi taʿālā.<br>Ath-thānī: ithbātu l-ʿibādati li-llāhi waḥdahu lā sharīka lah.</div><div class="bt-en">Ibrāhīm ﷺ — <strong>imam of the ḥunafāʾ (true monotheists)</strong> — <strong>disavowed all deities worshipped besides Allah</strong>, then <strong>excepted only ONE deity</strong>: Allah — Majestic and Exalted — who <strong>created him and brought him into being from nothing</strong>. This noble verse <strong>explains tawhid</strong>: it shows that the <strong>reality of tawhid is composed of two matters</strong>:<br><strong>First:</strong> <strong>disavowal</strong> of all false deities worshipped by the polytheists besides Allah.<br><strong>Second:</strong> <strong>affirmation of worship to Allah alone</strong>, without any partner.</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Ibrāhīm\u2019s powerful example</span><div class="study-note-body">Prophet Ibrāhīm (Abraham) ﷺ didn\u2019t just <em>quietly</em> not worship idols — he openly said to his father and community: "I am <strong>FREE</strong> from what you worship!" This word (<em>barāʾah</em> = disavowal) is strong. It\u2019s not shy. It\u2019s not "maybe we can agree to disagree." It\u2019s: "What you worship is wrong, and I want nothing to do with it." That\u2019s the courage of real tawhid — openly rejecting false gods while openly affirming Allah.</div></div>

<div class="point"><div class="point-num">٢</div><div class="point-body"><div class="point-ar">ثَانِيًا: دُعَاءُ غَيْرِ اللَّهِ تَعَالَى</div><div class="point-translit">Thāniyan: Duʿāʾu ghayri-llāhi taʿālā</div><div class="point-en">Second: Supplicating to Other Than Allah</div></div></div>

<div class="body-text"><div class="bt-label">📖 Textbook Passage</div><div class="bt-ar">دُعَاءُ غَيْرِ اللَّهِ تَعَالَى وَالاِسْتِغَاثَةُ بِهِ يُنَاقِضُ التَّوْحِيدَ، وَذَلِكَ أَنَّ كُلَّ مَنْ دَعَا غَيْرَ اللَّهِ تَعَالَى مِنَ الْأَنْبِيَاءِ وَالصَّالِحِينَ وَغَيْرِهِمْ فَقَدْ وَقَعَ فِي الشِّرْكِ.</div><div class="bt-translit">Duʿāʾu ghayri-llāhi taʿālā wa l-istighāthatu bihi yunāqiḍu t-tawḥīd, wa dhālika anna kulla man daʿā ghayra-llāhi taʿālā mina l-anbiyāʾi wa ṣ-ṣāliḥīna wa ghayrihim fa-qad waqaʿa fī sh-shirk.</div><div class="bt-en"><strong>Supplicating to other than Allah — and seeking help from them — contradicts tawhid</strong>. Whoever calls upon anyone besides Allah — whether prophets, righteous people, or others — has <strong>fallen into shirk</strong>.</div></div>

<div class="verse"><div class="v-ar">﴿قُلِ ادْعُوا الَّذِينَ زَعَمْتُم مِّن دُونِهِ فَلَا يَمْلِكُونَ كَشْفَ الضُّرِّ عَنكُمْ وَلَا تَحْوِيلًا ۝ أُولَٰئِكَ الَّذِينَ يَدْعُونَ يَبْتَغُونَ إِلَىٰ رَبِّهِمُ الْوَسِيلَةَ أَيُّهُمْ أَقْرَبُ وَيَرْجُونَ رَحْمَتَهُ وَيَخَافُونَ عَذَابَهُ ۚ إِنَّ عَذَابَ رَبِّكَ كَانَ مَحْذُورًا﴾</div><div class="v-translit">Quli dʿū alladhīna zaʿamtum min dūnihi fa-lā yamlikūna kashfa ḍ-ḍurri ʿankum wa lā taḥwīlā. Ulāʾika lladhīna yadʿūna yabtaghūna ilā rabbihimu l-wasīlata ayyuhum aqrab wa yarjūna raḥmatahu wa yakhāfūna ʿadhābah. Inna ʿadhāba rabbika kāna maḥdhūrā.</div><div class="v-en">"Say: <strong>Call upon those you have claimed besides Him — they cannot remove harm from you or shift it</strong>. <strong>Those they call upon</strong> [themselves] <strong>seek the means of access to their Lord</strong>, [striving as to] which of them would be nearest, and they hope for His mercy and fear His punishment. Indeed, the punishment of your Lord is ever feared."</div><div class="v-ref">Sūrat al-Isrāʾ 17:56–57</div></div>

<div class="body-text"><div class="bt-label">📖 Meaning of the Two Verses</div><div class="bt-ar">وَمَعْنَى الْآيَتَيْنِ الْكَرِيمَتَيْنِ:<br>أ. هَؤُلَاءِ الَّذِينَ يَدْعُوهُمُ الْمُشْرِكُونَ مِنْ دُونِ اللَّهِ تَعَالَى لَا يَمْلِكُونَ كَشْفَ الضُّرِّ عَنْهُمْ وَهُوَ رَفْعُهُ بِالْكُلِّيَّةِ، كَمَا لَا يَمْلِكُونَ تَحْوِيلَ هَذَا الضُّرِّ عَنْهُمْ إِلَى غَيْرِهِمْ، وَهَذَا دَلِيلٌ عَلَى ضَعْفِهِمْ، وَعَجْزِهِمْ، وَعَدَمِ صَلَاحِيَّتِهِمْ لِلتَّوَجُّهِ إِلَيْهِمْ بِالدُّعَاءِ مِنْ دُونِ اللَّهِ تَعَالَى.<br>ب. هَؤُلَاءِ الَّذِينَ يَدْعُوهُمُ الْمُشْرِكُونَ مِنْ دُونِ اللَّهِ مِثْلَ: الْمَلَائِكَةِ، أَوِ الْأَنْبِيَاءِ أَوِ الصَّالِحِينَ أَوْ غَيْرِهِمْ؛ هُمْ يَتَقَرَّبُونَ إِلَيْهِ سُبْحَانَهُ وَتَعَالَى بِالْأَعْمَالِ الصَّالِحَةِ، يَرْجُونَ بِذَلِكَ رَحْمَتَهُ، وَيَخَافُونَ عَذَابَهُ، فَكَانَ الْوَاجِبُ عَلَيْكُمْ: أَنْ تَفْعَلُوا كَمَا فَعَلُوا، فَتَتَقَرَّبُوا إِلَى اللَّهِ تَعَالَى وَتَدْعُوهُ وَحْدَهُ لَا شَرِيكَ لَهُ.</div><div class="bt-translit">Wa maʿnā l-āyatayni l-karīmatayn:<br>A. Hāʾulāʾi lladhīna yadʿūhumu l-mushrikūna min dūni-llāhi taʿālā lā yamlikūna kashfa ḍ-ḍurri ʿanhum wa huwa rafʿuhu bi-l-kulliyyah, kamā lā yamlikūna taḥwīla hādhā ḍ-ḍurri ʿanhum ilā ghayrihim, wa hādhā dalīlun ʿalā ḍaʿfihim, wa ʿajzihim, wa ʿadami ṣalāḥiyyatihim li-t-tawajjuhi ilayhim bi-d-duʿāʾi min dūni-llāhi taʿālā.<br>B. Hāʾulāʾi lladhīna yadʿūhumu l-mushrikūna min dūni-llāhi mithla: al-malāʾikah, aw al-anbiyāʾ aw aṣ-ṣāliḥīn aw ghayrihim; hum yataqarrabūna ilayhi subḥānahu wa taʿālā bi-l-aʿmāli ṣ-ṣāliḥah, yarjūna bi-dhālika raḥmatah, wa yakhāfūna ʿadhābah, fa-kāna l-wājibu ʿalaykum: an tafʿalū kamā faʿalū, fa-tataqarrabū ilā-llāhi taʿālā wa tadʿūhu waḥdahu lā sharīka lah.</div><div class="bt-en"><strong>(a)</strong> Those whom the polytheists call upon besides Allah <strong>cannot remove harm</strong> from them (which is <em>lifting it entirely</em>), nor can they <strong>transfer this harm to others</strong>. This is proof of their <strong>weakness, incapacity, and unsuitability</strong> for being turned to in supplication besides Allah.<br><strong>(b)</strong> Those whom the polytheists call upon besides Allah — such as <strong>the angels, prophets, righteous people,</strong> etc. — <strong>themselves seek nearness to Allah through good deeds</strong>, hoping for His mercy and fearing His punishment. So the obligation upon you is: <strong>to do as they do</strong> — to seek nearness to Allah and call upon Him alone, with no partner.</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Simple explanation</span><div class="study-note-body">Some people pray to saints, angels, or dead righteous people thinking "they\u2019re closer to Allah, they\u2019ll help me." But Allah explains in this verse: <strong>those beings are themselves asking Allah for mercy!</strong> They\u2019re like you and me — they also need Allah. You don\u2019t call a waiter to feed you when the chef himself is right there listening. Go <em>directly</em> to Allah — He hears you perfectly and loves when you ask Him.</div></div>`;}

<div class="point"><div class="point-num">٣</div><div class="point-body"><div class="point-ar">ثَالِثًا: مَحَبَّةُ غَيْرِ اللَّهِ كَمَحَبَّةِ اللَّهِ</div><div class="point-translit">Thālithan: Maḥabbatu ghayri-llāhi ka-maḥabbati-llāh</div><div class="point-en">Third: Loving Other Than Allah as One Loves Allah</div></div></div>

<div class="body-text"><div class="bt-label">📖 Textbook Passage</div><div class="bt-ar">مَنْ أَحَبَّ غَيْرَ اللَّهِ تَعَالَى كَمَحَبَّتِهِ لِلَّهِ تَعَالَى فَقَدِ اتَّخَذَهُ نِدًّا لِلَّهِ، وَوَقَعَ فِي الشِّرْكِ الْأَكْبَرِ، قَالَ اللَّهُ تَعَالَى:</div><div class="bt-translit">Man aḥabba ghayra-llāhi taʿālā ka-maḥabbatihi li-llāhi taʿālā fa-qad ittakhadhahu niddan li-llāh, wa waqaʿa fī sh-shirki l-akbar, qāla-llāhu taʿālā:</div><div class="bt-en">Whoever loves other than Allah <strong>with the same love he has for Allah</strong> has <strong>taken him as a rival (nidd) to Allah</strong>, and has <strong>fallen into major shirk</strong>. Allah — Exalted — said:</div></div>

<div class="verse"><div class="v-ar">﴿وَمِنَ النَّاسِ مَن يَتَّخِذُ مِن دُونِ اللَّهِ أَندَادًا يُحِبُّونَهُمْ كَحُبِّ اللَّهِ ۖ وَالَّذِينَ آمَنُوا أَشَدُّ حُبًّا لِّلَّهِ﴾</div><div class="v-translit">Wa mina n-nāsi man yattakhidhu min dūni-llāhi andādan yuḥibbūnahum ka-ḥubbi-llāh. Wa lladhīna āmanū ashaddu ḥubban li-llāh.</div><div class="v-en">"And among the people are those who <strong>take equals (andād) alongside Allah</strong>, <strong>loving them as they love Allah</strong>. But those who believe are <strong>stronger in love for Allah</strong>."</div><div class="v-ref">Sūrat al-Baqarah 2:165</div></div>

<div class="body-text"><div class="bt-ar">فَدَلَّتِ الْآيَةُ الْكَرِيمَةُ عَلَى أَنَّ الْحُبَّ الْمُقْتَضِيَ لِلذُّلِّ وَالْخُضُوعِ يَجِبُ أَنْ يَكُونَ لِلَّهِ تَعَالَى، وَلِهَذَا وَصَفَ اللَّهُ تَعَالَى عِبَادَهُ الْمُؤْمِنِينَ بِزِيَادَةِ مَحَبَّتِهِ عَلَى غَيْرِهِ، فَقَالَ: ﴿وَالَّذِينَ آمَنُوا أَشَدُّ حُبًّا لِلَّهِ﴾، فَمَنْ أَحَبَّ غَيْرَ اللَّهِ كَمَا يُحِبُّ اللَّهَ فَقَدْ وَقَعَ فِي (شِرْكِ الْمَحَبَّةِ).</div><div class="bt-translit">Fa-dallati l-āyatu l-karīmatu ʿalā anna l-ḥubba l-muqtaḍiya li-dh-dhulli wa l-khuḍūʿi yajibu an yakūna li-llāhi taʿālā, wa li-hādhā waṣafa-llāhu taʿālā ʿibādahu l-muʾminīna bi-ziyādati maḥabbatihi ʿalā ghayrih, fa-qāla: ﴿wa lladhīna āmanū ashaddu ḥubban li-llāh﴾, fa-man aḥabba ghayra-llāhi kamā yuḥibbu-llāha fa-qad waqaʿa fī (shirki l-maḥabbah).</div><div class="bt-en">The noble verse indicates that <strong>the love which entails humility and submission must be only for Allah</strong>. That is why Allah describes His believing servants as having <strong>greater love for Him than for others</strong>, saying: <em>"Those who believe are stronger in love for Allah."</em> Whoever loves another as he loves Allah has fallen into <strong>"shirk of love" (shirk al-maḥabbah)</strong>.</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Wait — isn't it OK to love my family?</span><div class="study-note-body">Yes of course! Islam encourages love for family, kindness to friends, and obedience to parents and teachers in good things. The problem is only when you love someone or something <em>as much as or more than Allah</em>, or obey someone in <em>disobedience to Allah</em>. Example: a friend tells you to skip prayer — obeying them in <em>that</em> would be shirk, because you\u2019re putting their command above Allah\u2019s command. But helping your friend with homework? That\u2019s just being kind — not shirk at all.</div></div>

<div class="activity" id="al4p2a"><div class="section-badge">نَشَاط ١ · Activity 1</div>
<div class="act-item"><div class="act-prompt"><strong style="color:var(--teal)">قَالَ اللَّهُ تَعَالَى مُبَيِّنًا مَا يَقُولُهُ الْمُشْرِكُونَ فِي النَّارِ: ﴿تَاللَّهِ إِن كُنَّا لَفِي ضَلَالٍ مُّبِينٍ ۝ إِذْ نُسَوِّيكُم بِرَبِّ الْعَالَمِينَ﴾</strong><br><em style="color:var(--muted);font-size:.82rem">Qāla-llāhu taʿālā mubayyinan mā yaqūluhu l-mushrikūna fī n-nār: "Ta-llāhi in kunnā la-fī ḍalālin mubīn, idh nusawwīkum bi-rabbi l-ʿālamīn."</em><br>Allah — Exalted — said, describing what the polytheists will say in the Fire: "By Allah, we were indeed in manifest error when we equated you with the Lord of all the worlds!" (ash-Shuʿarāʾ 26:97–98)<br><br><strong>مَا عَلَاقَةُ الْآيَاتِ بِمَحَبَّةِ غَيْرِ اللَّهِ؟</strong> / What is the relation of these verses to loving other than Allah?</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box">The polytheists in the Fire confess their error: they had <strong>equated (nusawwīkum)</strong> their false deities with Allah in love, devotion, and worship. Loving others as one loves Allah is exactly this ẓulm — making them rivals (andād) to the Lord of all worlds.</div></div></div>

<div class="point"><div class="point-num">٤</div><div class="point-body"><div class="point-ar">رَابِعًا: طَاعَةُ غَيْرِ اللَّهِ فِي تَحْلِيلِ الْحَرَامِ أَوْ تَحْرِيمِ الْحَلَالِ</div><div class="point-translit">Rābiʿan: Ṭāʿatu ghayri-llāhi fī taḥlīli l-ḥarāmi aw taḥrīmi l-ḥalāl</div><div class="point-en">Fourth: Obeying Others in Making the Forbidden Lawful or the Lawful Forbidden</div></div></div>

<div class="body-text"><div class="bt-label">📖 Textbook Passage</div><div class="bt-ar">التَّشْرِيعُ حَقٌّ لِلَّهِ تَعَالَى، فَلَا يَجُوزُ طَاعَةُ أَحَدٍ فِي تَحْلِيلِ مَا حَرَّمَ اللَّهُ، وَلَا فِي تَحْرِيمِ مَا أَحَلَّ اللَّهُ تَعَالَى، سَوَاءٌ أَكَانَ مِنَ الْعُلَمَاءِ، أَوْ رُؤَسَاءِ الْقَبَائِلِ أَوْ غَيْرِهِمْ؛ فَإِنْ أَطَاعَهُمْ مَعَ عِلْمِهِ بِأَنَّهُ مُخَالِفٌ لِحُكْمِ اللَّهِ فَإِنَّ ذَلِكَ مِنَ اتِّخَاذِهِمْ آلِهَةً مِنْ دُونِ اللَّهِ عَزَّ وَجَلَّ، وَهَذَا مِنَ الشِّرْكِ الْأَكْبَرِ، وَيُسَمَّى هَذَا النَّوْعُ مِنَ الشِّرْكِ: (شِرْكُ الطَّاعَةِ).</div><div class="bt-translit">At-tashrīʿu ḥaqqun li-llāhi taʿālā, fa-lā yajūzu ṭāʿatu aḥadin fī taḥlīli mā ḥarrama-llāh, wa lā fī taḥrīmi mā aḥalla-llāhu taʿālā, sawāʾun a-kāna mina l-ʿulamāʾ, aw ruʾasāʾi l-qabāʾili aw ghayrihim; fa-in aṭāʿahum maʿa ʿilmihi bi-annahu mukhālifun li-ḥukmi-llāhi fa-inna dhālika mina ttikhādhihim ālihatan min dūni-llāhi ʿazza wa jall, wa hādhā mina sh-shirki l-akbar, wa yusammā hādhā n-nawʿu mina sh-shirk: (shirku ṭ-ṭāʿah).</div><div class="bt-en"><strong>Legislation is Allah\u2019s right alone</strong>. It is <strong>not permitted to obey anyone</strong> in <strong>making lawful what Allah has forbidden</strong>, nor in <strong>making forbidden what Allah has made lawful</strong> — whether they are scholars, tribal leaders, or anyone else. If someone obeys them <strong>knowing it contradicts Allah\u2019s ruling</strong>, that counts as <strong>taking them as deities besides Allah</strong> — and this is <strong>major shirk</strong>. This type of shirk is called <strong>"shirk of obedience" (shirk aṭ-ṭāʿah)</strong>.</div></div>

<div class="verse"><div class="v-ar">﴿وَلَا تَقُولُوا لِمَا تَصِفُ أَلْسِنَتُكُمُ الْكَذِبَ هَٰذَا حَلَالٌ وَهَٰذَا حَرَامٌ لِّتَفْتَرُوا عَلَى اللَّهِ الْكَذِبَ ۚ إِنَّ الَّذِينَ يَفْتَرُونَ عَلَى اللَّهِ الْكَذِبَ لَا يُفْلِحُونَ﴾</div><div class="v-translit">Wa lā taqūlū li-mā taṣifu alsinatukumu l-kadhiba hādhā ḥalālun wa hādhā ḥarāmun li-taftarū ʿalā-llāhi l-kadhib. Inna lladhīna yaftarūna ʿalā-llāhi l-kadhiba lā yufliḥūn.</div><div class="v-en">"And <strong>do not say</strong> about what your tongues falsely describe: <strong>'This is lawful and this is forbidden'</strong> — to fabricate lies about Allah. Indeed, <strong>those who fabricate lies about Allah will not succeed</strong>."</div><div class="v-ref">Sūrat an-Naḥl 16:116</div></div>

<div class="activity" id="al4p2b"><div class="section-badge">نَشَاط ٢ · Activity 2</div>
<div class="act-item"><div class="act-prompt"><strong style="color:var(--teal)">(عِبَادَةُ اللَّهِ تَعَالَى لَا تَصِحُّ إِلَّا بِالْكُفْرِ بِالطَّاغُوتِ)<br>أَذْكُرْ دَلِيلًا مِنَ الْقُرْآنِ الْكَرِيمِ يَدُلُّ عَلَى هَذَا الْحُكْمِ.</strong><br><em style="color:var(--muted);font-size:.82rem">(ʿIbādatu-llāhi taʿālā lā taṣiḥḥu illā bi-l-kufri bi-ṭ-ṭāghūt) — Adhkur dalīlan mina l-qurʾāni l-karīmi yadullu ʿalā hādhā l-ḥukm.</em><br><strong>"Worship of Allah is not valid except through disbelief in Ṭāghūt (false deities)."</strong> Mention an evidence from the Noble Qur\u2019an that indicates this ruling.</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>﴿وَلَقَدْ بَعَثْنَا فِي كُلِّ أُمَّةٍ رَّسُولًا أَنِ اعْبُدُوا اللَّهَ وَاجْتَنِبُوا الطَّاغُوتَ﴾</strong> — Sūrat an-Naḥl 16:36. <br><strong>Worship of Allah</strong> and <strong>rejection/avoidance of Ṭāghūt</strong> are joined as a single command — one without the other is not valid tawhid.</div></div></div>`;}

<div class="assessment" id="as4p3"><div class="section-badge">التَّقْوِيم · Assessment</div><p class="assessment-intro" style="margin-top:8px">Attempt before revealing.</p><div class="activity-controls"><button class="btn-reveal-all" onclick="revealAll(document.getElementById('as4p3'))">Reveal All</button><button class="btn-hide-all" onclick="hideAll(document.getElementById('as4p3'))">Hide All</button></div>

function L5P1(){return `
<div class="sec"><div class="sec-ar">الْمُرَادُ بِالشَّهَادَتَيْنِ</div><div class="sec-translit">Al-murādu bi-sh-shahādatayn</div><div class="sec-en">What is Meant by the Two Testimonies</div></div>
<div class="defbox"><div class="defbox-tag green-light">The Two Testimonies are the saying of:</div><div class="defbox-body"><div class="defbox-ar">أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا اللَّهُ، وَأَشْهَدُ أَنَّ مُحَمَّدًا رَسُولُ اللَّهِ.</div><div class="defbox-translit">Ashhadu an lā ilāha illā-llāh, wa ashhadu anna Muḥammadan rasūlu-llāh.</div><div class="defbox-en">"I bear witness that there is no deity worthy of worship except Allah, and I bear witness that Muḥammad is the Messenger of Allah."</div></div></div>
<div class="defbox"><div class="defbox-tag gold">Meaning of Shahādah</div><div class="defbox-body"><div class="defbox-en"><strong>Ash-shahādah</strong>: acknowledgement and admission — <em>al-iqrāru wa-l-iʿtirāf</em>.</div></div></div>
<div class="sec"><div class="sec-ar">مَكَانَةُ الشَّهَادَتَيْنِ وَحُكْمُهُمَا</div><div class="sec-en">Standing & Ruling of the Two Testimonies</div></div>
<ul class="num-list">
<li data-n="1"><div class="li-en">They are the <strong>first pillar of Islam</strong>. Islam is not valid without them for one capable of pronouncing them.</div></li>
<li data-n="2"><div class="li-en">Allah does not accept any deed — prayer, zakāh, ḥajj — until a person testifies to both testimonies.</div></li>
</ul>
<div class="hadith"><div class="hadith-label">Ḥadīth — Ibn ʿUmar</div><div class="h-ar">«الإِسْلَامُ أَنْ تَشْهَدَ أَنْ لَا إِلَهَ إِلَّا اللَّهُ وَأَنَّ مُحَمَّدًا رَسُولُ اللَّهِ»</div><div class="h-translit">Al-Islāmu an tashhada an lā ilāha illā-llāh wa anna Muḥammadan rasūlu-llāh.</div><div class="h-en">"Islam is that you bear witness that there is no deity but Allah and that Muḥammad is the Messenger of Allah."</div><div class="h-source">Narrated by al-Bukhārī no. 25</div></div><div class="study-note beginner"><span class="study-note-label">💡 Why say it out loud?</span><div class="study-note-body">You might wonder: if you believe in Allah in your heart, why do you have to <em>say</em> the shahādah with your mouth? Think of it like this: when you join a sports team, you might feel in your heart "I'm on this team!" — but it's only official when you <em>tell</em> the coach and sign your name. The shahādah is like saying "I'm officially on Team Tawhid." It's how you announce to Allah, to angels, and to the Muslim community that you are with them.</div></div>`;}

function L5P2(){return `
<div class="sec"><div class="sec-ar">مَعْنَى أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا اللَّهُ</div><div class="sec-en">The Meaning of "Lā ilāha illā-llāh"</div></div>
<div class="defbox"><div class="defbox-tag" style="background:var(--teal-mid)">Its Meaning</div><div class="defbox-body"><div class="defbox-en">I acknowledge and certify that there is no deity worthy of worship by right except Allah alone — with no partner — and I negate every other deity and invalidate it.</div></div></div>
<div class="sec"><div class="sec-ar">أَرْكَانُ شَهَادَةِ أَنْ لَا إِلَهَ إِلَّا اللَّهُ</div><div class="sec-en">The Two Pillars of "Lā ilāha illā-llāh"</div></div>
<div class="compare-grid">
  <div class="compare-card"><div class="compare-card-head teal"><span class="ch-ar">الرُّكْنُ الأَوَّلُ: النَّفْيُ</span><span class="ch-translit">An-nafī — Negation</span></div><ul class="compare-card-body"><li>Phrase: «لَا إِلَهَ»</li><li>Negates all deities worshipped besides Allah</li></ul></div>
  <div class="compare-card"><div class="compare-card-head gold"><span class="ch-ar">الرُّكْنُ الثَّانِي: الإِثْبَاتُ</span><span class="ch-translit">Al-ithbāt — Affirmation</span></div><ul class="compare-card-body"><li>Phrase: «إِلَّا اللَّهُ»</li><li>Affirms Allah alone is the true deity</li></ul></div>
</div>
<div class="verse"><div class="v-ar">﴿وَاعْبُدُوا اللَّهَ وَلَا تُشْرِكُوا بِهِ شَيْئًا﴾</div><div class="v-translit">Wa-ʿbudū-llāha wa lā tushrikū bihi shayʾā.</div><div class="v-en">"Worship Allah and associate nothing with Him."</div><div class="v-ref">Sūrat an-Nisāʾ 4:36</div></div>
<ul class="impl-list">
<li><strong>﴿وَلَا تُشْرِكُوا﴾</strong> → Negation: negates all false deities</li>
<li><strong>﴿اعْبُدُوا اللَّهَ﴾</strong> → Affirmation: establishes Allah’s exclusive right to worship</li>
<li><strong>﴿شَيْئًا﴾</strong> (indefinite in negation) → negates everything — no prophet, angel, saint, grave, or anything else</li>
</ul><div class="study-note beginner"><span class="study-note-label">💡 Why two parts? Why can't we just say "I believe in Allah"?</span><div class="study-note-body">Imagine your house has electricity. If you want a new lamp, there are <em>two</em> steps: (1) <strong>unplug</strong> the broken lamp, and (2) <strong>plug in</strong> the new one. Just plugging in the new one without unplugging the broken one won't work! That's why the shahādah has two halves: first we say <strong>"lā ilāha"</strong> — there is no god (unplug all false gods), <em>then</em> <strong>"illā-llāh"</strong> — except Allah (plug in the true God). Both parts are needed.</div></div>`;}

function L5P3(){return `
<div class="sec"><div class="sec-ar">شُرُوطُ شَهَادَةِ أَنْ لَا إِلَهَ إِلَّا اللَّهُ</div><div class="sec-en">The Seven Conditions of Lā ilāha illā-llāh</div></div>
<p style="margin-bottom:12px">The testimony has seven conditions:</p><div class="study-note beginner"><span class="study-note-label">💡 How to remember the 7 conditions</span><div class="study-note-body">A traditional memorization trick: <em>"ʿIlm yaqīn ikhlāṣ ṣidq maḥabbah, inqiyād qabūl hakadha fāttibiʿ"</em> — a rhyme listing: Knowledge, Certainty, Sincerity, Truthfulness, Love, Submission, Acceptance. Each condition <em>contradicts</em> a specific disease of the heart (e.g., knowledge contradicts ignorance). Understanding the <em>contrast</em> helps you remember each one.</div></div>
${[
['الْعِلْمُ الْمُنَافِي لِلْجَهْلِ','Al-ʿilmu l-munāfī li-l-jahl','Knowledge','Knowing its meaning: no deity is worthy of worship except Allah; every other deity is false.'],
['الْيَقِينُ الْمُنَافِي لِلشَّكِّ','Al-yaqīn — certainty','Certainty','Certainty in the heart about this meaning, not doubting Allah\'s oneness.'],
['الإِخْلَاصُ الْمُنَافِي لِلشِّرْكِ','Al-ikhlāṣ — sincerity','Sincerity','Not making any partner alongside Allah; purifying all deeds from shirk.'],
['الصِّدْقُ الْمُنَافِي لِلْكَذِبِ','Aṣ-ṣidq — truthfulness','Truthfulness','Saying it with the heart believing it — unlike the hypocrite who says it with the tongue only.'],
['الْمَحَبَّةُ الْمُنَافِيَةُ لِبُغْضِهَا','Al-maḥabbah — love','Love','Loving this testimony and what it entails; hating what contradicts it.'],
['الْقَبُولُ الْمُنَافِي لِلرَّدِّ','Al-qabūl — acceptance','Acceptance','Accepting what the testimony requires with heart, tongue, and limbs; not rejecting anything from its meaning.'],
['الاِنْقِيَادُ الْمُنَافِي لِلتَّرْكِ','Al-inqiyād — submission','Submission','Submitting to what the testimony demands, following what it leads to of tawhid and Sharīʿah.'],
].map((c,i)=>`<div class="cond-item"><div class="cond-n">${i+1}</div><div class="cond-ar">${c[0]}</div><div class="cond-highlight">${c[2]}</div><div class="cond-translit">${c[1]}</div><div class="cond-en">${c[3]}</div></div>`).join('')}
<div class="study-note beginner"><span class="study-note-label">💡 Example of each condition (simple)</span><div class="study-note-body"><strong>1. Knowledge:</strong> Knowing what "no god but Allah" actually means.<br><strong>2. Certainty:</strong> Being 100% sure — no "maybe" or "I think."<br><strong>3. Sincerity:</strong> Saying it for Allah's sake, not to impress people.<br><strong>4. Truthfulness:</strong> Saying it from your heart, not just mouth.<br><strong>5. Love:</strong> Loving this statement and what it stands for.<br><strong>6. Acceptance:</strong> Accepting <em>everything</em> it requires — not picking and choosing.<br><strong>7. Submission:</strong> Actually <em>doing</em> what it demands — praying, obeying Allah, avoiding shirk.<br><br>Think of it like being on a football team: you need to know the rules (1), be sure you're on the team (2), play for the team not yourself (3), really be a member (4), love the team (5), accept all the rules (6), and actually show up and play (7)!</div></div><div class="callout" style="margin-top:16px"><div class="callout-label">Note: Acceptance vs. Submission</div><div class="callout-en"><strong>Qabūl</strong> (acceptance): affirming the meaning in speech — demonstrated by the tongue. <strong>Inqiyād</strong> (submission): acting on what it entails — demonstrated in action.</div></div>`;}

function L5P4(){return `
<div class="sec"><div class="sec-ar">مَتَى تَنْفَعُ الشَّهَادَةُ قَائِلَهَا؟</div><div class="sec-en">When Does the Testimony Benefit Its Sayer?</div></div>
<p style="margin-bottom:10px">The testimony benefits its sayer only when he acts upon all its conditions. It does not benefit:</p>
<ul class="impl-list">
<li>One who worships other than Allah alongside saying it</li>
<li>One who does not comply with Allah’s law</li>
<li>One who affirms false deities alongside saying it</li>
</ul>
<div class="callout teal"><div class="callout-label">The Key Analogy — Wahb ibn Munabbih</div><div class="callout-en">Someone asked: "Is not lā ilāha illā-llāh the key to Paradise?" He said: "Yes — but every key has teeth. If you bring a key with the right teeth, it opens. Otherwise, it won’t open."</div></div><div class="study-note beginner"><span class="study-note-label">💡 The key analogy — super important!</span><div class="study-note-body">Every key has little bumps and grooves on it (the "teeth"). You can't open a door with a key-shaped piece of metal that has <em>no teeth</em> — you need the <em>right</em> teeth. The shahādah is the key to Paradise. But its "teeth" are the <strong>7 conditions</strong> (knowledge, certainty, sincerity, truthfulness, love, acceptance, submission). If you just say the words without the conditions, it's like bringing a smooth piece of metal to the door of Paradise — it won't open. But if you say it with all 7 conditions? The door opens wide!</div></div>
<div class="assessment" id="as5p4"><div class="section-badge">التَّقْوِيم · Assessment</div><p class="assessment-intro" style="margin-top:8px">Attempt before revealing.</p><div class="activity-controls"><button class="btn-reveal-all" onclick="revealAll(document.getElementById('as5p4'))">Reveal All</button><button class="btn-hide-all" onclick="hideAll(document.getElementById('as5p4'))">Hide All</button></div>
<div class="q-item"><span class="q-num">1</span><div class="q-en">What is the meaning of "I bear witness that there is no god but Allah"?</div><div class="q-ar">مَا مَعْنَى شَهَادَةِ أَنْ لَا إِلَهَ إِلَّا اللَّهُ؟</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box">I acknowledge and certify that there is no deity worthy of worship by right except Allah alone, with no partner; and I negate every other deity and invalidate it.</div></div>
<div class="q-item"><span class="q-num">2</span><div class="q-en">When does the testimony benefit its sayer?</div><div class="q-ar">مَتَى تَنْفَعُ شَهَادَةُ أَنْ لَا إِلَهَ إِلَّا اللَّهُ قَائِلَهَا؟</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box">When its sayer acts upon all seven conditions — truly worshipping Allah alone and complying with His Sharīʿah. Simply saying the words while contradicting their meaning does not benefit.</div></div></div>`;}

// ── LESSON 6 ──────────────────────────────────────────────
function L6P1(){return `
<div class="sec"><div class="sec-ar">مَعْنَى أَشْهَدُ أَنَّ مُحَمَّدًا رَسُولُ اللَّهِ</div><div class="sec-en">The Meaning of "Muḥammad is the Messenger of Allah"</div></div>
<div class="defbox"><div class="defbox-tag" style="background:var(--teal-mid)">Its Meaning</div><div class="defbox-body"><div class="defbox-en">To acknowledge and certify that Muḥammad ﷺ is the Messenger of Allah — sent to all of humanity (humans and jinn) — and that he is the seal of the prophets ﷺ.</div></div></div>
<div class="sec"><div class="sec-ar">مَا تَضَمَّنَتْهُ الشَّهَادَةُ</div><div class="sec-en">What the Testimony Contains</div></div>
<ul class="num-list">
<li data-n="1"><div class="li-en"><strong>Believing</strong> he was sent by Allah with truth, guidance, good news, and warning.</div></li>

<li data-n="3"><div class="li-en"><strong>Believing</strong> his message is universal — to all of humanity: humans and jinn.</div></li>
<li data-n="4"><div class="li-en"><strong>Believing</strong> he ﷺ is the seal of the prophets — no prophet after him ﷺ.</div></li>
<li data-n="5"><div class="li-en"><strong>Testifying</strong> he ﷺ conveyed the message, fulfilled the trust, and strove until Allah completed the religion.</div></li>
</ul><div class="study-note beginner"><span class="study-note-label">💡 Why is the second testimony about Muḥammad ﷺ?</span><div class="study-note-body">You might wonder: we already believe in Allah — why do we need a second testimony about the Prophet? Because believing Allah exists isn't enough — we also need to know <em>how</em> to worship Him, <em>what</em> He wants, and <em>what's right and wrong</em>. And the only way to know that is through His messenger. Muḥammad ﷺ is like our guide: Allah sent him to teach us everything. Saying the second testimony means: "I accept Muḥammad ﷺ as my teacher and guide, and I'll follow what he taught."</div></div>
<div class="activity" id="al6p1"><div class="section-badge">نَشَاط · Activity</div><div class="act-item"><div class="act-prompt">List five things that would contradict the testimony that Muḥammad ﷺ is the Messenger of Allah:</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box">1. Denying he was sent by Allah.<br>2. Rejecting any part of what he conveyed.<br>3. Claiming his message was for Arabs only.<br>4. Believing there is a prophet after him.<br>5. Disobeying his commands while knowing they come from Allah.</div></div></div>`;}

<ul class="num-list">

<li data-n="7"><div class="li-en"><strong>Avoiding exaggeration</strong> about him and raising him beyond the station Allah has placed him.</div></li>

</ul>`;}

function L7P1(){return `
<div class="sec"><div class="sec-ar">تَعْرِيفُ الشِّرْكِ</div><div class="sec-en">Definition of Shirk</div></div>
<div class="defbox"><div class="defbox-tag gold">Linguistically · لُغَةً</div><div class="defbox-body"><div class="defbox-ar">الشِّرْكُ لُغَةً: التَّسْوِيَةُ.</div><div class="defbox-en">To equate; to make equal.</div></div></div>
<div class="defbox" style="border:2px solid var(--teal-mid)"><div class="defbox-tag" style="background:var(--teal-mid)">Technically · شَرْعًا</div><div class="defbox-body"><div class="defbox-ar">جَعْلُ شَرِيكٍ مَعَ اللَّهِ تَعَالَى.</div><div class="defbox-en">Making a partner alongside Allah (the Exalted).</div></div></div><div class="study-note root-tip"><span class="study-note-label">🌱 Word root insight</span><div class="study-note-body">The word <strong>شِرْك (shirk)</strong> literally means "partnership" or "sharing." In business, a <em>sharīk</em> is a business partner who shares in ownership. In ʿaqīdah, shirk means setting up a "partner" with Allah in what belongs to Him alone. The word itself reveals the crime: claiming a share in what only Allah owns.</div></div>
<div class="sec"><div class="sec-ar">أَنْوَاعُ الشِّرْكِ — النَّوْعُ الأَوَّلُ</div><div class="sec-en">Types of Shirk — First Type</div></div>
<div class="virtue"><div class="virtue-head"><div class="virtue-n">1</div><div class="virtue-head-text"><div class="vh-label">First Type</div><div class="vh-ar">الشِّرْكُ الأَكْبَرُ</div><div class="vh-translit">Ash-Shirku l-Akbar</div><div class="vh-en">Major Shirk</div></div></div>
<div class="virtue-body"><p><strong>Definition:</strong> Making a partner with Allah in His Lordship, worship, or Names and Attributes.</p>
<p style="margin-top:8px;font-weight:600;color:var(--teal)">Examples:</p>
<ul class="impl-list">
<li>Believing someone other than Allah controls events in the universe.</li>
<li>Supplicating to other than Allah — angels, prophets, or the righteous.</li>
<li>Slaughtering in the name of other than Allah.</li>
</ul></div></div><div class="study-note beginner"><span class="study-note-label">💡 Why "major" and "minor"?</span><div class="study-note-body">Think of two levels of damage:<br>• <strong>Major shirk</strong> is like a house burning down — it destroys the whole faith. If you die with it, you're not even a Muslim anymore.<br>• <strong>Minor shirk</strong> is like breaking a window in that house — the house still stands, but there's damage. A Muslim is still a Muslim, but they lost rewards.<br>Both are dangerous! But the <em>major</em> one is the one that would make Allah say "this person was never really with Me at all."</div></div>`;}

<div class="activity-controls"><button class="btn-reveal-all" onclick="revealAll(document.getElementById('al7p2'))">Reveal All</button><button class="btn-hide-all" onclick="hideAll(document.getElementById('al7p2'))">Hide All</button></div>

<div class="q-item"><span class="q-num">2</span><div class="q-en">What are the types of shirk?</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box">Two types: (1) Major Shirk — takes one out of Islam. (2) Minor Shirk — does not take one out of Islam.</div></div>

// ── LESSON 8 ──────────────────────────────────────────────
function L8P1(){return `
<div class="sec"><div class="sec-ar">الشِّرْكُ أَعْظَمُ الذُّنُوبِ</div><div class="sec-en">Shirk is the Greatest Sin</div></div>
<div class="hadith"><div class="hadith-label">Ḥadīth — ʿAbdullāh ibn Masʿūd</div><div class="h-ar">«أَيُّ الذَّنْبِ أَعْظَمُ عِنْدَ اللَّهِ؟ قَالَ: أَنْ تَجْعَلَ لِلَّهِ نِدًّا وَهُوَ خَلَقَكَ»</div><div class="h-translit">Ayyu dh-dhanbi aʿẓamu ʿinda-llāh? Qāla: An tajʿala li-llāhi nddan wa huwa khalaqak.</div><div class="h-en">"Which sin is greatest before Allah?" He ﷺ said: "That you make a rival for Allah while He created you."</div><div class="h-source">Narrated by al-Bukhārī no. 4207 and Muslim no. 86</div></div><div class="study-note remember"><span class="study-note-label">⭐ Why shirk is the greatest sin</span><div class="study-note-body">Notice the Prophet’s ﷺ reasoning: <em>"...while He created you."</em> The ingratitude is staggering — Allah brought you from nothing into existence, provides every breath, and you turn around and assign His rights to something else. This is why shirk is uniquely unforgiveable if one dies on it: it rejects the most fundamental relationship a creature has with its Creator.</div></div>
<div class="sec"><div class="sec-ar">الشِّرْكُ أَعْظَمُ أَنْوَاعِ الظُّلْمِ</div><div class="sec-en">Shirk is the Gravest Form of Injustice</div></div>
<div class="verse"><div class="v-ar">﴿يَا بُنَيَّ لَا تُشْرِكْ بِاللَّهِ إِنَّ الشِّرْكَ لَظُلْمٌ عَظِيمٌ﴾</div><div class="v-translit">Yā bunayya lā tushrik bi-llāh, inna sh-shirka la-ẓulmun ʿaẓīm.</div><div class="v-en">"O my dear son, do not associate partners with Allah. Indeed, shirk is a grave injustice."</div><div class="v-ref">Sūrat Luqmān 31:13</div></div><div class="study-note beginner"><span class="study-note-label">💡 Who is Luqmān?</span><div class="study-note-body">Luqmān was a wise man (some say a prophet, most scholars say he was a righteous servant of Allah) whom Allah praises in the Qur'an. He had a son, and Allah recorded the advice Luqmān gave his son. The <em>very first thing</em> a wise father told his beloved son was: "My dear son, don't ever do shirk — it's the worst injustice." That's how important tawhid is — the most important advice a wise parent can give.</div></div><div class="sec"><div class="sec-ar">مَنْ مَاتَ عَلَى الشِّرْكِ دَخَلَ النَّارَ</div><div class="sec-en">Whoever Dies upon Shirk Enters the Fire</div></div>

function L8P2(){return `
<div class="sec"><div class="sec-ar">لَا يَنْفَعُ مَعَ الشِّرْكِ عَمَلٌ</div><div class="sec-en">No Deed Benefits Alongside Shirk</div></div>
<div class="verse"><div class="v-ar">﴿وَقَدِمْنَا إِلَىٰ مَا عَمِلُوا مِنْ عَمَلٍ فَجَعَلْنَاهُ هَبَاءً مَّنثُورًا﴾</div><div class="v-translit">Wa qadimna ilā mā ʿamilū min ʿamalin fa-jaʿalnāhu habāʾan manthūrā.</div><div class="v-en">"And We will approach what they have done of deeds and make them as dust dispersed."</div><div class="v-ref">Sūrat al-Furqān 25:23</div></div><div class="study-note remember"><span class="study-note-label">⭐ Scary but important</span><div class="study-note-body">Imagine someone who did <em>amazing</em> things: gave millions to charity, helped thousands of people, built hospitals, prayed all night. But they also died believing another god alongside Allah. This verse says all those good deeds will become <strong>"habāʾan manthūrā"</strong> — dust scattered in the wind. Gone. Nothing.<br><br>The lesson: <strong>Tawhid is the foundation.</strong> No matter how many good deeds you do, if the foundation is broken, the whole building collapses. Keep the foundation strong first — <em>then</em> build on it.</div></div>
<div class="sec"><div class="sec-ar">الشِّرْكُ افْتِرَاءٌ عَظِيمٌ</div><div class="sec-en">Shirk is a Grave Slander Against Allah</div></div>
<div class="study-note beginner"><span class="study-note-label">💡 Why is shirk called "slander"?</span><div class="study-note-body">Slander (<em>iftirāʾ</em>) means lying about someone to damage their reputation. When someone commits shirk, they're basically saying: "Allah needs help," or "Allah has a partner" — which is <strong>a lie about Allah Himself</strong>. And it's a lie about the greatest, most perfect Being in existence! Imagine lying about a regular person — that's bad. Now imagine lying about the Creator of everything — that's infinitely worse. That's why Allah calls shirk <em>iftirāʾun ʿaẓīm</em> (a grave slander).</div></div><ul class="num-list">
<li data-n="1"><div class="li-en">Allah described shirk as a grave slander: <span style="font-family:'Cormorant Garamond',serif">﴿وَمَن يُشْرِكْ بِاللَّهِ فَقَدِ افْتَرَىٰ إِثْمًا عَظِيمًا﴾</span> — "Whoever associates partners with Allah has fabricated a tremendous sin." (Sūrat an-Nisāʾ 4:48)</div></li>
<li data-n="2"><div class="li-en">It involves assigning the right of worship — which is Allah’s exclusive right — to someone other than Him, then worshipping the created instead of the Creator.</div></li>
</ul>`;}

function L9P2(){return `

function L10P1(){return `
<div class="sec"><div class="sec-ar">المُرَادُ بِالشِّرْكِ فِي الرُّبُوبِيَّةِ</div><div class="sec-translit">Al-murādu bi-sh-shirki fī ar-rubūbiyyah</div><div class="sec-en">What is Meant by Shirk in Lordship</div></div>
<div class="defbox" style="border:2px solid var(--teal-mid)"><div class="defbox-tag" style="background:var(--teal-mid)">📌 Definition</div><div class="defbox-body"><div class="defbox-ar">جَعْلُ شَرِيكٍ مَعَ اللَّهِ تَعَالَى فِي رُبُوبِيَّتِهِ.</div><div class="defbox-translit">Jaʿlu sharīkin maʿa-llāhi taʿālā fī rubūbiyyatihi.</div><div class="defbox-en">Making a partner alongside Allah (the Exalted) in His <strong>Lordship</strong> — in His actions of creating, providing, owning, giving life, causing death, and managing the universe.</div></div></div>

<div class="study-note beginner"><span class="study-note-label">📚 Beginner tip</span><div class="study-note-body">Remember from Lesson 1: tawḥīd has three categories. This lesson and the next are about the opposite — shirk in each category. <strong>Shirk in rubūbiyyah</strong> = claiming someone/something shares Allah's role as Creator, Provider, Controller of the universe.</div></div>

<div class="sec"><div class="sec-ar">أَمْثِلَةٌ</div><div class="sec-translit">Amthilah</div><div class="sec-en">Examples</div></div>
<ul class="num-list">
<li data-n="1"><div class="li-en"><strong>Believing in the existence of a creator alongside Allah</strong> — <em>iʿtiqādu wujūdi khāliqin maʿa-llāhi taʿālā</em>.</div></li>
<li data-n="2"><div class="li-en"><strong>Believing that any created being has power to dispose of affairs in the universe</strong> — <em>iʿtiqādu anna li-aḥadin mina l-khalqi l-qudrata ʿalā at-taṣarrufi fī l-kawn</em>.</div></li>
<li data-n="3"><div class="li-en"><strong>Believing that anyone knows the absolute unseen besides Allah</strong> — <em>iʿtiqādu anna aḥadan yaʿlamu l-ghayba l-muṭlaqa ghayra-llāhi taʿālā</em>.</div></li>
<li data-n="4"><div class="li-en"><strong>Believing that any created being has absolute power to benefit or harm</strong> — <em>iʿtiqādu anna li-aḥadin al-qudrata l-muṭlaqata ʿalā an-nafʿi wa aḍ-ḍarri ghayra-llāhi taʿālā</em>.</div></li>
</ul>

<div class="callout"><div class="callout-label">Application</div><div class="callout-en">Whoever believes that anyone from creation has the power to control or manage the universe — like those who believe this about <em>awliyāʾ</em> (saints) or the righteous — has claimed a partner for Allah in His Lordship.</div></div>

<div class="verse"><div class="v-ar">﴿ذَٰلِكُمُ اللَّهُ رَبُّكُمْ لَهُ الْمُلْكُ ۚ وَالَّذِينَ تَدْعُونَ مِن دُونِهِ مَا يَمْلِكُونَ مِن قِطْمِيرٍ﴾</div><div class="v-translit">Dhālikumu-llāhu rabbukum lahu l-mulk; wa-lladhīna tadʿūna min dūnihi mā yamlikūna min qiṭmīr.</div><div class="v-en">"That is Allah, your Lord. To Him belongs sovereignty. And those you call upon besides Him do not possess [even] the membrane of a date seed."</div><div class="v-ref">Sūrat Fāṭir 35:13</div></div>

<div class="study-note root-tip"><span class="study-note-label">🌱 Word of the day</span><div class="study-note-title">قِطْمِير · qiṭmīr</div><div class="study-note-body">The thin, papery membrane on a date seed — something so tiny and worthless that no one would fight over it. Allah uses this image to show how utterly powerless "gods besides Him" truly are. They don't even own a qiṭmīr. A beautiful example of how the Qur'an uses vivid imagery.</div></div>
`;}

function L10P2(){return `
<div class="sec"><div class="sec-ar">حُكْمُ الشِّرْكِ فِي الرُّبُوبِيَّةِ</div><div class="sec-translit">Ḥukmu sh-shirki fī ar-rubūbiyyah</div><div class="sec-en">The Ruling on Shirk in Lordship</div></div>
<div class="callout" style="background:var(--gold-light);border-left:4px solid var(--gold)"><div class="callout-label">⚠ Ruling</div><div class="callout-ar">الشِّرْكُ فِي الرُّبُوبِيَّةِ شِرْكٌ أَكْبَرُ مُخْرِجٌ مِنْ مِلَّةِ الإِسْلَامِ.</div><div class="callout-translit">Ash-shirku fī ar-rubūbiyyah shirkun akbaru mukhrijun min millati l-islām.</div><div class="callout-en"><strong>Shirk in Lordship is major shirk that expels one from the religion of Islam.</strong></div></div>

<div class="sec"><div class="sec-ar">الإِقْرَارُ بِتَوْحِيدِ الرُّبُوبِيَّةِ لَا يَكْفِي لِلدُّخُولِ فِي الإِسْلَامِ</div><div class="sec-translit">Al-iqrāru bi-tawḥīdi r-rubūbiyyati lā yakfī li-d-dukhūli fī l-islām</div><div class="sec-en">Affirming Tawḥīd ar-Rubūbiyyah Alone is Not Enough to Enter Islam</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Critical concept — memorize this</span><div class="study-note-body">Merely acknowledging that Allah is the Creator does <strong>not</strong> make someone a Muslim. A person must <em>also</em> affirm <strong>tawḥīd al-ulūhiyyah</strong> — worshipping Allah alone and abandoning worship of everything else. This is a <em>huge</em> distinction that the Prophet ﷺ spent his entire mission teaching.</div></div>

<p style="margin-bottom:10px">Affirming <em>tawḥīd ar-rubūbiyyah</em> alone does not suffice for entering Islam or for salvation on the Day of Judgement. A person must also:</p>
<ul class="impl-list">
<li>Affirm <strong>tawḥīd al-ulūhiyyah</strong> (worshipping Allah alone)</li>
<li>Worship Allah alone with no partner</li>
<li>Abandon the worship of all false deities besides Him</li>
</ul>

<div class="callout teal"><div class="callout-label">Historical note — the Jāhiliyyah</div><div class="callout-en">The mushrikīn of the pre-Islamic era (Jāhiliyyah) <strong>affirmed tawḥīd ar-rubūbiyyah</strong> — they admitted that Allah was the Creator, Provider, and Sustainer. But they did not affirm <strong>tawḥīd al-ulūhiyyah</strong> — they worshipped idols alongside Him. So Allah sent His Messenger Muḥammad ﷺ to call them to affirm worship of Allah alone. He debated with them and argued with them until they accepted what they had previously rejected.</div></div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ Common misconception</span><div class="study-note-body">Some people think: "If I believe in God as the Creator, I'm saved." But the Qur'an explicitly says this isn't enough. The mushrikīn of Quraysh already believed Allah was the Creator — yet they were still mushrikīn because they worshipped idols <em>alongside</em> Him. The missing piece was <strong>directing worship exclusively to Allah</strong>.</div></div>
`;}

<div class="activity-controls"><button class="btn-reveal-all" onclick="revealAll(document.getElementById('as10p3'))">Reveal All</button><button class="btn-hide-all" onclick="hideAll(document.getElementById('as10p3'))">Hide All</button></div>
<div class="q-item"><span class="q-num">1</span><div class="q-en">What is meant by "shirk in rubūbiyyah" and what is its ruling?</div><div class="q-ar">مَا المُرَادُ بِالشِّرْكِ فِي الرُّبُوبِيَّةِ؟ وَمَا حُكْمُهُ؟</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>Meaning:</strong> Making a partner alongside Allah in His Lordship — claiming that someone else shares in creating, providing, or managing the universe.<br><strong>Ruling:</strong> Major shirk (shirk akbar) that expels one from Islam.</div></div>
<div class="q-item"><span class="q-num">2</span><div class="q-en">Does the disbelievers' affirmation of tawḥīd ar-rubūbiyyah alone enter them into Islam? Why?</div><div class="q-ar">هَلْ إِقْرَارُ الكُفَّارِ بِتَوْحِيدِ الرُّبُوبِيَّةِ فَقَطْ يُدْخِلُهُمْ فِي الإِسْلَامِ؟ وَلِمَاذَا؟</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>No.</strong> Affirming tawḥīd ar-rubūbiyyah alone does not enter one into Islam. One must also affirm <em>tawḥīd al-ulūhiyyah</em> — worshipping Allah alone and abandoning all false deities. The mushrikīn of Jāhiliyyah affirmed rubūbiyyah but were still mushrikīn because they worshipped idols alongside Allah.</div></div>
<div class="q-item"><span class="q-num">3</span><div class="q-en">What is the ruling on believing that any human has power to dispose of or manage the universe?</div><div class="q-ar">مَا حُكْمُ اعْتِقَادِ أَنَّ أَحَدًا مِنَ البَشَرِ لَهُ القُدْرَةُ عَلَى التَّصَرُّفِ فِي الكَوْنِ وَتَدْبِيرِهِ؟</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box">It is <strong>major shirk in rubūbiyyah</strong> — because the power to dispose of and manage the universe belongs only to Allah. Claiming this for any created being (like a saint or the righteous) assigns Allah's exclusive attribute of Lordship to someone else.</div></div></div>
`;}

function L11P1(){return `
<div class="sec"><div class="sec-ar">المُرَادُ بِالشِّرْكِ فِي الأُلُوهِيَّةِ</div><div class="sec-translit">Al-murādu bi-sh-shirki fī al-ulūhiyyah</div><div class="sec-en">What is Meant by Shirk in Worship</div></div>
<div class="defbox" style="border:2px solid var(--teal-mid)"><div class="defbox-tag" style="background:var(--teal-mid)">📌 Definition</div><div class="defbox-body"><div class="defbox-ar">صَرْفُ شَيْءٍ مِنَ العِبَادَةِ لِغَيْرِ اللَّهِ تَعَالَى.</div><div class="defbox-translit">Ṣarfu shayʾin mina l-ʿibādati li-ghayri-llāhi taʿālā.</div><div class="defbox-en">Directing any act of worship to other than Allah (the Exalted).</div></div></div>

<div class="study-note beginner"><span class="study-note-label">📚 Beginner tip</span><div class="study-note-body">If shirk in rubūbiyyah is about <em>Allah's actions</em> (creating, providing), shirk in ulūhiyyah is about <em>your actions</em> — where you direct your worship. Any act of worship (prayer, duʿāʾ, slaughter, fear, love, hope) that you direct to something other than Allah = shirk in ulūhiyyah. This is the <strong>most common</strong> type of shirk and what all the prophets warned against.</div></div>

<div class="sec"><div class="sec-ar">أَمْثِلَةٌ</div><div class="sec-translit">Amthilah</div><div class="sec-en">Examples</div></div>
<ul class="num-list">
<li data-n="1"><div class="li-en"><strong>Loving someone as one loves Allah, or more</strong> — submitting to them, humbling oneself before them, and magnifying them like or more than Allah.<br><em style="color:var(--muted)">Maḥabbatu aḥadin mithla maḥabbati-llāhi taʿālā aw akthara min maḥabbatih.</em></div></li>
<li data-n="2"><div class="li-en"><strong>Fearing other than Allah in a matter only Allah has power over</strong> — <em>al-khawfu min ghayri-llāhi taʿālā fī amrin lā yaqdiru ʿalayhi illā-llāh</em>.</div></li>
<li data-n="3"><div class="li-en"><strong>Hoping from other than Allah in what is exclusive to Allah</strong> — <em>rajāʾu ghayri-llāhi taʿālā fīmā huwa min khaṣāʾiṣi-llāh</em>.</div></li>
<li data-n="4"><div class="li-en"><strong>Reliance (tawakkul) on other than Allah in matters only Allah can do</strong> — <em>at-tawakkulu ʿalā ghayri-llāhi fī al-umūri llatī lā yaqdiru ʿalayhā illā-llāh</em>.</div></li>
<li data-n="5"><div class="li-en"><strong>Supplicating to other than Allah</strong> — <em>duʿāʾu ghayri-llāhi taʿālā</em>.</div></li>
</ul>

<div class="study-note root-tip"><span class="study-note-label">🌱 Word tip</span><div class="study-note-title">صَرْف · ṣarf</div><div class="study-note-body">From root ص-ر-ف (ṣ-r-f) meaning "to turn, divert, direct." Think of it like directing water through a pipe — whichever way you turn it, that's where the water goes. <em>Ṣarfu l-ʿibādah</em> = turning worship in a direction. Worship itself is neutral; where you <em>direct</em> it determines whether it's tawhid or shirk.</div></div>
`;}

<div class="q-item"><span class="q-num">1</span><div class="q-en">What is the difference between shirk in rubūbiyyah and shirk in ulūhiyyah?</div><div class="q-ar">مَا الفَرْقُ بَيْنَ الشِّرْكِ فِي الرُّبُوبِيَّةِ وَالشِّرْكِ فِي الأُلُوهِيَّةِ؟</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>Shirk in rubūbiyyah:</strong> Claiming another being shares Allah's exclusive actions — creating, providing, managing, giving life, causing death.<br><strong>Shirk in ulūhiyyah:</strong> Directing any act of worship (prayer, duʿāʾ, sacrifice, love, fear, hope, reliance) to anything other than Allah.<br>Both are <strong>major shirk</strong> and both expel from Islam.</div></div>
