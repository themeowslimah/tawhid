<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tawḥīd — Islamic Studies Workbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--teal:#1a6b5a;--teal-mid:#2a8f74;--teal-light:#e0f0eb;--teal-pale:#f0f8f5;--gold:#b8893a;--gold-light:#fff5e0;--gold-pale:#fffbf3;--cream:#f8f5ee;--ink:#1a2820;--ink-mid:#3d5248;--muted:#6b8278;--border:#c8dbd4;--white:#ffffff;--shadow:0 2px 12px rgba(26,107,90,.10);--shadow-lg:0 8px 32px rgba(26,107,90,.14);--r:10px;--r-sm:6px}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);font-size:15px;line-height:1.75;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.top-nav{background:var(--teal);color:#fff;padding:0 20px;display:flex;align-items:center;gap:12px;height:56px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.18)}
.top-nav .logo{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;letter-spacing:.5px;white-space:nowrap}
.top-nav .logo-ar{font-size:1.15rem;opacity:.75;margin-left:4px}
.top-nav-spacer{flex:1}
.unit-tabs{display:flex;gap:4px}
.unit-tab{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:inherit;font-size:.8rem;font-weight:500;transition:all .2s;white-space:nowrap}
.unit-tab:hover{background:rgba(255,255,255,.22)}
.unit-tab.active{background:#fff;color:var(--teal);font-weight:600}
.main{display:flex;flex:1}
.sidebar{width:260px;min-width:260px;background:var(--white);border-right:1px solid var(--border);height:calc(100vh - 56px);position:sticky;top:56px;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:4px}
.sidebar-unit-title{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);padding:4px 8px;margin-bottom:4px}
.sidebar-lesson{padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;transition:all .15s;border:1px solid transparent}
.sidebar-lesson:hover{background:var(--teal-pale);border-color:var(--border)}
.sidebar-lesson.active{background:var(--teal-light);border-color:var(--teal-mid)}
.sidebar-lesson .sl-num{font-size:.7rem;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.8px}
.sidebar-lesson .sl-title{font-size:.88rem;font-weight:500;color:var(--ink);line-height:1.35;margin-top:1px}
.sidebar-lesson .sl-ar{font-size:.82rem;color:var(--muted);margin-top:1px}
.sidebar-lesson.active .sl-title{color:var(--teal)}
.sidebar-lesson .sl-pages{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
.sl-page-dot{width:22px;height:22px;border-radius:50%;background:var(--teal-light);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:600;color:var(--teal);cursor:pointer;transition:all .15s}
.sl-page-dot:hover,.sl-page-dot.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.content{flex:1;min-width:0;padding:28px 32px;max-width:860px}
.page-nav{display:flex;align-items:center;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.page-nav-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:5px}
.page-nav-btn:hover{background:var(--teal-pale);border-color:var(--teal-mid);color:var(--teal)}
.page-nav-btn.active{background:var(--teal);border-color:var(--teal);color:#fff}
.page-nav-btn .pnb-num{width:18px;height:18px;background:rgba(255,255,255,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700}
.page-nav-btn:not(.active) .pnb-num{background:var(--teal-light);color:var(--teal)}
.lesson-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid var(--teal-light)}
.lesson-num-badge{background:var(--teal);color:#fff;border-radius:var(--r-sm);padding:8px 14px;text-align:center;min-width:60px;flex-shrink:0}
.lesson-num-badge .lnb-label{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;opacity:.8}
.lesson-num-badge .lnb-num{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;line-height:1;margin-top:2px}
.lesson-title-ar{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--teal);line-height:1.15;margin-bottom:4px}
.lesson-title-en{font-size:1.05rem;font-weight:500;color:var(--ink-mid)}
.lesson-title-translit{font-size:.85rem;font-style:italic;color:var(--muted);margin-top:2px}
.page-label{display:inline-flex;align-items:center;gap:6px;background:var(--gold-light);border:1px solid rgba(184,137,58,.3);border-radius:20px;padding:4px 12px;font-size:.75rem;font-weight:600;color:var(--gold);margin-bottom:20px;letter-spacing:.3px}
.page-label::before{content:"📄";font-size:.8rem}
.sec{background:linear-gradient(90deg,var(--teal-light),rgba(224,240,235,0));border-left:3px solid var(--teal-mid);padding:10px 16px;margin:24px 0 14px;border-radius:0 var(--r-sm) var(--r-sm) 0}
.sec .sec-ar{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:700;color:var(--teal)}
.sec .sec-translit{font-size:.8rem;font-style:italic;color:var(--muted);margin-top:1px}
.sec .sec-en{font-size:.92rem;font-weight:600;color:var(--ink-mid);margin-top:2px}
.point{background:var(--gold-light);border:1px solid rgba(184,137,58,.25);border-radius:var(--r);padding:10px 16px;margin:18px 0 10px;display:flex;align-items:flex-start;gap:10px}
.point-num{background:var(--gold);color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0;margin-top:1px}
.point-ar{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--teal)}
.point-translit{font-size:.78rem;font-style:italic;color:var(--muted)}
.point-en{font-size:.9rem;font-weight:600;color:var(--ink-mid)}
.defbox{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin:12px 0;box-shadow:var(--shadow)}
.defbox-tag{background:var(--teal);color:#fff;padding:5px 14px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:6px}
.defbox-tag.gold{background:var(--gold)}
.defbox-tag.green-light{background:var(--teal-light);color:var(--teal)}
.defbox-body{padding:14px 16px}
.defbox-ar{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--ink);line-height:1.8;margin-bottom:6px;text-align:right;direction:rtl}
.defbox-translit{font-style:italic;color:var(--muted);font-size:.85rem;margin-bottom:6px}
.defbox-en{color:var(--ink-mid);font-size:.9rem;line-height:1.65}
.verse{background:var(--teal-pale);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin:14px 0;text-align:center}
.verse .v-ar{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--teal);line-height:2;direction:rtl;margin-bottom:10px}
.verse .v-translit{font-style:italic;color:var(--muted);font-size:.85rem;margin-bottom:8px}
.verse .v-en{color:var(--ink);font-size:.92rem;line-height:1.65;font-style:italic}
.verse .v-ref{margin-top:10px;font-size:.75rem;font-weight:600;color:var(--gold);letter-spacing:.3px}
.hadith{background:var(--gold-pale);border:1px solid rgba(184,137,58,.25);border-radius:var(--r);padding:16px 20px;margin:14px 0;position:relative}
.hadith::before{content:"ﷺ";position:absolute;top:12px;right:16px;font-size:1.2rem;color:var(--gold);opacity:.4;font-family:'Cormorant Garamond',serif}
.hadith-label{display:inline-block;background:var(--gold);color:#fff;padding:2px 10px;border-radius:12px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.hadith .h-ar{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--ink);line-height:1.9;direction:rtl;text-align:right;margin-bottom:8px}
.hadith .h-translit{font-style:italic;color:var(--muted);font-size:.84rem;margin-bottom:8px;padding:6px 10px;background:rgba(184,137,58,.06);border-radius:var(--r-sm)}
.hadith .h-en{color:var(--ink-mid);font-size:.9rem;line-height:1.65}
.hadith .h-source{margin-top:10px;font-size:.75rem;color:var(--muted);padding-top:8px;border-top:1px dashed rgba(184,137,58,.3)}
.callout{border-left:4px solid var(--gold);background:var(--gold-light);border-radius:0 var(--r) var(--r) 0;padding:14px 18px;margin:14px 0}
.callout.teal{border-left-color:var(--teal-mid);background:var(--teal-light)}
.callout-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);margin-bottom:6px}
.callout.teal .callout-label{color:var(--teal)}
.callout-ar{font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--ink);direction:rtl;text-align:center;margin:8px 0}
.callout-translit{font-style:italic;color:var(--muted);font-size:.83rem;text-align:center}
.callout-en{font-size:.9rem;color:var(--ink-mid);line-height:1.65}
.num-list{list-style:none;padding:0}
.num-list li{background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px 12px 48px;margin-bottom:8px;position:relative;box-shadow:var(--shadow)}
.num-list li::before{content:attr(data-n);position:absolute;left:12px;top:50%;transform:translateY(-50%);width:24px;height:24px;background:var(--teal);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700}
.num-list li .li-ar{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--teal);font-weight:600;margin-bottom:3px}
.num-list li .li-translit{font-style:italic;color:var(--muted);font-size:.8rem;margin-bottom:2px}
.num-list li .li-en{font-size:.88rem;color:var(--ink-mid)}
.virtue{border:1px solid var(--border);border-radius:var(--r);background:var(--white);overflow:hidden;margin:10px 0;box-shadow:var(--shadow)}
.virtue-head{background:var(--gold-light);padding:8px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(184,137,58,.2)}
.virtue-n{background:var(--gold);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0}
.virtue-head-text .vh-label{font-size:.68rem;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.virtue-head-text .vh-ar{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:var(--teal)}
.virtue-head-text .vh-translit{font-size:.75rem;font-style:italic;color:var(--muted)}
.virtue-head-text .vh-en{font-size:.85rem;font-weight:600;color:var(--ink-mid)}
.virtue-body{padding:12px 16px;font-size:.9rem;color:var(--ink-mid)}
.styled-table{width:100%;border-collapse:collapse;margin:14px 0;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.styled-table th{background:var(--teal);color:#fff;padding:10px 14px;text-align:left;font-size:.82rem;font-weight:600;letter-spacing:.3px}
.styled-table td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:.88rem;background:var(--white)}
.styled-table tr:last-child td{border-bottom:none}
.styled-table tr:nth-child(even) td{background:var(--teal-pale)}
.activity,.assessment{border:2px solid var(--teal-mid);border-radius:var(--r);padding:20px 20px 16px;margin:20px 0;position:relative;background:var(--teal-pale)}
.assessment{border-color:var(--gold);background:var(--gold-pale)}
.section-badge{position:absolute;top:-14px;right:20px;background:var(--teal-mid);color:#fff;padding:4px 16px;border-radius:20px;font-weight:700;font-size:.82rem;box-shadow:var(--shadow)}
.assessment .section-badge{background:var(--gold)}
.activity-intro,.assessment-intro{font-size:.9rem;color:var(--muted);font-style:italic;margin-bottom:12px}
.activity-controls{display:flex;gap:8px;margin:10px 0 14px;flex-wrap:wrap}
.btn-reveal-all,.btn-hide-all{background:var(--white);border:1.5px solid var(--teal-mid);color:var(--teal);padding:5px 14px;border-radius:16px;cursor:pointer;font-family:inherit;font-size:.8rem;font-weight:600;transition:all .2s}
.btn-reveal-all:hover{background:var(--teal-mid);color:#fff}
.assessment .btn-reveal-all{border-color:var(--gold);color:var(--gold)}
.assessment .btn-reveal-all:hover{background:var(--gold);color:#fff}
.act-item{background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:8px}
.act-item .act-prompt{font-size:.9rem;color:var(--ink);margin-bottom:6px}
.act-item .act-ar{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--teal);font-weight:600;direction:rtl;text-align:right;margin-bottom:3px}
.act-item .act-translit{font-size:.78rem;font-style:italic;color:var(--muted);margin-bottom:4px}
.btn-answer{background:var(--teal-mid);color:#fff;border:none;padding:5px 12px;border-radius:14px;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:600;transition:all .2s;margin-top:4px;display:inline-flex;align-items:center;gap:4px}
.btn-answer.open{background:var(--gold)}
.answer-box{display:none;background:var(--teal-light);border-left:3px solid var(--teal-mid);padding:10px 12px;border-radius:0 var(--r-sm) var(--r-sm) 0;margin-top:8px;font-size:.88rem;color:var(--teal);font-weight:500;animation:fadeDown .25s ease}
.answer-box.open{display:block}
.answer-box.gold-box{background:var(--gold-light);border-color:var(--gold);color:var(--ink);font-weight:normal}
.q-item{background:var(--white);border:1px solid rgba(184,137,58,.25);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:10px}
.q-item .q-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:var(--gold);color:#fff;border-radius:50%;font-weight:700;font-size:.78rem;margin-right:8px;float:left;margin-top:1px}
.q-item .q-en{font-size:.9rem;font-weight:600;color:var(--ink);margin-bottom:4px}
.q-item .q-ar{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--ink-mid);direction:rtl;text-align:right}
.q-item .q-translit{font-size:.78rem;font-style:italic;color:var(--muted);margin-top:2px}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
.compare-card{border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.compare-card-head{padding:8px 14px;font-weight:700;font-size:.88rem;color:#fff}
.compare-card-head.teal{background:var(--teal)}
.compare-card-head.gold{background:var(--gold)}
.compare-card-head .ch-ar{font-family:'Cormorant Garamond',serif;font-size:1rem;display:block}
.compare-card-head .ch-translit{font-size:.72rem;opacity:.85;font-style:italic}
.compare-card-body{background:var(--white);padding:0}
.compare-card-body li{padding:8px 14px;font-size:.85rem;border-bottom:1px solid var(--border);list-style:none}
.compare-card-body li:last-child{border-bottom:none}
.word-note{display:inline-block;background:var(--gold-light);border:1.5px dashed rgba(184,137,58,.5);padding:2px 10px;border-radius:14px;font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--teal);font-weight:600}
.pillar-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin:14px 0}
.pillar{background:var(--white);border:1px solid var(--border);border-left:3px solid var(--teal-mid);border-radius:var(--r-sm);padding:12px 14px}
.pillar-n{font-size:.7rem;font-weight:700;text-transform:uppercase;color:var(--gold);letter-spacing:.5px;margin-bottom:4px}
.pillar-title{font-weight:600;font-size:.88rem;color:var(--ink);margin-bottom:3px}
.pillar-ar{font-family:'Cormorant Garamond',serif;font-size:.95rem;color:var(--teal)}
.pillar-translit{font-size:.75rem;font-style:italic;color:var(--muted)}
.cond-item{background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px 12px 46px;margin-bottom:8px;position:relative;box-shadow:var(--shadow)}
.cond-n{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:26px;height:26px;background:var(--teal);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem}
.cond-ar{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:700;color:var(--teal);margin-bottom:2px}
.cond-highlight{display:inline-block;background:rgba(184,137,58,.12);border-radius:4px;padding:0 5px;font-weight:600;color:var(--gold);font-style:italic;font-size:.85rem;margin-left:4px}
.cond-translit{font-style:italic;color:var(--muted);font-size:.78rem}
.cond-en{font-size:.87rem;color:var(--ink-mid)}
.impl-list{list-style:none;padding:0;margin:8px 0}
.impl-list li{padding:6px 10px 6px 30px;font-size:.88rem;position:relative;margin-bottom:4px}
.impl-list li::before{content:"•";position:absolute;left:10px;color:var(--teal-mid);font-weight:700}
.page-footer{margin-top:32px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;font-size:.78rem;color:var(--muted)}
.prev-next{display:flex;gap:8px}
.pn-btn{background:var(--white);border:1px solid var(--border);color:var(--teal);padding:7px 14px;border-radius:var(--r-sm);cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:500;transition:all .2s}
.pn-btn:hover{background:var(--teal);color:#fff;border-color:var(--teal)}
.pn-btn:disabled{opacity:.35;cursor:default}
@keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.page-content{animation:fadeDown .3s ease}

/* ── VOCAB PAGE ─────────────────────────────────────────── */
.vocab-page-label{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--teal),var(--teal-mid));color:#fff;border-radius:20px;padding:5px 14px;font-size:.75rem;font-weight:700;margin-bottom:20px;letter-spacing:.5px}
.vocab-page-label::before{content:"📖";font-size:.9rem}
.vocab-section-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--teal-mid);margin:24px 0 10px;display:flex;align-items:center;gap:8px}
.vocab-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
/* Quick Reference Table */
.vocab-table{width:100%;border-collapse:collapse;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);margin-bottom:8px}
.vocab-table thead tr{background:var(--teal)}
.vocab-table thead th{color:#fff;padding:9px 14px;text-align:left;font-size:.78rem;font-weight:600;letter-spacing:.3px}
.vocab-table tbody tr{transition:background .15s}
.vocab-table tbody tr:hover{background:var(--teal-pale)}
.vocab-table tbody td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:.88rem;background:transparent}
.vocab-table tbody tr:last-child td{border-bottom:none}
.vocab-table tbody tr:nth-child(even) td{background:rgba(26,107,90,.03)}
.vtd-ar{font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--teal);font-weight:600}
.vtd-translit{font-style:italic;color:var(--muted);font-size:.83rem}
.vtd-type{display:inline-block;padding:1px 7px;border-radius:10px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.vtd-type.noun{background:rgba(26,107,90,.12);color:var(--teal)}
.vtd-type.verb{background:rgba(184,137,58,.15);color:var(--gold)}
.vtd-type.adj{background:rgba(61,82,72,.12);color:var(--ink-mid)}
.vtd-type.phrase{background:rgba(42,143,116,.15);color:var(--teal-mid)}
/* Flashcards */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:8px}
.vcard{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);cursor:pointer;position:relative;transition:all .2s;border-left:3px solid var(--teal-light)}
.vcard:hover{box-shadow:var(--shadow-lg);border-left-color:var(--teal-mid);transform:translateY(-1px)}
.vcard.flipped{border-left-color:var(--gold)}
.vcard .vc-front{}

  2:{titleAr:'أَهَمِّيَّةُ التَّوْحِيدِ',titleEn:'The Importance of Tawhid',translit:'Ahammiyyatu t-tawḥīd',unit:1,pages:[{label:'Fiṭrah & Points 1–2',p:18,c:'L2P1'},{label:'Points 3–5',p:19,c:'L2P2'},{label:'Point 6, Activity & Assessment',p:20,c:'L2P3'},{label:'📖 Vocabulary',p:0,c:'L2V',isVocab:true}]},
  3:{titleAr:'فَضْلُ التَّوْحِيدِ وَتَحْقِيقُهُ',titleEn:'Virtues of Tawhid & Its Realization',translit:'Faḍlu t-tawḥīdi wa taḥqīquhu',unit:1,pages:[{label:'Virtues 1–2',p:21,c:'L3P1'},{label:'Activity & Virtues 3–4',p:22,c:'L3P2'},{label:'Virtues 5–6',p:23,c:'L3P3'},{label:'Taḥqīq & Assessment',p:24,c:'L3P4'},{label:'📖 Vocabulary',p:0,c:'L3V',isVocab:true}]},

  5:{titleAr:'شَهَادَةُ أَنْ لَا إِلَهَ إِلَّا اللَّهُ',titleEn:'Testimony: No God but Allah',translit:'Shahādatu an lā ilāha illā-llāh',unit:2,pages:[{label:'Meaning, Status & Rule',p:30,c:'L5P1'},{label:'Meaning of Lā ilāha & Pillars',p:31,c:'L5P2'},{label:'Seven Conditions',p:32,c:'L5P3'},{label:'When it Benefits & Assessment',p:33,c:'L5P4'},{label:'📖 Vocabulary',p:0,c:'L5V',isVocab:true}]},
  6:{titleAr:'شَهَادَةُ أَنَّ مُحَمَّدًا رَسُولُ اللَّهِ',titleEn:'Testimony: Muḥammad is the Messenger',translit:'Shahādatu anna Muḥammadan rasūlu-llāh',unit:2,pages:[{label:'Meaning & What it Contains',p:34,c:'L6P1'},{label:'Requirements',p:35,c:'L6P2'},{label:'Activity & Assessment',p:36,c:'L6P3'},{label:'📖 Vocabulary',p:0,c:'L6V',isVocab:true}]},

let cU=1,cL=1,cP=0;
function switchUnit(u){cU=u;const un=UNITS.find(x=>x.id===u);cL=un.lessons[0];cP=0;
render();}
function switchLesson(l,p=0){cL=l;cP=p;render();}
function switchPage(p){cP=p;renderContent();renderSidebar();window.scrollTo({top:0,behavior:'smooth'});}
function prevPage(){const l=LESSONS[cL];if(cP>0){switchPage(cP-1);return;}const ul=UNITS.find(u=>u.id===cU).lessons;const i=ul.indexOf(cL);if(i>0){const pl=ul[i-1];cL=pl;cP=LESSONS[pl].pages.length-1;render();}}
function nextPage(){const l=LESSONS[cL];if(cP<l.pages.length-1){switchPage(cP+1);return;}const ul=UNITS.find(u=>u.id===cU).lessons;const i=ul.indexOf(cL);if(i<ul.length-1){cL=ul[i+1];cP=0;render();}}
function render(){document.querySelectorAll('.unit-tab').forEach(t=>t.classList.toggle('active',+t.dataset.unit===cU));renderSidebar();renderContent();}
function renderSidebar(){const u=UNITS.find(x=>x.id===cU);let h=`<div class="sidebar-unit-title">${u.titleAr} · ${u.titleEn}</div>`;u.lessons.forEach(lid=>{const l=LESSONS[lid];const a=lid===cL;h+=`<div class="sidebar-lesson${a?' active':''}" onclick="switchLesson(${lid})"><div class="sl-num">Lesson ${lid}</div><div class="sl-title">${l.titleEn}</div><div class="sl-ar">${l.titleAr}</div><div class="sl-pages">${l.pages.map((p,i)=>`<div class="sl-page-dot${a&&i===cP?' active':''}" onclick="event.stopPropagation();switchLesson(${lid},${i})" title="${p.label} p.${p.p}">${i+1}</div>`).join('')}</div></div>`;});document.getElementById('sidebar').innerHTML=h;}
function renderContent(){const l=LESSONS[cL];const pg=l.pages[cP];const ul=UNITS.find(u=>u.id===cU).lessons;const li=ul.indexOf(cL);const isF=li===0&&cP===0;const isL=li===ul.length-1&&cP===l.pages.length-1;let h=`<div class="page-content"><div class="page-nav">${l.pages.map((p,i)=>`<button class="page-nav-btn${i===cP?' active':''}${p.isVocab?' vocab-pill':''}" onclick="switchPage(${i})" style="${p.isVocab&&i!==cP?'border-color:var(--teal-mid);color:var(--teal-mid);background:var(--teal-pale);font-weight:600':''}">${p.isVocab?p.label:`<span class="pnb-num">${i+1}</span>${p.label} <span style="font-size:.72rem;opacity:.65;">p.${p.p}</span>`}</button>`).join('')}</div><div class="lesson-header"><div class="lesson-num-badge"><div class="lnb-label">Lesson</div><div class="lnb-num">${cL}</div></div><div class="lesson-header-text"><div class="lesson-title-ar">${l.titleAr}</div><div class="lesson-title-en">${l.titleEn}</div><div class="lesson-title-translit">${l.translit}</div></div></div><div class="page-label">Textbook page ${pg.p} · ${pg.label}</div>${getPageContent(pg.c)}<div class="page-footer"><div class="prev-next"><button class="pn-btn" onclick="prevPage()" ${isF?'disabled':''}>← Previous</button><button class="pn-btn" onclick="nextPage()" ${isL?'disabled':''}>Next →</button></div><div style="font-size:.75rem;color:var(--muted);">Ministry of Education · 2022–1444</div></div></div>`;document.getElementById('mainContent').innerHTML=h;}
function toggleAnswer(btn){const box=btn.nextElementSibling;const open=box.classList.toggle('open');btn.classList.toggle('open',open);btn.innerHTML=open?'✓ Hide Answer':'👁 Show Answer';}
function revealAll(el){el.querySelectorAll('.btn-answer').forEach(b=>{b.nextElementSibling.classList.add('open');b.classList.add('open');b.innerHTML='✓ Hide Answer';});}
function hideAll(el){el.querySelectorAll('.btn-answer').forEach(b=>{b.nextElementSibling.classList.remove('open');b.classList.remove('open');b.innerHTML='👁 Show Answer';});}

// ── LESSON 1 ──────────────────────────────────────────────
function L1P1(){return `
<div class="sec"><div class="sec-ar">تَعْرِيفُ التَّوْحِيدِ</div><div class="sec-translit">Taʿrīfu t-tawḥīd</div><div class="sec-en">Definition of Tawhid</div></div>
<div class="defbox"><div class="defbox-tag gold">Linguistically · لُغَةً (lughatan)</div><div class="defbox-body"><div class="defbox-ar">مَصْدَرُ وَحَّدَهُ يُوَحِّدُهُ تَوْحِيدًا، اعْتَقَدَهُ وَاحِدًا، أَيْ: فَرْدًا.</div><div class="defbox-translit">Maṣdaru waḥḥadahu yuwaḥḥiduhu tawḥīdan, iʿtaqadahu wāḥidan, ay: fardan.</div><div class="defbox-en">Verbal noun meaning to believe something is one — singular and unique.</div></div></div>
<div class="defbox" style="border:2px solid var(--teal-mid)"><div class="defbox-tag" style="background:var(--teal-mid)">📌 Technically (Sharʿī) · شَرْعًا — <strong>Memorise</strong></div><div class="defbox-body"><div class="defbox-ar">إِفْرَادُ اللَّهِ تَعَالَى فِي رُبُوبِيَّتِهِ، وَأُلُوهِيَّتِهِ، وَأَسْمَائِهِ الْحُسْنَى وَصِفَاتِهِ الْعُلَى.</div><div class="defbox-translit">Ifrādu-llāhi taʿālā fī rubūbiyyatihi, wa ulūhiyyatihi, wa asmāʾihi l-ḥusnā wa ṣifātihi l-ʿulā.</div><div class="defbox-en">To single out Allah (the Exalted) in His <strong>Lordship</strong> (rubūbiyyah), His <strong>Worship</strong> (ulūhiyyah), and His <strong>Most Beautiful Names and Lofty Attributes</strong>.</div></div></div>`;}

function L1P2(){return `
<div class="sec"><div class="sec-ar">أَقْسَامُ التَّوْحِيدِ</div><div class="sec-translit">Aqsāmu t-tawḥīd</div><div class="sec-en">Categories of Tawhid — Three in total</div></div>
<div class="point"><div class="point-num">1</div><div class="point-body"><div class="point-ar">تَوْحِيدُ الرُّبُوبِيَّةِ</div><div class="point-translit">Tawḥīdu r-rubūbiyyah</div><div class="point-en">Tawhid of Lordship</div></div></div>
<div class="defbox"><div class="defbox-tag green-light">Meaning</div><div class="defbox-body"><div class="defbox-en">Singling out Allah in <strong>His actions</strong>: He alone is the Creator, Provider, Owner, Giver of Life, Bringer of Death, and Disposer of all creation.</div></div></div>
<div class="verse"><div class="v-ar">﴿إِنَّ رَبَّكُمُ اللَّهُ الَّذِي خَلَقَ السَّمَاوَاتِ وَالْأَرْضَ فِي سِتَّةِ أَيَّامٍ ثُمَّ اسْتَوَىٰ عَلَى الْعَرْشِ يُدَبِّرُ الْأَمْرَ﴾</div><div class="v-translit">Inna rabbakumu-llāhu lladhī khalaqa s-samāwāti wa-l-arḍa fī sittati ayyāmin thumma-stawā ʿalā l-ʿarshi yudabbiru l-amr.</div><div class="v-en">"Indeed, your Lord is Allah, who created the heavens and the earth in six days and then established Himself above the Throne, conducting the affair…"</div><div class="v-ref">Sūrat Yūnus 10:3</div></div>
<div class="point"><div class="point-num">2</div><div class="point-body"><div class="point-ar">تَوْحِيدُ الأُلُوهِيَّةِ</div><div class="point-translit">Tawḥīdu l-ulūhiyyah</div><div class="point-en">Tawhid of Worship</div></div></div>
<div class="defbox"><div class="defbox-tag green-light">Meaning</div><div class="defbox-body"><div class="defbox-en">Singling out Allah in all acts of worship — prayer, duʿāʾ, fear, hope, reliance, and the like.</div></div></div>
<div class="verse"><div class="v-ar">﴿وَلَقَدْ بَعَثْنَا فِي كُلِّ أُمَّةٍ رَّسُولًا أَنِ اعْبُدُوا اللَّهَ وَاجْتَنِبُوا الطَّاغُوتَ﴾</div><div class="v-translit">Wa laqad baʿathnā fī kulli ummatin rasūlan ani-ʿbudū-llāha wa-jtanibū ṭ-ṭāghūt.</div><div class="v-en">"And We certainly sent into every nation a messenger, [saying], 'Worship Allah and avoid Ṭāghūt.'"</div><div class="v-ref">Sūrat an-Naḥl 16:36</div></div>
<div class="callout"><div class="callout-label">Word Note: Ṭāghūt · الطَّاغُوت</div><div class="callout-en">Everyone who is pleased with being worshipped besides Allah. <em style="color:var(--muted)">Kullu man raḍiya an yuʿbada min dūni-llāh.</em></div></div>
<div class="point"><div class="point-num">3</div><div class="point-body"><div class="point-ar">تَوْحِيدُ الأَسْمَاءِ وَالصِّفَاتِ</div><div class="point-translit">Tawḥīdu l-asmāʾi wa-ṣ-ṣifāt</div><div class="point-en">Tawhid of Names and Attributes</div></div></div>
<div class="defbox"><div class="defbox-tag green-light">Meaning</div><div class="defbox-body"><div class="defbox-en">Singling out Allah with perfect Names and Attributes — affirming what Allah and His Messenger ﷺ affirmed, <strong>without</strong>: distortion (taḥrīf), denial (taʿṭīl), asking "how" (takyīf), or likening to creation (tamthīl).</div></div></div>
<div class="verse"><div class="v-ar">﴿لَيْسَ كَمِثْلِهِ شَيْءٌ ۖ وَهُوَ السَّمِيعُ الْبَصِيرُ﴾</div><div class="v-translit">Laysa ka-mithlihi shayʾun, wa huwa s-samīʿu l-baṣīr.</div><div class="v-en">"There is nothing like Him, and He is the All-Hearing, the All-Seeing."</div><div class="v-ref">Sūrat ash-Shūrā 42:11</div></div>
<div class="callout" style="text-align:center"><div class="callout-label" style="text-align:center">⚠ Crucial Principle</div><div class="callout-ar">هَذِهِ الأَقْسَامُ الثَّلَاثَةُ مُتَلَازِمَةٌ</div><div class="callout-translit">Hādhihi l-aqsāmu th-thalāthatu mutalāzimah</div><div class="callout-en" style="font-weight:600;margin-top:8px">These three categories are <strong>inseparable</strong>. Whoever does not believe in all of them is not a muwaḥḥid.</div></div>`;}

function L1P3(){return `
<div class="sec"><div class="sec-ar">مَعْنَى الْعُبُودِيَّةِ</div><div class="sec-translit">Maʿnā l-ʿubūdiyyah</div><div class="sec-en">The Meaning of ʿUbūdiyyah (Servitude)</div></div>
<p style="margin-bottom:14px"><em>Al-ʿUbūdiyyah</em> is submission and humility before Allah — <span style="font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--teal)">الْخُضُوعُ وَالتَّذَلُّلُ لِلَّهِ</span> (<em>al-khuḍūʿu wa-t-tadhallulu li-llāh</em>).</p>
<div class="sec"><div class="sec-ar">أَنْوَاعُ الْعُبُودِيَّةِ</div><div class="sec-translit">Anwāʿu l-ʿubūdiyyah</div><div class="sec-en">Types of ʿUbūdiyyah</div></div>
<div class="virtue"><div class="virtue-head"><div class="virtue-n">1</div><div class="virtue-head-text"><div class="vh-label">Type One</div><div class="vh-ar">الْعُبُودِيَّةُ الْعَامَّةُ</div><div class="vh-translit">Al-ʿubūdiyyatu l-ʿāmmah</div><div class="vh-en">General ʿUbūdiyyah</div></div></div><div class="virtue-body">Submission of <em>all creation</em> — angels, jinn, humans, animals, and inanimate objects. No one can escape it.</div></div>
<div class="verse"><div class="v-ar">﴿إِن كُلُّ مَن فِي السَّمَاوَاتِ وَالْأَرْضِ إِلَّا آتِي الرَّحْمَٰنِ عَبْدًا﴾</div><div class="v-translit">In kullu man fī s-samāwāti wa-l-arḍi illā ātī r-raḥmāni ʿabdā.</div><div class="v-en">"There is no one in the heavens and the earth but that he comes to the Most Merciful as a servant."</div><div class="v-ref">Sūrat Maryam 19:93</div></div>
<div class="virtue" style="margin-top:12px"><div class="virtue-head"><div class="virtue-n">2</div><div class="virtue-head-text"><div class="vh-label">Type Two</div><div class="vh-ar">الْعُبُودِيَّةُ الْخَاصَّةُ</div><div class="vh-translit">Al-ʿubūdiyyatu l-khāṣṣah</div><div class="vh-en">Specific ʿUbūdiyyah</div></div></div><div class="virtue-body">The worship of <strong>obedience and willing response</strong> — specific to believers. Allah alone is deserving of this worship.</div></div>
<div class="verse"><div class="v-ar">﴿فَاعْبُدْهُ وَتَوَكَّلْ عَلَيْهِ﴾</div><div class="v-translit">Fa-ʿbudhu wa tawakkal ʿalayh.</div><div class="v-en">"So worship Him and rely upon Him."</div><div class="v-ref">Sūrat Hūd 11:123</div></div>`;}

function L1P4(){return `
<div class="activity" id="al1p4"><div class="section-badge">نَشَاط · Activity</div>

<div class="hadith" style="background:#fff;margin:8px 0 14px"><div class="hadith-label">Ḥadīth — Ibn Masʿūd (Bukhārī 32, Muslim 124)</div><div class="h-ar">«لَمَّا نَزَلَتْ: ﴿الَّذِينَ آمَنُوا وَلَمْ يَلْبِسُوا إِيمَانَهُمْ بِظُلْمٍ﴾ شَقَّ ذَلِكَ عَلَى الْمُسْلِمِينَ… قَالَ: لَيْسَ ذَلِكَ، إِنَّمَا هُوَ الشِّرْكُ، أَلَمْ تَسْمَعُوا مَا قَالَ لُقْمَانُ: ﴿إِنَّ الشِّرْكَ لَظُلْمٌ عَظِيمٌ﴾»</div><div class="h-en">When the verse was revealed, the companions were troubled. The Prophet ﷺ said: "It is not that — it is shirk. Did you not hear Luqmān: 'Indeed, shirk is a grave injustice.'"</div></div>
<div class="activity-controls"><button class="btn-reveal-all" onclick="revealAll(document.getElementById('al3p2'))">Reveal All</button><button class="btn-hide-all" onclick="hideAll(document.getElementById('al3p2'))">Hide All</button></div>

<div class="act-item"><div class="act-prompt">What would we expect from the companions after the Prophet’s ﷺ explanation?</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box">Relief and happiness — the Prophet ﷺ clarified that the ẓulm preventing security is specifically shirk, not every sin.</div></div></div>
<div class="virtue" style="margin-top:20px"><div class="virtue-head"><div class="virtue-n">3</div><div class="virtue-head-text"><div class="vh-label">The Third Virtue</div><div class="vh-ar">تَكْفِيرُ الذُّنُوبِ</div><div class="vh-translit">Takfīru dh-dhunūb</div><div class="vh-en">Expiation of Sins</div></div></div></div>
<div class="hadith"><div class="hadith-label">Ḥadīth Qudsī — Abū Dharr</div><div class="h-ar">«وَمَنْ لَقِيَنِي بِقُرَابِ الأَرْضِ خَطِيئَةً لَا يُشْرِكُ بِي شَيْئًا لَقِيتُهُ بِمِثْلِهَا مَغْفِرَةً»</div><div class="h-translit">Wa man laqiyanī bi-qurābi l-arḍi khaṭīʾatan lā yushriku bī shayʾan laqītuhu bi-mithlihā maghfirah.</div><div class="h-en">"Whoever meets Me with an earth-full of sins — without having associated anything with Me — I will meet him with the like of it in forgiveness."</div><div class="h-source">Narrated by Muslim no. 2687</div></div>
<div class="virtue" style="margin-top:12px"><div class="virtue-head"><div class="virtue-n">4</div><div class="virtue-head-text"><div class="vh-label">The Fourth Virtue</div><div class="vh-ar">أَثْقَلُ شَيْءٍ فِي الْمِيزَانِ</div><div class="vh-translit">Athqalu shayʾin fī l-mīzān</div><div class="vh-en">Heaviest thing on the Scale on the Day of Judgement</div></div></div></div>
<div class="hadith"><div class="hadith-label">Ḥadīth — ʿAbdullāh ibn ʿAmr · Nūḥ's Final Counsel</div><div class="h-ar">«إِنَّ نَبِيَّ اللَّهِ نُوحًا ﷺ لَمَّا حَضَرَتْهُ الْوَفَاةُ قَالَ لِابْنِهِ: آمُرُكَ بِلَا إِلَهَ إِلَّا اللَّهُ، فَإِنَّ السَّمَاوَاتِ السَّبْعَ وَالأَرَضِينَ السَّبْعَ لَوْ وُضِعَتْ فِي كَفَّةٍ، وَوُضِعَتْ لَا إِلَهَ إِلَّا اللَّهُ فِي كَفَّةٍ، رَجَحَتْ بِهِنَّ لَا إِلَهَ إِلَّا اللَّهُ»</div><div class="h-en">When death approached the Prophet Nūḥ ﷺ, he said to his son: "I command you with lā ilāha illā-llāh — for if the seven heavens and seven earths were on one pan, and lā ilāha illā-llāh on the other, lā ilāha illā-llāh would outweigh them."</div><div class="h-source">Narrated by Aḥmad no. 6583</div></div>`;}

function vocabPage(lessonNum, words){
  const rows = words.map(w=>`<tr><td class="vtd-ar">${w[0]}</td><td class="vtd-translit">${w[1]}</td><td>${w[2]}</td><td><span class="vtd-type ${w[3]||'noun'}">${w[3]||'noun'}</span></td><td style="font-size:.86rem;color:var(--ink-mid)">${w[4]}</td></tr>`).join('');
  const cards = words.map((w,i)=>`<div class="vcard" id="vc${lessonNum}_${i}" onclick="flipCard(this)"><div class="vc-front"><div class="vc-ar">${w[0]}</div><div class="vc-translit">${w[1]}</div></div><div class="vc-back"><div class="vc-meaning">${w[4]}</div><div class="vc-type"><span class="vtd-type ${w[3]||'noun'}">${w[3]||'noun'}</span></div>${w[5]?`<div class="vc-root">Root: ${w[5]}</div>`:''}</div><span class="vc-hint">tap to flip</span></div>`).join('');
  return `
<div class="vocab-page-label">Lesson ${lessonNum} Vocabulary</div>
<div class="vocab-section-title">Quick Reference Table</div>
<table class="vocab-table">
  <thead><tr><th>Arabic</th><th>Transliteration</th><th>English</th><th>Type</th><th>Explanation</th></tr></thead>
  <tbody>${rows}</tbody>
</table>
<div class="vocab-section-title">Flashcards — tap each card to reveal meaning</div>
<div class="vocab-controls">
  <button class="vocab-ctrl-btn" onclick="flipAllCards(${lessonNum}, true)">Reveal All</button>
  <button class="vocab-ctrl-btn" onclick="flipAllCards(${lessonNum}, false)">Hide All</button>
  <span class="vocab-count">${words.length} terms</span>
</div>
<div class="vocab-grid">${cards}</div>`;
}
function flipCard(el){el.classList.toggle('flipped');el.querySelector('.vc-hint').textContent=el.classList.contains('flipped')?'tap to hide':'tap to flip';}
function flipAllCards(n, open){document.querySelectorAll(`[id^="vc${n}_"]`).forEach(c=>{open?c.classList.add('flipped'):c.classList.remove('flipped');c.querySelector('.vc-hint').textContent=open?'tap to hide':'tap to flip';});}
