<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tawḥīd — Islamic Studies Workbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--teal:#6e2c3a;--teal-mid:#8e3e4f;--teal-light:#f0dfe2;--teal-pale:#faeef0;--gold:#b8923d;--gold-light:#f2e7c8;--gold-pale:#faf3de;--cream:#fbf5ec;--ink:#2a1b20;--ink-mid:#4a3540;--muted:#7a6670;--border:#d8c8cc;--white:#ffffff;--shadow:0 2px 12px rgba(110,44,58,.10);--shadow-lg:0 8px 32px rgba(110,44,58,.14);--r:10px;--r-sm:6px}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);font-size:15px;line-height:1.75;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.top-nav{background:var(--teal);color:#fff;padding:0 20px;display:flex;align-items:center;gap:12px;height:56px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.18)}
.top-nav .logo{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;letter-spacing:.5px;white-space:nowrap}
.top-nav .logo-ar{font-size:1.15rem;opacity:.75;margin-left:4px}
.top-nav-spacer{flex:1}
.unit-tabs{display:flex;gap:4px}
.unit-tab{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:inherit;font-size:.8rem;font-weight:500;transition:all .2s;white-space:nowrap}
.unit-tab:hover{background:rgba(255,255,255,.22)}
.unit-tab.active{background:#fff;color:var(--teal);font-weight:600}
.main{display:block;flex:1}
.content{padding:28px 32px;max-width:860px;margin:0 auto}
.page-nav{display:flex;align-items:center;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.page-nav-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:5px}
.page-nav-btn:hover{background:var(--teal-pale);border-color:var(--teal-mid);color:var(--teal)}
.page-nav-btn.active{background:var(--teal);border-color:var(--teal);color:#fff}
.page-nav-btn .pnb-num{width:18px;height:18px;background:rgba(255,255,255,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700}
.page-nav-btn:not(.active) .pnb-num{background:var(--teal-light);color:var(--teal)}
.lesson-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid var(--teal-light)}
.lesson-num-badge{background:var(--teal);color:#fff;border-radius:var(--r-sm);padding:8px 14px;text-align:center;min-width:60px;flex-shrink:0}
.lesson-num-badge .lnb-label{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;opacity:.8}
.lesson-num-badge .lnb-num{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;line-height:1;margin-top:2px}
.lesson-title-ar{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--teal);line-height:1.15;margin-bottom:4px}
.lesson-title-en{font-size:1.05rem;font-weight:500;color:var(--ink-mid)}
.lesson-title-translit{font-size:.85rem;font-style:italic;color:var(--muted);margin-top:2px}
.page-label{display:inline-flex;align-items:center;gap:6px;background:var(--gold-light);border:1px solid rgba(184,146,61,.3);border-radius:20px;padding:4px 12px;font-size:.75rem;font-weight:600;color:var(--gold);margin-bottom:20px;letter-spacing:.3px}
.page-label::before{content:"📄";font-size:.8rem}
.sec{background:linear-gradient(90deg,var(--teal-light),rgba(224,240,235,0));border-left:3px solid var(--teal-mid);padding:10px 16px;margin:24px 0 14px;border-radius:0 var(--r-sm) var(--r-sm) 0}
.sec .sec-ar{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:700;color:var(--teal)}
.sec .sec-translit{font-size:.8rem;font-style:italic;color:var(--muted);margin-top:1px}
.sec .sec-en{font-size:.92rem;font-weight:600;color:var(--ink-mid);margin-top:2px}
.point{background:var(--gold-light);border:1px solid rgba(184,146,61,.25);border-radius:var(--r);padding:10px 16px;margin:18px 0 10px;display:flex;align-items:flex-start;gap:10px}
.point-num{background:var(--gold);color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0;margin-top:1px}
.point-ar{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--teal)}
.point-translit{font-size:.78rem;font-style:italic;color:var(--muted)}
.point-en{font-size:.9rem;font-weight:600;color:var(--ink-mid)}
.defbox{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin:12px 0;box-shadow:var(--shadow)}
.defbox-tag{background:var(--teal);color:#fff;padding:5px 14px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:6px}
.defbox-tag.gold{background:var(--gold)}
.defbox-tag.green-light{background:var(--teal-light);color:var(--teal)}
.defbox-body{padding:14px 16px}
.defbox-ar{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--ink);line-height:1.8;margin-bottom:6px;text-align:right;direction:rtl}
.defbox-translit{font-style:italic;color:var(--muted);font-size:.85rem;margin-bottom:6px}
.defbox-en{color:var(--ink-mid);font-size:.9rem;line-height:1.65}
.verse{background:var(--teal-pale);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin:14px 0;text-align:center}
.verse .v-ar{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--teal);line-height:2;direction:rtl;margin-bottom:10px}
.verse .v-translit{font-style:italic;color:var(--muted);font-size:.85rem;margin-bottom:8px}
.verse .v-en{color:var(--ink);font-size:.92rem;line-height:1.65;font-style:italic}
.verse .v-ref{margin-top:10px;font-size:.75rem;font-weight:600;color:var(--gold);letter-spacing:.3px}
.body-text{background:rgba(220,238,227,.45);border-right:3px solid var(--teal-mid);border-radius:var(--r-sm);padding:14px 18px;margin:14px 0}
.body-text .bt-ar{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--ink);line-height:2;direction:rtl;text-align:right;margin-bottom:10px}
.body-text .bt-translit{font-style:italic;color:var(--muted);font-size:.82rem;line-height:1.7;margin-bottom:8px;padding:6px 10px;background:rgba(110,44,58,.04);border-radius:var(--r-sm)}
.body-text .bt-en{color:var(--ink-mid);font-size:.92rem;line-height:1.7}
.body-text .bt-label{display:inline-block;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--teal);background:var(--teal-light);padding:2px 8px;border-radius:10px;margin-bottom:8px}
.hadith{background:var(--gold-pale);border:1px solid rgba(184,146,61,.25);border-radius:var(--r);padding:16px 20px;margin:14px 0;position:relative}
.hadith::before{content:"ﷺ";position:absolute;top:12px;right:16px;font-size:1.2rem;color:var(--gold);opacity:.4;font-family:'Cormorant Garamond',serif}
.hadith-label{display:inline-block;background:var(--gold);color:#fff;padding:2px 10px;border-radius:12px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.hadith .h-ar{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--ink);line-height:1.9;direction:rtl;text-align:right;margin-bottom:8px}
.hadith .h-translit{font-style:italic;color:var(--muted);font-size:.84rem;margin-bottom:8px;padding:6px 10px;background:rgba(184,146,61,.06);border-radius:var(--r-sm)}
.hadith .h-en{color:var(--ink-mid);font-size:.9rem;line-height:1.65}
.hadith .h-source{margin-top:10px;font-size:.75rem;color:var(--muted);padding-top:8px;border-top:1px dashed rgba(184,146,61,.3)}
.callout{border-left:4px solid var(--gold);background:var(--gold-light);border-radius:0 var(--r) var(--r) 0;padding:14px 18px;margin:14px 0}
.callout.teal{border-left-color:var(--teal-mid);background:var(--teal-light)}
.callout-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);margin-bottom:6px}
.callout.teal .callout-label{color:var(--teal)}
.callout-ar{font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--ink);direction:rtl;text-align:center;margin:8px 0}
.callout-translit{font-style:italic;color:var(--muted);font-size:.83rem;text-align:center}
.callout-en{font-size:.9rem;color:var(--ink-mid);line-height:1.65}
.num-list{list-style:none;padding:0}
.num-list li{background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px 12px 48px;margin-bottom:8px;position:relative;box-shadow:var(--shadow)}
.num-list li::before{content:attr(data-n);position:absolute;left:12px;top:50%;transform:translateY(-50%);width:24px;height:24px;background:var(--teal);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700}
.num-list li .li-ar{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--teal);font-weight:600;margin-bottom:3px}
.num-list li .li-translit{font-style:italic;color:var(--muted);font-size:.8rem;margin-bottom:2px}
.num-list li .li-en{font-size:.88rem;color:var(--ink-mid)}
.virtue{border:1px solid var(--border);border-radius:var(--r);background:var(--white);overflow:hidden;margin:10px 0;box-shadow:var(--shadow)}
.virtue-head{background:var(--gold-light);padding:8px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(184,146,61,.2)}
.virtue-n{background:var(--gold);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0}
.virtue-head-text .vh-label{font-size:.68rem;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.virtue-head-text .vh-ar{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:var(--teal)}
.virtue-head-text .vh-translit{font-size:.75rem;font-style:italic;color:var(--muted)}
.virtue-head-text .vh-en{font-size:.85rem;font-weight:600;color:var(--ink-mid)}
.virtue-body{padding:12px 16px;font-size:.9rem;color:var(--ink-mid)}
.styled-table{width:100%;border-collapse:collapse;margin:14px 0;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.styled-table th{background:var(--teal);color:#fff;padding:10px 14px;text-align:left;font-size:.82rem;font-weight:600;letter-spacing:.3px}
.styled-table td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:.88rem;background:var(--white)}
.styled-table tr:last-child td{border-bottom:none}
.styled-table tr:nth-child(even) td{background:var(--teal-pale)}
.activity,.assessment{border:2px solid var(--teal-mid);border-radius:var(--r);padding:20px 20px 16px;margin:20px 0;position:relative;background:var(--teal-pale)}
.assessment{border-color:var(--gold);background:var(--gold-pale)}
.section-badge{position:absolute;top:-14px;right:20px;background:var(--teal-mid);color:#fff;padding:4px 16px;border-radius:20px;font-weight:700;font-size:.82rem;box-shadow:var(--shadow)}
.assessment .section-badge{background:var(--gold)}
.activity-intro,.assessment-intro{font-size:.9rem;color:var(--muted);font-style:italic;margin-bottom:12px}
.activity-controls{display:flex;gap:8px;margin:10px 0 14px;flex-wrap:wrap}
.btn-reveal-all,.btn-hide-all{background:var(--white);border:1.5px solid var(--teal-mid);color:var(--teal);padding:5px 14px;border-radius:16px;cursor:pointer;font-family:inherit;font-size:.8rem;font-weight:600;transition:all .2s}
.btn-reveal-all:hover{background:var(--teal-mid);color:#fff}
.assessment .btn-reveal-all{border-color:var(--gold);color:var(--gold)}
.assessment .btn-reveal-all:hover{background:var(--gold);color:#fff}
.act-item{background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:8px}
.act-item .act-prompt{font-size:.9rem;color:var(--ink);margin-bottom:6px}
.act-item .act-ar{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--teal);font-weight:600;direction:rtl;text-align:right;margin-bottom:3px}
.act-item .act-translit{font-size:.78rem;font-style:italic;color:var(--muted);margin-bottom:4px}
.btn-answer{background:var(--teal-mid);color:#fff;border:none;padding:5px 12px;border-radius:14px;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:600;transition:all .2s;margin-top:4px;display:inline-flex;align-items:center;gap:4px}
.btn-answer.open{background:var(--gold)}
.answer-box{display:none;background:var(--teal-light);border-left:3px solid var(--teal-mid);padding:10px 12px;border-radius:0 var(--r-sm) var(--r-sm) 0;margin-top:8px;font-size:.88rem;color:var(--teal);font-weight:500;animation:fadeDown .25s ease}
.answer-box.open{display:block}
.answer-box.gold-box{background:var(--gold-light);border-color:var(--gold);color:var(--ink);font-weight:normal}
.q-item{background:var(--white);border:1px solid rgba(184,146,61,.25);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:10px}
.q-item .q-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:var(--gold);color:#fff;border-radius:50%;font-weight:700;font-size:.78rem;margin-right:8px;float:left;margin-top:1px}
.q-item .q-en{font-size:.9rem;font-weight:600;color:var(--ink);margin-bottom:4px}
.q-item .q-ar{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--ink-mid);direction:rtl;text-align:right}
.q-item .q-translit{font-size:.78rem;font-style:italic;color:var(--muted);margin-top:2px}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
.compare-card{border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.compare-card-head{padding:8px 14px;font-weight:700;font-size:.88rem;color:#fff}
.compare-card-head.teal{background:var(--teal)}
.compare-card-head.gold{background:var(--gold)}
.compare-card-head .ch-ar{font-family:'Cormorant Garamond',serif;font-size:1rem;display:block}
.compare-card-head .ch-translit{font-size:.72rem;opacity:.85;font-style:italic}
.compare-card-body{background:var(--white);padding:0}
.compare-card-body li{padding:8px 14px;font-size:.85rem;border-bottom:1px solid var(--border);list-style:none}
.compare-card-body li:last-child{border-bottom:none}
.word-note{display:inline-block;background:var(--gold-light);border:1.5px dashed rgba(184,146,61,.5);padding:2px 10px;border-radius:14px;font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--teal);font-weight:600}
.pillar-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin:14px 0}
.pillar{background:var(--white);border:1px solid var(--border);border-left:3px solid var(--teal-mid);border-radius:var(--r-sm);padding:12px 14px}
.pillar-n{font-size:.7rem;font-weight:700;text-transform:uppercase;color:var(--gold);letter-spacing:.5px;margin-bottom:4px}
.pillar-title{font-weight:600;font-size:.88rem;color:var(--ink);margin-bottom:3px}
.pillar-ar{font-family:'Cormorant Garamond',serif;font-size:.95rem;color:var(--teal)}
.pillar-translit{font-size:.75rem;font-style:italic;color:var(--muted)}
.cond-item{background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px 12px 46px;margin-bottom:8px;position:relative;box-shadow:var(--shadow)}
.cond-n{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:26px;height:26px;background:var(--teal);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem}
.cond-ar{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:700;color:var(--teal);margin-bottom:2px}
.cond-highlight{display:inline-block;background:rgba(184,146,61,.12);border-radius:4px;padding:0 5px;font-weight:600;color:var(--gold);font-style:italic;font-size:.85rem;margin-left:4px}
.cond-translit{font-style:italic;color:var(--muted);font-size:.78rem}
.cond-en{font-size:.87rem;color:var(--ink-mid)}
.impl-list{list-style:none;padding:0;margin:8px 0}
.impl-list li{padding:6px 10px 6px 30px;font-size:.88rem;position:relative;margin-bottom:4px}
.impl-list li::before{content:"•";position:absolute;left:10px;color:var(--teal-mid);font-weight:700}
.page-footer{margin-top:32px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;font-size:.78rem;color:var(--muted)}
.prev-next{display:flex;gap:8px}
.pn-btn{background:var(--white);border:1px solid var(--border);color:var(--teal);padding:7px 14px;border-radius:var(--r-sm);cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:500;transition:all .2s}
.pn-btn:hover{background:var(--teal);color:#fff;border-color:var(--teal)}
.pn-btn:disabled{opacity:.35;cursor:default}
@keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.page-content{animation:fadeDown .3s ease}


/* ── STUDY NOTE / ANNOTATION CARDS ─────────────────────── */
.study-note{position:relative;background:#fffbea;border:1.5px solid #f4d77a;border-radius:var(--r);padding:14px 18px 14px 54px;margin:16px 0;box-shadow:0 2px 10px rgba(184,146,61,.12);font-family:inherit}
.study-note::before{content:"📝";position:absolute;left:14px;top:12px;font-size:1.3rem;background:#fff5d4;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid #f4d77a}
.study-note-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#a67318;margin-bottom:5px;display:block}
.study-note-title{font-weight:700;font-size:.95rem;color:var(--ink);margin-bottom:4px;font-family:'Cormorant Garamond',serif}
.study-note-body{font-size:.88rem;color:var(--ink-mid);line-height:1.65}
.study-note-body strong{color:var(--gold)}
.study-note-body em{font-style:italic;color:var(--teal)}
/* Variants */
.study-note.remember{background:#fff5f5;border-color:#e8a5a5}
.study-note.remember::before{content:"⭐";background:#ffe8e8;border-color:#e8a5a5}
.study-note.remember .study-note-label{color:#b85050}
.study-note.watch-out{background:#fff3e8;border-color:#e8b87a}
.study-note.watch-out::before{content:"⚠️";background:#ffe6cc;border-color:#e8b87a}
.study-note.watch-out .study-note-label{color:#a8641a}
.study-note.root-tip{background:#f0f8ff;border-color:#8fb8d8}
.study-note.root-tip::before{content:"🌱";background:#e0ecf5;border-color:#8fb8d8}
.study-note.root-tip .study-note-label{color:#3a6a8a}
.study-note.beginner{background:var(--teal-pale);border-color:var(--teal-mid)}
.study-note.beginner::before{content:"💡";background:var(--teal-light);border-color:var(--teal-mid)}
.study-note.beginner .study-note-label{color:var(--teal)}
/* Inline word hint - used inside text */
.inline-hint{display:inline-block;background:rgba(184,146,61,.12);padding:1px 6px;border-radius:3px;font-size:.82rem;color:var(--gold);font-weight:600;cursor:help}

/* ── VOCAB PAGE ─────────────────────────────────────────── */
.vocab-page-label{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--teal),var(--teal-mid));color:#fff;border-radius:20px;padding:5px 14px;font-size:.75rem;font-weight:700;margin-bottom:20px;letter-spacing:.5px}
.vocab-page-label::before{content:"📖";font-size:.9rem}
.vocab-section-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--teal-mid);margin:24px 0 10px;display:flex;align-items:center;gap:8px}
.vocab-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
/* Quick Reference Table */
.vocab-table{width:100%;border-collapse:collapse;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);margin-bottom:8px}
.vocab-table thead tr{background:var(--teal)}
.vocab-table thead th{color:#fff;padding:9px 14px;text-align:left;font-size:.78rem;font-weight:600;letter-spacing:.3px}
.vocab-table tbody tr{transition:background .15s}
.vocab-table tbody tr:hover{background:var(--teal-pale)}
.vocab-table tbody td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:.88rem;background:transparent}
.vocab-table tbody tr:last-child td{border-bottom:none}
.vocab-table tbody tr:nth-child(even) td{background:rgba(110,44,58,.03)}
.vtd-ar{font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--teal);font-weight:600}
.vtd-translit{font-style:italic;color:var(--muted);font-size:.83rem}
.vtd-type{display:inline-block;padding:1px 7px;border-radius:10px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.vtd-type.noun{background:rgba(110,44,58,.12);color:var(--teal)}
.vtd-type.verb{background:rgba(184,146,61,.15);color:var(--gold)}
.vtd-type.adj{background:rgba(61,82,72,.12);color:var(--ink-mid)}
.vtd-type.phrase{background:rgba(142,62,79,.15);color:var(--teal-mid)}
/* Flashcards */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:8px}
.vcard{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);cursor:pointer;position:relative;transition:all .2s;border-left:3px solid var(--teal-light)}
.vcard:hover{box-shadow:var(--shadow-lg);border-left-color:var(--teal-mid);transform:translateY(-1px)}
.vcard.flipped{border-left-color:var(--gold)}
.vcard .vc-front{}
.vcard .vc-ar{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--teal);font-weight:700;line-height:1.2;margin-bottom:4px}
.vcard .vc-translit{font-style:italic;color:var(--muted);font-size:.8rem}
.vcard .vc-back{display:none;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border)}
.vcard.flipped .vc-back{display:block}
.vcard .vc-meaning{font-size:.9rem;color:var(--ink);font-weight:500}
.vcard .vc-type{margin-top:4px}
.vcard .vc-root{font-size:.78rem;color:var(--muted);margin-top:4px;font-style:italic}
.vcard .vc-hint{position:absolute;bottom:8px;right:10px;font-size:.65rem;color:var(--muted)}
.vcard.flipped .vc-hint{color:var(--gold)}
.vocab-controls{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 16px;align-items:center}
.vocab-ctrl-btn{background:var(--white);border:1.5px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:14px;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:500;transition:all .2s}
.vocab-ctrl-btn:hover{border-color:var(--teal-mid);color:var(--teal);background:var(--teal-pale)}
.vocab-ctrl-btn.active{background:var(--teal);border-color:var(--teal);color:#fff}
.vocab-count{font-size:.75rem;color:var(--muted);margin-left:auto}


/* HAMBURGER & DRAWER */
.hamburger{background:none;border:none;cursor:pointer;padding:8px;display:flex;flex-direction:column;gap:4px;border-radius:6px;transition:all .2s}
.hamburger:hover{background:rgba(255,255,255,.12)}
.hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:1px;transition:all .3s}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
.drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:150;opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-backdrop.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;left:-320px;width:300px;height:100vh;background:var(--white);box-shadow:4px 0 24px rgba(0,0,0,.15);z-index:160;transition:left .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:18px 14px}
.drawer.open{left:0}
.drawer-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.drawer-title{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:700;color:var(--teal)}
.drawer-close{background:none;border:none;cursor:pointer;font-size:1.4rem;color:var(--muted);padding:2px 8px;border-radius:4px;line-height:1}
.drawer-close:hover{background:var(--teal-light);color:var(--teal)}
.drawer-unit{margin-bottom:16px}
.drawer-unit-head{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--gold);padding:4px 10px 6px;display:flex;align-items:center;gap:6px}
.drawer-unit-head .due-ar{font-family:'Cormorant Garamond',serif;font-size:.92rem;font-weight:600;color:var(--teal);text-transform:none;letter-spacing:0;margin-left:auto}
.drawer-lesson{padding:9px 11px;border-radius:var(--r-sm);cursor:pointer;transition:all .15s;border:1px solid transparent;margin-bottom:3px}
.drawer-lesson:hover{background:var(--teal-pale);border-color:var(--border)}
.drawer-lesson.active{background:var(--teal-light);border-color:var(--teal-mid)}
.drawer-lesson .dl-num{font-size:.68rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.8px}
.drawer-lesson .dl-title{font-size:.88rem;font-weight:500;color:var(--ink);line-height:1.35;margin-top:1px}
.drawer-lesson .dl-ar{font-size:.82rem;color:var(--muted);margin-top:1px;font-family:'Cormorant Garamond',serif}
.drawer-lesson.active .dl-title{color:var(--teal)}
.drawer-lesson .dl-pages{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap}
.dl-page-dot{width:22px;height:22px;border-radius:50%;background:var(--teal-light);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:600;color:var(--teal);cursor:pointer;transition:all .15s}
.dl-page-dot:hover,.dl-page-dot.active{background:var(--teal);color:#fff;border-color:var(--teal)}

@media(max-width:768px){.content{padding:16px}.compare-grid{grid-template-columns:1fr}.unit-tabs{display:none}.drawer{width:280px;left:-300px}}
</style>

<body>
<div class="app">
<nav class="top-nav">
  <button class="hamburger" id="hamburger" onclick="toggleDrawer()" aria-label="Menu"><span></span><span></span><span></span></button>
  <div class="logo">Tawḥīd <span class="logo-ar">التوحيد</span></div>
  <div class="top-nav-spacer"></div>
  <div class="unit-tabs" id="unitTabs">
    <button class="unit-tab active" data-unit="1" onclick="switchUnit(1)">Unit 1 — Foundations</button>
    <button class="unit-tab" data-unit="2" onclick="switchUnit(2)">Unit 2 — Two Testimonies</button>
    <button class="unit-tab" data-unit="3" onclick="switchUnit(3)">Unit 3 — Shirk</button>
  </div>
</nav>
<div class="drawer-backdrop" id="drawerBackdrop" onclick="toggleDrawer()"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-title">All Lessons</div>

  </div>

<div class="content" id="mainContent"></div>
</div>
</div>
<script>

const UNITS=[
  {id:1,titleAr:'مقدمات في التوحيد',titleEn:'Foundations of Tawhid',lessons:[1,2,3,4]},
  {id:2,titleAr:'الشهادتان',titleEn:'The Two Testimonies',lessons:[5,6]},
  {id:3,titleAr:'الشرك',titleEn:'Shirk',lessons:[7,8,9,10,11,12]},
];
const LESSONS={
  1:{titleAr:'التَّوْحِيدُ وَأَقْسَامُهُ',titleEn:'Tawhid & Its Categories',translit:'At-Tawḥīdu wa Aqsāmuhu',unit:1,pages:[{label:'Definition',p:14,c:'L1P1'},{label:'Categories',p:15,c:'L1P2'},{label:'ʿUbūdiyyah',p:16,c:'L1P3'},{label:'Activity & Assessment',p:17,c:'L1P4'},{label:'📖 Vocabulary',p:0,c:'L1V',isVocab:true}]},
  2:{titleAr:'أَهَمِّيَّةُ التَّوْحِيدِ',titleEn:'The Importance of Tawhid',translit:'Ahammiyyatu t-tawḥīd',unit:1,pages:[{label:'Fiṭrah & Points 1–2',p:18,c:'L2P1'},{label:'Points 3–5',p:19,c:'L2P2'},{label:'Point 6, Activity & Assessment',p:20,c:'L2P3'},{label:'📖 Vocabulary',p:0,c:'L2V',isVocab:true}]},
  3:{titleAr:'فَضْلُ التَّوْحِيدِ وَتَحْقِيقُهُ',titleEn:'Virtues of Tawhid & Its Realization',translit:'Faḍlu t-tawḥīdi wa taḥqīquhu',unit:1,pages:[{label:'Virtues 1–2',p:21,c:'L3P1'},{label:'Activity & Virtues 3–4',p:22,c:'L3P2'},{label:'Virtues 5–6',p:23,c:'L3P3'},{label:'Taḥqīq & Assessment',p:24,c:'L3P4'},{label:'📖 Vocabulary',p:0,c:'L3V',isVocab:true}]},
  4:{titleAr:'الْمُعْتَقَدَاتُ الَّتِي تُضَادُّ التَّوْحِيدَ',titleEn:'Beliefs that Contradict Tawhid',translit:'Al-muʿtaqadātu llatī tuḍāddu t-tawḥīd',unit:1,pages:[{label:'Points 1–2',p:25,c:'L4P1'},{label:'Points 3–4 & Activities',p:27,c:'L4P2'},{label:'Violations Table & Assessment',p:28,c:'L4P3'},{label:'📖 Vocabulary',p:0,c:'L4V',isVocab:true}]},
  5:{titleAr:'شَهَادَةُ أَنْ لَا إِلَهَ إِلَّا اللَّهُ',titleEn:'Testimony: No God but Allah',translit:'Shahādatu an lā ilāha illā-llāh',unit:2,pages:[{label:'Meaning, Status & Rule',p:30,c:'L5P1'},{label:'Meaning of Lā ilāha & Pillars',p:31,c:'L5P2'},{label:'Seven Conditions',p:32,c:'L5P3'},{label:'When it Benefits & Assessment',p:33,c:'L5P4'},{label:'📖 Vocabulary',p:0,c:'L5V',isVocab:true}]},
  6:{titleAr:'شَهَادَةُ أَنَّ مُحَمَّدًا رَسُولُ اللَّهِ',titleEn:'Testimony: Muḥammad is the Messenger',translit:'Shahādatu anna Muḥammadan rasūlu-llāh',unit:2,pages:[{label:'Meaning & What it Contains',p:34,c:'L6P1'},{label:'Requirements',p:35,c:'L6P2'},{label:'Activity & Assessment',p:36,c:'L6P3'},{label:'📖 Vocabulary',p:0,c:'L6V',isVocab:true}]},
  7:{titleAr:'الشِّرْكُ وَأَنْوَاعُهُ',titleEn:'Shirk & Its Types',translit:'Ash-shirku wa anwāʿuhu',unit:3,pages:[{label:'Definition & Major Shirk',p:38,c:'L7P1'},{label:'Minor Shirk & Comparison',p:39,c:'L7P2'},{label:'Activity & Assessment',p:40,c:'L7P3'},{label:'📖 Vocabulary',p:0,c:'L7V',isVocab:true}]},
  8:{titleAr:'خَطَرُ الشِّرْكِ',titleEn:'The Danger of Shirk',translit:'Khaṭaru sh-shirk',unit:3,pages:[{label:'Greatest Sin & Injustice',p:41,c:'L8P1'},{label:'Dying on Shirk & No Benefit',p:42,c:'L8P2'},{label:'Shirk is Slander & Assessment',p:43,c:'L8P3'},{label:'📖 Vocabulary',p:0,c:'L8V',isVocab:true}]},
  9:{titleAr:'الْحَذَرُ مِنَ الشِّرْكِ',titleEn:'Guarding Against Shirk',translit:'Al-ḥadharu min ash-shirk',unit:3,pages:[{label:'Obligation & Evidences',p:44,c:'L9P1'},{label:"The Prophet’s Fear for His Ummah",p:45,c:'L9P2'},{label:'Activity & Assessment',p:46,c:'L9P3'},{label:'📖 Vocabulary',p:0,c:'L9V',isVocab:true}]},
  10:{titleAr:'الشِّرْكُ فِي الرُّبُوبِيَّةِ',titleEn:'Shirk in Lordship',translit:'Ash-shirku fī ar-rubūbiyyah',unit:3,pages:[{label:'Definition & Examples',p:17,c:'L10P1'},{label:'Ruling & Core Principle',p:18,c:'L10P2'},{label:'Assessment',p:18,c:'L10P3'},{label:'📖 Vocabulary',p:0,c:'L10V',isVocab:true}]},
  11:{titleAr:'الشِّرْكُ فِي الأُلُوهِيَّةِ',titleEn:'Shirk in Worship',translit:'Ash-shirku fī al-ulūhiyyah',unit:3,pages:[{label:'Definition & Examples',p:19,c:'L11P1'},{label:'Activity & Ruling',p:19,c:'L11P2'},{label:'Prophets Table',p:20,c:'L11P3'},{label:'Assessment',p:20,c:'L11P4'},{label:'📖 Vocabulary',p:0,c:'L11V',isVocab:true}]},
  12:{titleAr:'حِمَايَةُ النَّبِيِّ ﷺ لِلتَّوْحِيدِ',titleEn:"The Prophet's ﷺ Protection of Tawhid",translit:'Ḥimāyatu n-nabiyyi ﷺ li-t-tawḥīd',unit:3,pages:[{label:'Forbidding Grave as Festival',p:21,c:'L12P1'},{label:'Duʿāʾ Against Idol',p:21,c:'L12P2'},{label:'Forbidding Exaggeration',p:22,c:'L12P3'},{label:'Assessment',p:22,c:'L12P4'},{label:'📖 Vocabulary',p:0,c:'L12V',isVocab:true}]},
};
let cU=1,cL=1,cP=0;
function switchUnit(u){cU=u;const un=UNITS.find(x=>x.id===u);cL=un.lessons[0];cP=0;
render();}
function switchLesson(l,p=0){cL=l;cP=p;render();}
function switchPage(p){cP=p;renderContent();window.scrollTo({top:0,behavior:'smooth'});}
function prevPage(){const l=LESSONS[cL];if(cP>0){switchPage(cP-1);return;}const ul=UNITS.find(u=>u.id===cU).lessons;const i=ul.indexOf(cL);if(i>0){const pl=ul[i-1];cL=pl;cP=LESSONS[pl].pages.length-1;render();}}
function nextPage(){const l=LESSONS[cL];if(cP<l.pages.length-1){switchPage(cP+1);return;}const ul=UNITS.find(u=>u.id===cU).lessons;const i=ul.indexOf(cL);if(i<ul.length-1){cL=ul[i+1];cP=0;render();}}
function render(){document.querySelectorAll('.unit-tab').forEach(t=>t.classList.toggle('active',+t.dataset.unit===cU));renderContent();if(document.getElementById('drawer').classList.contains('open'))renderDrawer();}
function renderDrawer(){let h='';UNITS.forEach(u=>{h+=`<div class="drawer-unit"><div class="drawer-unit-head">Unit ${u.id}<span class="due-ar">${u.titleAr}</span></div>`;u.lessons.forEach(lid=>{const l=LESSONS[lid];const a=lid===cL;h+=`<div class="drawer-lesson${a?' active':''}" onclick="selectFromDrawer(${u.id},${lid})"><div class="dl-num">Lesson ${lid}</div><div class="dl-title">${l.titleEn}</div><div class="dl-ar">${l.titleAr}</div>${a?`<div class="dl-pages">${l.pages.map((p,i)=>`<div class="dl-page-dot${a&&i===cP?' active':''}" onclick="event.stopPropagation();selectFromDrawer(${u.id},${lid},${i})" title="${p.label}">${i+1}</div>`).join('')}</div>`:''}</div>`;});h+=`</div>`;});document.getElementById('drawerBody').innerHTML=h;}
function toggleDrawer(){const d=document.getElementById('drawer');const b=document.getElementById('drawerBackdrop');const hm=document.getElementById('hamburger');const open=d.classList.toggle('open');b.classList.toggle('open',open);hm.classList.toggle('open',open);if(open)renderDrawer();}
function selectFromDrawer(u,l,p){cU=u;cL=l;cP=p||0;document.getElementById('drawer').classList.remove('open');document.getElementById('drawerBackdrop').classList.remove('open');document.getElementById('hamburger').classList.remove('open');render();}
function renderContent(){const l=LESSONS[cL];const pg=l.pages[cP];const ul=UNITS.find(u=>u.id===cU).lessons;const li=ul.indexOf(cL);const isF=li===0&&cP===0;const isL=li===ul.length-1&&cP===l.pages.length-1;let h=`<div class="page-content"><div class="page-nav">${l.pages.map((p,i)=>`<button class="page-nav-btn${i===cP?' active':''}${p.isVocab?' vocab-pill':''}" onclick="switchPage(${i})" style="${p.isVocab&&i!==cP?'border-color:var(--teal-mid);color:var(--teal-mid);background:var(--teal-pale);font-weight:600':''}">${p.isVocab?p.label:`<span class="pnb-num">${i+1}</span>${p.label} <span style="font-size:.72rem;opacity:.65;">p.${p.p}</span>`}</button>`).join('')}</div><div class="lesson-header"><div class="lesson-num-badge"><div class="lnb-label">Lesson</div><div class="lnb-num">${cL}</div></div><div class="lesson-header-text"><div class="lesson-title-ar">${l.titleAr}</div><div class="lesson-title-en">${l.titleEn}</div><div class="lesson-title-translit">${l.translit}</div></div></div><div class="page-label">Textbook page ${pg.p} · ${pg.label}</div>${getPageContent(pg.c)}<div class="page-footer"><div class="prev-next"><button class="pn-btn" onclick="prevPage()" ${isF?'disabled':''}>← Previous</button><button class="pn-btn" onclick="nextPage()" ${isL?'disabled':''}>Next →</button></div><div style="font-size:.75rem;color:var(--muted);">Ministry of Education · 2022–1444</div></div></div>`;document.getElementById('mainContent').innerHTML=h;}
function toggleAnswer(btn){const box=btn.nextElementSibling;const open=box.classList.toggle('open');btn.classList.toggle('open',open);btn.innerHTML=open?'✓ Hide Answer':'👁 Show Answer';}
function revealAll(el){el.querySelectorAll('.btn-answer').forEach(b=>{b.nextElementSibling.classList.add('open');b.classList.add('open');b.innerHTML='✓ Hide Answer';});}
function hideAll(el){el.querySelectorAll('.btn-answer').forEach(b=>{b.nextElementSibling.classList.remove('open');b.classList.remove('open');b.innerHTML='👁 Show Answer';});}
function getPageContent(id){const m={L1P1,L1P2,L1P3,L1P4,L2P1,L2P2,L2P3,L3P1,L3P2,L3P3,L3P4,L4P1,L4P2,L4P3,L5P1,L5P2,L5P3,L5P4,L6P1,L6P2,L6P3,L7P1,L7P2,L7P3,L8P1,L8P2,L8P3,L9P1,L9P2,L9P3,L1V,L2V,L3V,L4V,L5V,L6V,L7V,L8V,L9V,L10P1,L10P2,L10P3,L11P1,L11P2,L11P3,L11P4,L12P1,L12P2,L12P3,L12P4,L10V,L11V,L12V};return(m[id]||function(){return'<p style="color:var(--muted)">Content coming soon.</p>'})();}

// ── LESSON 1 ──────────────────────────────────────────────
function L1P1(){return `
<div class="sec"><div class="sec-ar">تَعْرِيفُ التَّوْحِيدِ</div><div class="sec-translit">Taʿrīfu t-tawḥīd</div><div class="sec-en">Definition of Tawhid</div></div>
<div class="defbox"><div class="defbox-tag gold">Linguistically · لُغَةً (lughatan)</div><div class="defbox-body"><div class="defbox-ar">مَصْدَرُ وَحَّدَهُ يُوَحِّدُهُ تَوْحِيدًا، اعْتَقَدَهُ وَاحِدًا، أَيْ: فَرْدًا.</div><div class="defbox-translit">Maṣdaru waḥḥadahu yuwaḥḥiduhu tawḥīdan, iʿtaqadahu wāḥidan, ay: fardan.</div><div class="defbox-en">Verbal noun meaning to believe something is one — singular and unique.</div></div></div>
<div class="defbox" style="border:2px solid var(--teal-mid)"><div class="defbox-tag" style="background:var(--teal-mid)">📌 Technically (Sharʿī) · شَرْعًا — <strong>Memorise</strong></div><div class="defbox-body"><div class="defbox-ar">إِفْرَادُ اللَّهِ تَعَالَى فِي رُبُوبِيَّتِهِ، وَأُلُوهِيَّتِهِ، وَأَسْمَائِهِ الْحُسْنَى وَصِفَاتِهِ الْعُلَى.</div><div class="defbox-translit">Ifrādu-llāhi taʿālā fī rubūbiyyatihi, wa ulūhiyyatihi, wa asmāʾihi l-ḥusnā wa ṣifātihi l-ʿulā.</div><div class="defbox-en">To single out Allah (the Exalted) in His <strong>Lordship</strong> (rubūbiyyah), His <strong>Worship</strong> (ulūhiyyah), and His <strong>Most Beautiful Names and Lofty Attributes</strong>.</div></div></div><div class="study-note remember"><span class="study-note-label">⭐ Memorize this definition</span><div class="study-note-body">This is <strong>the</strong> definition you will come back to again and again throughout the book. Three categories — rubūbiyyah, ulūhiyyah, asmāʾ wa ṣifāt — all three must be affirmed together. Think of it as a three-legged stool: remove one leg and the whole thing falls.</div></div>`;}

function L1P2(){return `
<div class="sec"><div class="sec-ar">أَقْسَامُ التَّوْحِيدِ</div><div class="sec-translit">Aqsāmu t-tawḥīd</div><div class="sec-en">Categories of Tawhid — Three in total</div></div>

<div class="body-text"><div class="bt-ar">أَقْسَامُ التَّوْحِيدِ ثَلَاثَةٌ، هِيَ:</div><div class="bt-translit">Aqsāmu t-tawḥīdi thalāthah, hiya:</div><div class="bt-en">The categories of tawhid are <strong>three</strong>, they are:</div></div>

<div class="point"><div class="point-num">1</div><div class="point-body"><div class="point-ar">تَوْحِيدُ الرُّبُوبِيَّةِ</div><div class="point-translit">Tawḥīdu r-rubūbiyyah</div><div class="point-en">Tawhid of Lordship</div></div></div>
<div class="body-text"><div class="bt-label">المُرَادُ بِه · Meaning</div><div class="bt-ar">إِفْرَادُ اللَّهِ بِأَفْعَالِهِ سُبْحَانَهُ، فَهُوَ الْخَالِقُ، الرَّازِقُ، الْمَالِكُ، الْمُحْيِي الْمُمِيتُ، الْمُدَبِّرُ لِأُمُورِ خَلْقِهِ جَمِيعًا.</div><div class="bt-translit">Ifrādu-llāhi bi-afʿālihi subḥānah, fa-huwa l-Khāliq, ar-Rāziq, al-Mālik, al-Muḥyī l-Mumīt, al-Mudabbiru li-umūri khalqihi jamīʿan.</div><div class="bt-en">Singling out Allah in <strong>His actions</strong>, Glorified is He: He is <strong>the Creator, the Provider, the Owner, the Giver of Life, the Bringer of Death, and the Disposer of all the affairs of His creation</strong>.</div></div>

<div class="verse"><div class="v-ar">﴿إِنَّ رَبَّكُمُ اللَّهُ الَّذِي خَلَقَ السَّمَاوَاتِ وَالْأَرْضَ فِي سِتَّةِ أَيَّامٍ ثُمَّ اسْتَوَىٰ عَلَى الْعَرْشِ يُدَبِّرُ الْأَمْرَ﴾</div><div class="v-translit">Inna rabbakumu-llāhu lladhī khalaqa s-samāwāti wa-l-arḍa fī sittati ayyāmin thumma-stawā ʿalā l-ʿarshi yudabbiru l-amr.</div><div class="v-en">"Indeed, your Lord is Allah, who created the heavens and the earth in six days and then established Himself above the Throne, conducting the affair…"</div><div class="v-ref">Sūrat Yūnus 10:3</div></div>

<div class="study-note root-tip"><span class="study-note-label">🌱 Beginner grammar note</span><div class="study-note-body">The word <strong>رَبّ (Rabb)</strong> — "Lord" — is the root of <em>rubūbiyyah</em>. From root ر-ب-ب (r-b-b). It doesn't just mean "Lord" in the English sense — it means Creator, Provider, Sustainer, Nurturer, Guardian, and Owner <em>all in one word</em>. A true rabb is responsible for every aspect of what it rules over. Only Allah is Rabb in this complete sense.</div></div>

<div class="point"><div class="point-num">2</div><div class="point-body"><div class="point-ar">تَوْحِيدُ الأُلُوهِيَّةِ</div><div class="point-translit">Tawḥīdu l-ulūhiyyah</div><div class="point-en">Tawhid of Worship</div></div></div>
<div class="body-text"><div class="bt-label">المُرَادُ بِه · Meaning</div><div class="bt-ar">إِفْرَادُ اللَّهِ بِالْعِبَادَةِ، كَالصَّلَاةِ، وَالدُّعَاءِ، وَالْخَوْفِ، وَالرَّجَاءِ، وَالتَّوَكُّلِ، وَنَحْوِ ذَلِكَ.</div><div class="bt-translit">Ifrādu-llāhi bi-l-ʿibādah, ka-ṣ-ṣalāh, wa d-duʿāʾ, wa l-khawf, wa r-rajāʾ, wa t-tawakkul, wa naḥwi dhālik.</div><div class="bt-en">Singling out Allah <strong>in worship</strong> — such as <strong>prayer, supplication, fear, hope, reliance,</strong> and the like.</div></div>

<div class="verse"><div class="v-ar">﴿وَلَقَدْ بَعَثْنَا فِي كُلِّ أُمَّةٍ رَّسُولًا أَنِ اعْبُدُوا اللَّهَ وَاجْتَنِبُوا الطَّاغُوتَ﴾</div><div class="v-translit">Wa laqad baʿathnā fī kulli ummatin rasūlan ani-ʿbudū-llāha wa-jtanibū ṭ-ṭāghūt.</div><div class="v-en">"And We certainly sent into every nation a messenger, [saying], 'Worship Allah and avoid Ṭāghūt.'"</div><div class="v-ref">Sūrat an-Naḥl 16:36</div></div>

<div class="body-text"><div class="bt-ar">وَيُسَمَّى: (تَوْحِيدَ الْعِبَادَةِ).</div><div class="bt-translit">Wa yusammā: (tawḥīda l-ʿibādah).</div><div class="bt-en">This is also called: <strong>"Tawhid of Worship" (Tawḥīd al-ʿIbādah)</strong>.</div></div>

<div class="callout"><div class="callout-label">Word Note: Ṭāghūt · الطَّاغُوت</div><div class="callout-ar">كُلُّ مَنْ رَضِيَ أَنْ يُعْبَدَ مِنْ دُونِ اللَّهِ</div><div class="callout-translit">Kullu man raḍiya an yuʿbada min dūni-llāh.</div><div class="callout-en">Everyone who is pleased with being worshipped besides Allah.</div></div>

<div class="point"><div class="point-num">3</div><div class="point-body"><div class="point-ar">تَوْحِيدُ الأَسْمَاءِ وَالصِّفَاتِ</div><div class="point-translit">Tawḥīdu l-asmāʾi wa-ṣ-ṣifāt</div><div class="point-en">Tawhid of Names and Attributes</div></div></div>
<div class="body-text"><div class="bt-label">المُرَادُ بِه · Meaning</div><div class="bt-ar">إِفْرَادُ اللَّهِ بِالْكَمَالِ الْمُطْلَقِ فِي أَسْمَائِهِ وَصِفَاتِهِ، وَذَلِكَ بِإِثْبَاتِ مَا أَثْبَتَهُ اللَّهُ تَعَالَى لِنَفْسِهِ، أَوْ أَثْبَتَهُ لَهُ رَسُولُهُ ﷺ مِنَ الْأَسْمَاءِ الْحُسْنَى وَالصِّفَاتِ الْعُلَى عَلَى الْوَجْهِ الَّذِي يَلِيقُ بِجَلَالِ اللَّهِ وَعَظَمَتِهِ، مِنْ غَيْرِ تَحْرِيفٍ وَلَا تَعْطِيلٍ، وَمِنْ غَيْرِ تَكْيِيفٍ وَلَا تَمْثِيلٍ — كَإِثْبَاتِ اسْمِ السَّمِيعِ، وَصِفَةِ السَّمْعِ، وَإِثْبَاتِ صِفَةِ الْقُدْرَةِ، وَنَفْيِ مَا نَفَاهُ اللَّهُ عَنْ نَفْسِهِ أَوْ نَفَاهُ عَنْهُ رَسُولُهُ ﷺ، كَنَفْيِ الْعَجْزِ.</div><div class="bt-translit">Ifrādu-llāhi bi-l-kamāli l-muṭlaqi fī asmāʾihi wa ṣifātih, wa dhālika bi-ithbāti mā athbatahu-llāhu taʿālā li-nafsih, aw athbatahu lahu rasūluhu ﷺ mina l-asmāʾi l-ḥusnā wa ṣ-ṣifāti l-ʿulā ʿalā l-wajhi lladhī yalīqu bi-jalāli-llāhi wa ʿaẓamatih, min ghayri taḥrīfin wa lā taʿṭīl, wa min ghayri takyīfin wa lā tamthīl — ka-ithbāti smi s-Samīʿ, wa ṣifati s-samʿ, wa ithbāti ṣifati l-qudrah, wa nafyi mā nafāhu-llāhu ʿan nafsih aw nafāhu ʿanhu rasūluhu ﷺ, ka-nafyi l-ʿajz.</div><div class="bt-en">Singling out Allah with <strong>absolute perfection in His Names and Attributes</strong>. This is done by <strong>affirming what Allah affirmed for Himself, or what His Messenger ﷺ affirmed for Him</strong> — of the Most Beautiful Names and Lofty Attributes — <strong>in a way befitting Allah\u2019s majesty and greatness</strong>, <strong>without</strong>: <em>taḥrīf</em> (distortion), <em>taʿṭīl</em> (denial), <em>takyīf</em> (asking "how"), or <em>tamthīl</em> (likening to creation). For example: <strong>affirming the name "the All-Hearing" and the attribute of hearing</strong>, and <strong>affirming the attribute of power</strong>, and <strong>negating what Allah negated from Himself or what His Messenger ﷺ negated from Him</strong> — such as negating <strong>incapacity</strong>.</div></div>

<div class="verse"><div class="v-ar">﴿لَيْسَ كَمِثْلِهِ شَيْءٌ ۖ وَهُوَ السَّمِيعُ الْبَصِيرُ﴾</div><div class="v-translit">Laysa ka-mithlihi shayʾun, wa huwa s-samīʿu l-baṣīr.</div><div class="v-en">"There is nothing like Him, and He is the All-Hearing, the All-Seeing."</div><div class="v-ref">Sūrat ash-Shūrā 42:11</div></div>

<div class="callout" style="text-align:center"><div class="callout-label" style="text-align:center">⚠ Crucial Principle</div><div class="callout-ar">هَذِهِ الأَقْسَامُ الثَّلَاثَةُ لِلتَّوْحِيدِ مُتَلَازِمَةٌ، مَنْ لَمْ يُؤْمِنْ بِهَا جَمِيعًا لَمْ يَكُنْ مُوَحِّدًا</div><div class="callout-translit">Hādhihi l-aqsāmu th-thalāthatu li-t-tawḥīdi mutalāzimah, man lam yuʾmin bihā jamīʿan lam yakun muwaḥḥidan.</div><div class="callout-en" style="font-weight:600;margin-top:8px"><strong>These three categories of tawhid are inseparable. Whoever does not believe in all of them is not a muwaḥḥid (monotheist).</strong></div></div>`;}

function L1P3(){return `
<div class="sec"><div class="sec-ar">مَعْنَى الْعُبُودِيَّةِ</div><div class="sec-translit">Maʿnā l-ʿubūdiyyah</div><div class="sec-en">The Meaning of ʿUbūdiyyah (Servitude)</div></div>

<div class="body-text"><div class="bt-ar">الْخُضُوعُ وَالتَّذَلُّلُ لِلَّهِ، فَالْخَلْقُ كُلُّهُمْ خَاضِعُونَ لَهُ سُبْحَانَهُ وَتَعَالَى.</div><div class="bt-translit">Al-khuḍūʿu wa t-tadhallulu li-llāh, fa-l-khalqu kulluhum khāḍiʿūna lahu subḥānahu wa taʿālā.</div><div class="bt-en"><strong>Submission and humility before Allah</strong>. All of creation is submissive to Him — Glorified and Exalted.</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 What does this mean?</span><div class="study-note-body"><strong>ʿUbūdiyyah</strong> sounds like a big word, but think of it simply: it\u2019s being a <em>servant</em> of Allah. Imagine a kind king you love deeply — you listen to him, you do what he asks, and you feel small in front of how great he is. That feeling is ʿubūdiyyah. Every single thing Allah made — from the biggest galaxy to the smallest ant — serves Him in some way. But only humans and jinn get to <em>choose</em> how they serve Him.</div></div>

<div class="sec"><div class="sec-ar">أَنْوَاعُ الْعُبُودِيَّةِ</div><div class="sec-translit">Anwāʿu l-ʿubūdiyyah</div><div class="sec-en">Types of ʿUbūdiyyah</div></div>

<div class="body-text"><div class="bt-ar">لِلْعُبُودِيَّةِ نَوْعَانِ، هُمَا:</div><div class="bt-translit">Li-l-ʿubūdiyyati nawʿān, humā:</div><div class="bt-en">ʿUbūdiyyah has <strong>two types</strong>:</div></div>

<div class="virtue"><div class="virtue-head"><div class="virtue-n">1</div><div class="virtue-head-text"><div class="vh-label">Type One</div><div class="vh-ar">الْعُبُودِيَّةُ الْعَامَّةُ</div><div class="vh-translit">Al-ʿubūdiyyatu l-ʿāmmah</div><div class="vh-en">General ʿUbūdiyyah</div></div></div><div class="virtue-body">Submission of <em>all creation</em> — angels, jinn, humans, animals, and inanimate objects. No one can escape it.</div></div>

<div class="body-text"><div class="bt-label">📖 Meaning</div><div class="bt-ar">وَمَعْنَاهَا: خُضُوعُ جَمِيعِ الْمَخْلُوقَاتِ لِلَّهِ تَعَالَى، فَالْمَلَائِكَةُ، وَالْإِنْسُ، وَالْجِنُّ مُؤْمِنُهُمْ وَكَافِرُهُمْ، وَالْحَيَوَانَاتُ، وَالطُّيُورُ، وَالنَّبَاتَاتُ، وَالْجَمَادَاتُ، كُلُّهَا مِلْكٌ لِلَّهِ وَتَحْتَ قُدْرَتِهِ، وَلَا يَقْدِرُ أَحَدٌ أَنْ يَخْرُجَ عَنْ هَذِهِ الْعُبُودِيَّةِ.</div><div class="bt-translit">Wa maʿnāhā: khuḍūʿu jamīʿi l-makhlūqāti li-llāhi taʿālā, fa-l-malāʾikah, wa l-insu, wa l-jinnu muʾminuhum wa kāfiruhum, wa l-ḥayawānāt, wa ṭ-ṭuyūr, wa n-nabātāt, wa l-jamādāt, kulluhā milkun li-llāhi wa taḥta qudratih, wa lā yaqdiru aḥadun an yakhruja ʿan hādhihi l-ʿubūdiyyah.</div><div class="bt-en">Its meaning: <strong>the submission of ALL created things to Allah</strong> — the <strong>angels, humans, jinn</strong> (believers and disbelievers alike), <strong>animals, birds, plants, and inanimate objects</strong> — all are Allah\u2019s property and under His power, and <strong>no one can escape this ʿubūdiyyah</strong>.</div></div>

<div class="verse"><div class="v-ar">﴿إِن كُلُّ مَن فِي السَّمَاوَاتِ وَالْأَرْضِ إِلَّا آتِي الرَّحْمَٰنِ عَبْدًا ۝ لَّقَدْ أَحْصَاهُمْ وَعَدَّهُمْ عَدًّا﴾</div><div class="v-translit">In kullu man fī s-samāwāti wa-l-arḍi illā ātī r-raḥmāni ʿabdā. Laqad aḥṣāhum wa ʿaddahum ʿaddā.</div><div class="v-en">"There is no one in the heavens and the earth but that he comes to the Most Merciful as a servant. <strong>He has enumerated them and counted them with [exact] count</strong>."</div><div class="v-ref">Sūrat Maryam 19:93–94</div></div>

<div class="virtue" style="margin-top:12px"><div class="virtue-head"><div class="virtue-n">2</div><div class="virtue-head-text"><div class="vh-label">Type Two</div><div class="vh-ar">الْعُبُودِيَّةُ الْخَاصَّةُ</div><div class="vh-translit">Al-ʿubūdiyyatu l-khāṣṣah</div><div class="vh-en">Specific ʿUbūdiyyah</div></div></div><div class="virtue-body">The worship of <strong>obedience and willing response</strong> — specific to believers. Allah alone is deserving of this worship.</div></div>

<div class="body-text"><div class="bt-label">📖 Meaning</div><div class="bt-ar">وَهِيَ عُبُودِيَّةُ الطَّاعَةِ وَاسْتِجَابَةُ الْمُؤْمِنِينَ لِرَبِّهِمْ، وَاتِّبَاعُهُمْ لِرَسُولِهِ ﷺ.</div><div class="bt-translit">Wa hiya ʿubūdiyyatu ṭ-ṭāʿati wa stijābatu l-muʾminīna li-rabbihim, wa ttibāʿuhum li-rasūlihi ﷺ.</div><div class="bt-en">It is <strong>the ʿubūdiyyah of obedience</strong> — the believers\u2019 <strong>willing response to their Lord</strong>, and their <strong>following of His Messenger ﷺ</strong>.</div></div>

<div class="verse"><div class="v-ar">﴿فَاعْبُدْهُ وَتَوَكَّلْ عَلَيْهِ﴾</div><div class="v-translit">Fa-ʿbudhu wa tawakkal ʿalayh.</div><div class="v-en">"So worship Him and rely upon Him."</div><div class="v-ref">Sūrat Hūd 11:123</div></div>

<div class="body-text"><div class="bt-ar">وَهَذِهِ تَعُمُّ كُلَّ مَنْ يَعْبُدُ اللَّهَ بِمَا شَرَعَهُ، فَاللَّهُ هُوَ الْمُسْتَحِقُّ لِلْعِبَادَةِ وَحْدَهُ.</div><div class="bt-translit">Wa hādhihi taʿummu kulla man yaʿbudu-llāha bi-mā sharaʿah, fa-llāhu huwa l-mustaḥiqqu li-l-ʿibādati waḥdah.</div><div class="bt-en">This (specific ʿubūdiyyah) encompasses <strong>everyone who worships Allah by what He has legislated</strong>. <strong>Allah alone is deserving of worship</strong>.</div></div>`;}

<div class="activity" id="al1p4"><div class="section-badge">نَشَاط · Activity</div>

${[['اللَّهُ فِي السَّمَاءِ','Allah is above the heavens','Asmāʾ wa Ṣifāt'],['اللَّهُ خَالِقِي','Allah is my Creator','Rubūbiyyah'],['اللَّهُ مَعْبُودِي','Allah is the One I worship','Ulūhiyyah'],['اللَّهُ الرَّحِيمُ','Allah is the Most Merciful','Asmāʾ wa Ṣifāt'],['اللَّهُ السَّمِيعُ','Allah is the All-Hearing','Asmāʾ wa Ṣifāt'],['اللَّهُ يَرْزُقُنِي','Allah provides for me','Rubūbiyyah'],['اللَّهُ الْبَصِيرُ','Allah is the All-Seeing','Asmāʾ wa Ṣifāt'],['اللَّهُ يُحْيِي الْمَوْتَى','Allah gives life to the dead','Rubūbiyyah'],['أَدْعُو اللَّهَ وَحْدَهُ','I supplicate to Allah alone','Ulūhiyyah'],['اللَّهُ الْقَوِيُّ','Allah is the All-Powerful','Asmāʾ wa Ṣifāt'],['أَسْجُدُ لِلَّهِ وَحْدَهُ','I prostrate to Allah alone','Ulūhiyyah'],['اللَّهُ يُدَبِّرُ الْكَوْنَ','Allah manages the universe','Rubūbiyyah']].map(r=>`<div class="act-item"><div class="act-ar">${r[0]}</div><div class="act-prompt">${r[1]}</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box">${r[2]}</div></div>`).join('')}</div>

<div class="activity-controls"><button class="btn-reveal-all" onclick="revealAll(document.getElementById('as1p4'))">Reveal All</button><button class="btn-hide-all" onclick="hideAll(document.getElementById('as1p4'))">Hide All</button></div>
<div class="q-item"><span class="q-num">1</span><div class="q-en">Define tawhid (linguistically and technically).</div><div class="q-ar">أُعَرِّفُ التَّوْحِيدَ لُغَةً وَشَرْعًا.</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>Linguistically:</strong> To believe something is one — singular/unique.<br><strong>Technically:</strong> To single out Allah in His Lordship, Worship, and Most Beautiful Names and Lofty Attributes.</div></div>
<div class="q-item"><span class="q-num">2</span><div class="q-en">What are the categories of tawhid?</div><div class="q-ar">مَا أَقْسَامُ التَّوْحِيدِ؟</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box">Three inseparable categories: (1) Tawḥīd ar-Rubūbiyyah, (2) Tawḥīd al-Ulūhiyyah, (3) Tawḥīd al-Asmāʾ wa-ṣ-Ṣifāt.</div></div>
<div class="q-item"><span class="q-num">3</span><div class="q-en">Mention the evidence for Rubūbiyyah, Ulūhiyyah, and Asmāʾ wa Ṣifāt.</div><div class="q-ar">أَذْكُرُ الدَّلِيلَ عَلَى كُلٍّ مِنَ الأَقْسَامِ الثَّلَاثَةِ.</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>(1)</strong> Sūrat Yūnus 10:3 — "Indeed, your Lord is Allah who created the heavens and earth…"<br><strong>(2)</strong> Sūrat an-Naḥl 16:36 — "Worship Allah and avoid Ṭāghūt."<br><strong>(3)</strong> Sūrat ash-Shūrā 42:11 — "There is nothing like Him…"</div></div></div>`;}

function L2P1(){return `
<div class="sec"><div class="sec-ar">الإِنْسَانُ مَفْطُورٌ عَلَى التَّوْحِيدِ</div><div class="sec-translit">Al-insānu mafṭūrun ʿalā t-tawḥīd</div><div class="sec-en">The Human Being is Created Upon Tawhid</div></div>

<div class="body-text"><div class="bt-label">📖 Textbook Passage</div><div class="bt-ar">وَالْفِطْرَةُ: مَعْرِفَةُ اللَّهِ تَعَالَى وَالْإِقْرَارُ بِهِ، وَهِيَ فِطْرَةُ الْإِسْلَامِ الَّتِي فَطَرَ اللَّهُ النَّاسَ عَلَيْهَا، قَالَ اللَّهُ تَعَالَى: ﴿أَلَسْتُ بِرَبِّكُمْ قَالُوا بَلَى﴾، وَالْأَصْلُ أَنَّ اللَّهَ خَلَقَ الْإِنْسَانَ عَلَى التَّوْحِيدِ، وَالشِّرْكُ طَارِئٌ عَلَيْهِ.</div><div class="bt-translit">Wa l-fiṭrah: maʿrifatu-llāhi taʿālā wa l-iqrāru bih, wa hiya fiṭratu l-islāmi llatī faṭara-llāhu n-nāsa ʿalayhā, qāla-llāhu taʿālā: ﴿Alastu bi-rabbikum qālū balā﴾, wa l-aṣlu anna-llāha khalaqa l-insāna ʿalā t-tawḥīd, wa sh-shirku ṭāriʾun ʿalayh.</div><div class="bt-en">The <strong>fiṭrah</strong> is: <strong>knowing Allah — Exalted is He — and acknowledging Him</strong>. It is the fiṭrah of Islam upon which Allah created people. Allah — Exalted — said: <em>"Am I not your Lord? They said: Yes indeed."</em> The <strong>original state</strong> is that Allah created the human being <strong>upon tawhid</strong>, and <strong>shirk is something that comes upon him later</strong>.</div></div>

<div class="verse"><div class="v-ar">﴿أَلَسْتُ بِرَبِّكُمْ ۖ قَالُوا بَلَىٰ﴾</div><div class="v-translit">Alastu bi-rabbikum? Qālū balā.</div><div class="v-en">"Am I not your Lord?" They said: "Yes indeed."</div><div class="v-ref">Sūrat al-Aʿrāf 7:172</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Reflect on this</span><div class="study-note-body">Every human being was asked this question by Allah <em>before their soul entered their body</em>: "Am I not your Lord?" And every soul answered "Yes indeed." This is <strong>fiṭrah</strong> — the inborn knowledge and acknowledgment of Allah that every person is created with. When someone says "deep down I always felt there was a God" — that\u2019s fiṭrah speaking.</div></div>

<div class="sec"><div class="sec-ar">أَهَمِّيَّةُ التَّوْحِيدِ</div><div class="sec-translit">Ahammiyyatu t-tawḥīd</div><div class="sec-en">The Importance of Tawhid</div></div>

<div class="body-text"><div class="bt-ar">تَتَلَخَّصُ أَهَمِّيَّةُ التَّوْحِيدِ فِيمَا يَلِي:</div><div class="bt-translit">Tatalakhkhaṣu ahammiyyatu t-tawḥīdi fīmā yalī:</div><div class="bt-en">The importance of tawhid can be summarized as follows:</div></div>

<div class="point"><div class="point-num">1</div><div class="point-body"><div class="point-ar">التَّوْحِيدُ هُوَ الْغَايَةُ مِنْ خَلْقِ الْجِنِّ وَالإِنْسِ</div><div class="point-translit">Awwalan: At-tawḥīdu huwa l-ghāyatu min khalqi l-jinni wa-l-ins</div><div class="point-en">First: Tawhid is the Purpose Behind Creation of Jinn and Humans</div></div></div>

<div class="body-text"><div class="bt-ar">فَالْغَايَةُ مِنْ خَلْقِ الْجِنِّ وَالْإِنْسِ هِيَ: عِبَادَةُ اللَّهِ تَعَالَى وَحْدَهُ لَا شَرِيكَ لَهُ.</div><div class="bt-translit">Fa-l-ghāyatu min khalqi l-jinni wa l-insi hiya: ʿibādatu-llāhi taʿālā waḥdahu lā sharīka lah.</div><div class="bt-en">The <strong>purpose behind the creation of jinn and humans</strong> is: <strong>the worship of Allah — Exalted is He — alone, with no partner</strong>.</div></div>

<div class="verse"><div class="v-ar">﴿وَمَا خَلَقْتُ الْجِنَّ وَالْإِنسَ إِلَّا لِيَعْبُدُونِ﴾</div><div class="v-translit">Wa mā khalaqtu l-jinna wa-l-insa illā li-yaʿbudūn.</div><div class="v-en">"And I did not create the jinn and mankind except to worship Me."</div><div class="v-ref">Sūrat adh-Dhāriyāt 51:56</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 The most important verse to understand your purpose</span><div class="study-note-body">Have you ever wondered <em>why</em> you exist? Why did Allah make you? This verse answers it in just a few words: <strong>to worship Him.</strong> That\u2019s it. Not to be rich, not to be famous, not even to be happy — but to worship Allah. Everything else comes <em>from</em> that, not <em>instead of</em> it. When you remember this, everyday choices become easier.</div></div>

<div class="body-text"><div class="bt-ar">وَهَذِهِ الْعِبَادَةُ الَّتِي خُلِقَ الْخَلْقُ لِأَجْلِهَا، لَهَا أَنْوَاعٌ ثَلَاثٌ:</div><div class="bt-translit">Wa hādhihi l-ʿibādatu llatī khuliqa l-khalqu li-ajlihā, lahā anwāʿun thalāth:</div><div class="bt-en">This worship — for which creation was made — has <strong>three types</strong>:</div></div>

<ul class="num-list">
<li data-n="❤"><div class="li-ar">عِبَادَةُ الْقَلْبِ، مِثْلَ: الْخَوْفِ مِنَ اللَّهِ، وَمَحَبَّتِهِ، وَرَجَاءِ ثَوَابِهِ، وَالتَّوَكُّلِ عَلَيْهِ.</div><div class="li-translit">ʿIbādatu l-qalb, mithla: al-khawfi mina-llāh, wa maḥabbatih, wa rajāʾi thawābih, wa t-tawakkuli ʿalayh.</div><div class="li-en"><strong>Heart worship</strong> — such as: <strong>fear of Allah, love of Him, hope for His reward, and reliance upon Him</strong>.</div></li>
<li data-n="🗣"><div class="li-ar">عِبَادَةُ اللِّسَانِ، مِثْلَ: ذِكْرِ اللَّهِ، وَاسْتِغْفَارِهِ، وَتَسْبِيحِهِ.</div><div class="li-translit">ʿIbādatu l-lisān, mithla: dhikri-llāh, wa stighfārih, wa tasbīḥih.</div><div class="li-en"><strong>Tongue worship</strong> — such as: <strong>remembrance of Allah (dhikr), seeking His forgiveness (istighfār), and glorifying Him (tasbīḥ)</strong>.</div></li>
<li data-n="✋"><div class="li-ar">عِبَادَةُ الْجَوَارِحِ، مِثْلَ: الصَّلَاةِ، وَالْوُضُوءِ، وَالصَّدَقَةِ، وَالْحَجِّ.</div><div class="li-translit">ʿIbādatu l-jawāriḥ, mithla: aṣ-ṣalāh, wa l-wuḍūʾ, wa ṣ-ṣadaqah, wa l-ḥajj.</div><div class="li-en"><strong>Limb worship</strong> — such as: <strong>prayer (ṣalāh), wuḍūʾ, charity (ṣadaqah), and pilgrimage (ḥajj)</strong>.</div></li>
</ul>

<div class="point"><div class="point-num">2</div><div class="point-body"><div class="point-ar">التَّوْحِيدُ هُوَ الْغَايَةُ مِنْ إِرْسَالِ الرُّسُلِ وَإِنْزَالِ الْكُتُبِ</div><div class="point-translit">Thāniyan: At-tawḥīdu huwa l-ghāyatu min irsāli r-rusul wa inzāli l-kutub</div><div class="point-en">Second: Tawhid is the Purpose Behind Sending the Messengers and Revealing the Books</div></div></div>

<div class="body-text"><div class="bt-ar">فَالْحِكْمَةُ مِنْ إِرْسَالِ الرُّسُلِ وَإِنْزَالِ الْكُتُبِ هِيَ: الْأَمْرُ بِالتَّوْحِيدِ، وَالنَّهْيُ عَنِ الشِّرْكِ.</div><div class="bt-translit">Fa-l-ḥikmatu min irsāli r-rusul wa inzāli l-kutubi hiya: al-amru bi-t-tawḥīd, wa n-nahyu ʿani sh-shirk.</div><div class="bt-en">The <strong>wisdom behind sending the messengers and revealing the books</strong> is: <strong>commanding tawhid and forbidding shirk</strong>.</div></div>

<div class="verse"><div class="v-ar">﴿وَلَقَدْ بَعَثْنَا فِي كُلِّ أُمَّةٍ رَّسُولًا أَنِ اعْبُدُوا اللَّهَ وَاجْتَنِبُوا الطَّاغُوتَ﴾</div><div class="v-translit">Wa laqad baʿathnā fī kulli ummatin rasūlan ani-ʿbudū-llāha wa-jtanibū ṭ-ṭāghūt.</div><div class="v-en">"We certainly sent into every nation a messenger, [saying], 'Worship Allah and avoid Ṭāghūt.'"</div><div class="v-ref">Sūrat an-Naḥl 16:36</div></div>`;}

function L2P2(){return `
<div class="point"><div class="point-num">3</div><div class="point-body"><div class="point-ar">التَّوْحِيدُ أَوَّلُ الْوَاجِبَاتِ</div><div class="point-translit">Thālithan: At-tawḥīdu awwalu l-wājibāt</div><div class="point-en">Third: Tawhid is the First of All Obligations</div></div></div>

<div class="body-text"><div class="bt-ar">فَأَوَّلُ مَا يَجِبُ عَلَى الْعِبَادِ: تَوْحِيدُ اللَّهِ تَعَالَى.</div><div class="bt-translit">Fa-awwalu mā yajibu ʿalā l-ʿibādi: tawḥīdu-llāhi taʿālā.</div><div class="bt-en">The <strong>first thing obligatory upon the servants</strong> is: <strong>the tawhid of Allah — Exalted is He</strong>.</div></div>

<div class="hadith"><div class="hadith-label">وَالدَّلِيلُ عَلَى هَذَا · Ḥadīth — Ibn ʿAbbās · Prophet ﷺ to Muʿādh</div><div class="h-ar">لَمَّا بَعَثَ النَّبِيُّ ﷺ مُعَاذَ بْنَ جَبَلٍ ﷺ إِلَى نَحْوِ أَهْلِ الْيَمَنِ قَالَ لَهُ: «إِنَّكَ تَقْدَمُ عَلَى قَوْمٍ مِنْ أَهْلِ الْكِتَابِ، فَلْيَكُنْ أَوَّلَ مَا تَدْعُوهُمْ إِلَى أَنْ يُوَحِّدُوا اللَّهَ تَعَالَى»</div><div class="h-translit">Lammā baʿatha n-nabiyyu ﷺ Muʿādha bna Jabalin ﷺ ilā naḥwi ahli l-yaman qāla lah: "Innaka taqdamu ʿalā qawmin min ahli l-kitāb, fal-yakun awwala mā tadʿūhum ilā an yuwaḥḥidū-llāha taʿālā."</div><div class="h-en">When the Prophet ﷺ sent Muʿādh ibn Jabal ﷺ toward the people of Yemen, he said to him: "You are going to a people from among the <strong>People of the Book</strong>, so let the <strong>first</strong> thing you call them to be that they make tawhid of Allah — the Exalted."</div><div class="h-source">Narrated by al-Bukhārī no. 7372</div></div>

<div class="verse"><div class="v-ar">﴿وَقَضَىٰ رَبُّكَ أَلَّا تَعْبُدُوا إِلَّا إِيَّاهُ وَبِالْوَالِدَيْنِ إِحْسَانًا﴾</div><div class="v-translit">Wa qaḍā rabbuka allā taʿbudū illā iyyāhu wa bi-l-wālidayni iḥsānā.</div><div class="v-en">"And your Lord has <strong>decreed</strong> that you worship none but Him, and to parents, good treatment."</div><div class="v-ref">Sūrat al-Isrāʾ 17:23</div></div>

<div class="body-text"><div class="bt-ar">وَهَذَا يَدُلُّ عَلَى أَنَّ التَّوْحِيدَ أَوْجَبُ الْوَاجِبَاتِ.</div><div class="bt-translit">Wa hādhā yadullu ʿalā anna t-tawḥīda awjabu l-wājibāt.</div><div class="bt-en">This indicates that <strong>tawhid is the most obligatory of all obligations</strong>. (The word <em>قَضَى</em> / qaḍā = decreed/commanded → meaning: <strong>أَوْجَبَ</strong> / awjaba — made obligatory.)</div></div>

<div class="point"><div class="point-num">4</div><div class="point-body"><div class="point-ar">التَّوْحِيدُ أَسَاسُ قَبُولِ الأَعْمَالِ</div><div class="point-translit">Rābiʿan: At-tawḥīdu asāsu qabūli l-aʿmāl</div><div class="point-en">Fourth: Tawhid is the Foundation for Acceptance of Deeds</div></div></div>

<div class="body-text"><div class="bt-ar">فَتَوْحِيدُ اللَّهِ تَعَالَى هُوَ أَسَاسُ قَبُولِ كُلِّ عَمَلٍ، فَإِنَّ اللَّهَ تَعَالَى لَا يَقْبَلُ عَمَلَ الْمُشْرِكِينَ وَإِنْ كَانَ فِي ظَاهِرِهِ عَمَلًا صَالِحًا؛ كَالصَّدَقَةِ وَالْبِرِّ وَنَحْوِ ذَلِكَ.</div><div class="bt-translit">Fa-tawḥīdu-llāhi taʿālā huwa asāsu qabūli kulli ʿamal, fa-inna-llāha taʿālā lā yaqbalu ʿamala l-mushrikīna wa in kāna fī ẓāhirihi ʿamalan ṣāliḥan; ka-ṣ-ṣadaqati wa l-birri wa naḥwi dhālik.</div><div class="bt-en">The <strong>tawhid of Allah is the foundation for the acceptance of every deed</strong>. Allah <strong>does not accept the deeds of the polytheists</strong>, even if they appear outwardly good — such as <strong>charity, kindness, and the like</strong>.</div></div>

<div class="verse"><div class="v-ar">﴿فَمَن يَعْمَلْ مِنَ الصَّالِحَاتِ وَهُوَ مُؤْمِنٌ فَلَا كُفْرَانَ لِسَعْيِهِ وَإِنَّا لَهُ كَاتِبُونَ﴾</div><div class="v-translit">Fa-man yaʿmal min aṣ-ṣāliḥāti wa huwa muʾminun fa-lā kufrāna li-saʿyih wa innā lahu kātibūn.</div><div class="v-en">"Whoever does righteous deeds <strong>while he is a believer</strong> — no denial will there be for his effort, and indeed, We are recording."</div><div class="v-ref">Sūrat al-Anbiyāʾ 21:94</div></div>

<div class="point"><div class="point-num">5</div><div class="point-body"><div class="point-ar">التَّوْحِيدُ أَعْظَمُ حُقُوقِ اللهِ عَلَى عِبَادِهِ</div><div class="point-translit">Khāmisan: At-tawḥīdu aʿẓamu ḥuqūqi-llāhi ʿalā ʿibādih</div><div class="point-en">Fifth: Tawhid is the Greatest Right Allah Has Over His Servants</div></div></div>

<div class="hadith"><div class="hadith-label">وَالدَّلِيلُ عَلَى هَذَا · Ḥadīth Qudsī — Muʿādh ibn Jabal (on the donkey)</div><div class="h-ar">كُنْتُ رِدْفَ رَسُولِ اللَّهِ ﷺ عَلَى حِمَارٍ يُقَالُ لَهُ: عُفَيْرٌ، قَالَ: فَقَالَ: «يَا مُعَاذُ، تَدْرِي مَا حَقُّ اللَّهِ عَلَى الْعِبَادِ؟ وَمَا حَقُّ الْعِبَادِ عَلَى اللَّهِ؟» قَالَ: قُلْتُ: اللَّهُ وَرَسُولُهُ أَعْلَمُ. قَالَ: «فَإِنَّ حَقَّ اللَّهِ عَلَى الْعِبَادِ أَنْ يَعْبُدُوا اللَّهَ وَلَا يُشْرِكُوا بِهِ شَيْئًا، وَحَقُّ الْعِبَادِ عَلَى اللَّهِ عَزَّ وَجَلَّ أَنْ لَا يُعَذِّبَ مَنْ لَا يُشْرِكُ بِهِ شَيْئًا»، قَالَ: قُلْتُ: يَا رَسُولَ اللَّهِ، أَفَلَا أُبَشِّرُ النَّاسَ؟ قَالَ: «لَا تُبَشِّرْهُمْ فَيَتَّكِلُوا»</div><div class="h-translit">Kuntu ridfa rasūli-llāhi ﷺ ʿalā ḥimārin yuqālu lah: ʿUfayr. Qāla: fa-qāl: "Yā Muʿādh, tadrī mā ḥaqqu-llāhi ʿalā l-ʿibād? wa mā ḥaqqu l-ʿibādi ʿalā-llāh?" Qāla: qultu: Allāhu wa rasūluhu aʿlam. Qāla: "Fa-inna ḥaqqa-llāhi ʿalā l-ʿibādi an yaʿbudū-llāha wa lā yushrikū bihi shayʾā, wa ḥaqqu l-ʿibādi ʿalā-llāhi ʿazza wa jalla an lā yuʿadhdhiba man lā yushriku bihi shayʾā." Qāla: qultu: yā rasūla-llāh, a-falā ubashshiru n-nās? Qāla: "Lā tubashshir-hum fa-yattakilū."</div><div class="h-en">"I was riding behind the Messenger of Allah ﷺ on a donkey called <strong>ʿUfayr</strong>. He said: <em>'O Muʿādh, do you know what is the right of Allah upon the servants, and what is the right of the servants upon Allah?'</em> I said: <em>Allah and His Messenger know best.</em> He said: <strong>'The right of Allah upon the servants is that they worship Him and not associate anything with Him. And the right of the servants upon Allah — Mighty and Majestic — is that He will not punish anyone who does not associate anything with Him.'</strong> I said: <em>O Messenger of Allah, shall I not give people the glad tidings?</em> He said: <strong>'Do not give them glad tidings, lest they rely on it.'</strong>"</div><div class="h-source">Narrated by al-Bukhārī no. 2701 and Muslim no. 30. <em>Ridf</em> = the one who rides behind you on the back of the mount.</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 What does "right" mean here?</span><div class="study-note-body">When the Prophet ﷺ says "the right of Allah upon you," he means: <strong>what Allah deserves from you.</strong> Think about it — Allah gave you life, your family, your eyes, your food, your <em>everything</em>. What does He deserve in return? Just one thing: that you worship Him alone, with no partners. That\u2019s Allah\u2019s greatest "right" upon us, and it\u2019s actually so small compared to everything He gives us!</div></div>`;}

function L2P3(){return `

function L3P1(){return `
<div class="sec"><div class="sec-ar">فَضَائِلُ التَّوْحِيدِ</div><div class="sec-translit">Faḍāʾilu t-tawḥīd</div><div class="sec-en">The Virtues of Tawhid</div></div>

<div class="body-text"><div class="bt-ar">لِتَوْحِيدِ اللَّهِ تَعَالَى فَضَائِلُ كَثِيرَةٌ أَهَمُّهَا مَا يَأْتِي:</div><div class="bt-translit">Li-tawḥīdi-llāhi taʿālā faḍāʾilu kathīratun ahammuhā mā yaʾtī:</div><div class="bt-en">The tawhid of Allah — Exalted — has <strong>many virtues</strong>, the most important of which are as follows:</div></div>

<div class="virtue"><div class="virtue-head"><div class="virtue-n">1</div><div class="virtue-head-text"><div class="vh-label">الْفَضِيلَةُ الْأُولَى · The First Virtue</div><div class="vh-ar">الْأَمْنُ فِي الدُّنْيَا وَالْآخِرَةِ</div><div class="vh-translit">Al-amnu fī d-dunyā wa l-ākhirah</div><div class="vh-en">Security in This World and the Hereafter</div></div></div></div>

<div class="virtue" style="margin-top:8px"><div class="virtue-head"><div class="virtue-n">2</div><div class="virtue-head-text"><div class="vh-label">الْفَضِيلَةُ الثَّانِيَةُ · The Second Virtue</div><div class="vh-ar">الْهِدَايَةُ التَّامَّةُ إِلَى الصِّرَاطِ الْمُسْتَقِيمِ</div><div class="vh-translit">Al-hidāyatu t-tāmmatu ilā ṣ-ṣirāṭi l-mustaqīm</div><div class="vh-en">Complete Guidance to the Straight Path</div></div></div></div>

<div class="body-text"><div class="bt-label">📖 Evidence for both virtues</div><div class="bt-ar">وَالدَّلِيلُ عَلَى هَاتَيْنِ الْفَضِيلَتَيْنِ: قَوْلُ اللَّهِ تَعَالَى:</div><div class="bt-translit">Wa d-dalīlu ʿalā hātayni l-faḍīlatayn: qawlu-llāhi taʿālā:</div><div class="bt-en">The <strong>evidence for these two virtues</strong> is the saying of Allah — Exalted:</div></div>

<div class="verse"><div class="v-ar">﴿الَّذِينَ آمَنُوا وَلَمْ يَلْبِسُوا إِيمَانَهُم بِظُلْمٍ أُولَٰئِكَ لَهُمُ الْأَمْنُ وَهُم مُّهْتَدُونَ﴾</div><div class="v-translit">Alladhīna āmanū wa lam yalbisū īmānahum bi-ẓulmin ulāʾika lahumu l-amnu wa hum muhtadūn.</div><div class="v-en">"Those who believe and do not mix their faith with injustice — those will have <strong>security</strong>, and they are <strong>[rightly] guided</strong>."</div><div class="v-ref">Sūrat al-Anʿām 6:82</div></div>

<div class="body-text"><div class="bt-ar">فَمَنْ وَحَّدَ اللَّهَ تَعَالَى وَلَمْ يَخْلِطْ تَوْحِيدَهُ بِشِرْكٍ فَإِنَّهُ يَحْصُلُ عَلَى أَمْرَيْنِ:<br>الْأَوَّلُ: الْأَمْنُ فِي الدُّنْيَا وَالْآخِرَةِ.<br>الثَّانِي: الْهِدَايَةُ التَّامَّةُ إِلَى الصِّرَاطِ الْمُسْتَقِيمِ.<br>وَالظُّلْمُ هُنَا هُوَ الشِّرْكُ، كَمَا قَالَ تَعَالَى: ﴿إِنَّ الشِّرْكَ لَظُلْمٌ عَظِيمٌ﴾.</div><div class="bt-translit">Fa-man waḥḥada-llāha taʿālā wa lam yakhliṭ tawḥīdahu bi-shirkin fa-innahu yaḥṣulu ʿalā amrayn:<br>Al-awwal: al-amnu fī d-dunyā wa l-ākhirah.<br>Ath-thānī: al-hidāyatu t-tāmmatu ilā ṣ-ṣirāṭi l-mustaqīm.<br>Wa ẓ-ẓulmu hunā huwa sh-shirk, kamā qāla taʿālā: ﴿Inna sh-shirka la-ẓulmun ʿaẓīm﴾.</div><div class="bt-en">So whoever makes tawhid of Allah and <strong>does not mix his tawhid with shirk</strong> — he attains <strong>two things</strong>:<br><strong>First:</strong> security in this world and the Hereafter.<br><strong>Second:</strong> complete guidance to the Straight Path.<br>And the <strong>ẓulm (injustice)</strong> here is <strong>shirk</strong>, as Allah said: <em>"Indeed, shirk is a grave injustice."</em> (Luqmān 31:13)</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Tricky Arabic word alert</span><div class="study-note-body">The word <strong>ẓulm (ظُلْم)</strong> normally means "injustice" or "wrongdoing" in Arabic. So when the companions first heard this verse, they thought it meant <em>any</em> sin! They were worried because everyone makes some mistakes. But the Prophet ﷺ explained that <em>ẓulm</em> in this verse means something very specific: <strong>shirk</strong>. He proved it with Luqmān 31:13, where Allah calls shirk "the greatest ẓulm." So the same Arabic word can have a general meaning (any wrong) and a specific meaning (shirk) — context tells you which!</div></div>

<div class="act-item"><div class="act-prompt">What did the companions ﷺ understand from the first verse?</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box">They understood ẓulm in its general sense — any wrongdoing or sin. So they feared the promise would be out of reach since every person wrongs themselves.</div></div>
